ers manage cash flow and grow their business through our lending capabilities. We will continue to drive trust with our sellers, and build products and features that help with sellers accessing funds securely and timely. Commerce Square's commerce products help sellers make sales and track orders, inventory, and fulfillment across in-person and online channels, as well as first-party and third-party channels.", "qwen": "prospective"}, {"nummer": "7020", "name": "Analog Devices, Inc.", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "AI technology may also give rise to significant legal and regulatory compliance risk. Evolving rules, regulations and industry standards governing AI may require us to incur greater compliance costs and restrict the use of AI in our products or 18 technologies. Several jurisdictions where we operate are considering or have proposed or enacted legislation and policies regulating AI, including the European Union’s AI Act, and lack of consistency among different regulatory regimes may increase our regulatory and compliance burdens. Investigations and enforcement efforts related to the use of AI technology could increase our compliance costs and restrict our ability to use AI in the development of our products and services. As the use of AI in our products, technologies or our business operations changes, we may become subject to new rules, regulations and industry standards, which may exacerbate these risks. In addition, the use of AI in the development of our products and services, in our business operations or by our customers in end products that incorporate our products, could cause loss of intellectual property, or subject us to risks related to intellectual property infringement or misappropriation, data privacy or cybersecurity. AI algorithms or training methodologies may also be flawed, and datasets may contain irrelevant, insufficient or biased information.", "qwen": "neutral"}, {"nummer": "7360", "name": "A. O. Smith Corporation", "gics": "Industrials", "year": "2025", "trigger": "artificial intelligence", "content": "Like many companies, we, and some third parties upon which we rely, have experienced cybersecurity incidents and attacks on information technology networks and systems, products and services in the past but, to date, none have resulted in a material breach or had a material adverse impact on our financial condition, results of operations, or cash flows. We may experience such incidents and attacks in the future, potentially with increasing frequency from increasingly sophisticated cyber threats. In addition, remote work and remote access to our systems may heighten these risks. Use of artificial intelligence software may also create risks from unintentional disclosure of proprietary, confidential, personal or otherwise sensitive information. Although we have a response plan in place in the event of a data breach and we have an active program to maintain and improve data security and address these risks and uncertainties by implementing and improving internal controls, security technologies, insurance programs, network and data center resiliency and recovery processes, a successful attack in the future could result in operations failure or breach of security that could lead to disruptions of our business activities and the loss or disclosure of both our and our customers’ financial, product and other confidential information and could result in regulatory actions, significant expense and litigation and have a material adverse effect on our financial condition, results of operations and cash flows and our reputation. ■ Our international operations are subject to risks related to foreign currencies We have a significant presence outside of the U.S., primarily in China and Canada and to a lesser extent India, Europe, and Mexico, and therefore, hold assets, including $83 million of cash and marketable securities denominated in Chinese renminbi, incur liabilities, earn revenues and pay expenses in a variety of currencies other than the U.S. dollar. The financial statements of our foreign subsidiaries are translated into U.S. dollars in our consolidated financial statements.", "qwen": "neutral"}, {"nummer": "7429", "name": "Broadcom Inc.", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "• Inductive Charging ASICs : These products offer high efficiency and are highly integrated solutions for wireless and wearable devices. Servers and Storage System Solutions. Our solutions enable secure movement of digital data to and from host machines, such as servers, personal computers and storage systems, to the underlying storage devices, such as hard disk drives (“HDD”) and solid-state drives (“SSD”). • PCIe Switches : Our interconnect semiconductors support the peripheral component interconnect express (“PCIe”) communication standards in both AI and non-AI applications. PCIe is the primary interconnection mechanism inside modern computing systems. • SAS & RAID Products : Our serial attached small computer system interface (“SAS”) and redundant array of independent disks (“RAID”) controller and adapter products enable secure and high-speed data transmission between a host computer, such as a server, and storage peripheral devices, such as HDD and SSD. RAID technology is a critical part of our server storage connectivity solutions as it provides protection against the loss of critical data resulting from HDD failures.", "qwen": "not_ai"}, {"nummer": "7518", "name": "Baxter International Inc.", "gics": "Health Care", "year": "2025", "trigger": "AI", "content": "Legislation and regulations affecting reimbursement for our products may change at any time and in ways that may be adverse to us. We cannot predict the impact of these pressures and initiatives, or any negative effects of any additional regulations that may affect our business. Increasing regulatory focus on, and expanding laws relating to, privacy, AI, and cybersecurity could impact our business and expose us to increased liability. As a global company, we are subject to global data privacy, AI, and cybersecurity laws, regulations and codes of conduct that apply to our businesses. We are required to comply with increasingly complex and changing legal and regulatory requirements and frameworks in the U.S. and in other countries that govern not only the collection, use, storage, security, transfer, disclosure and other processing of protected health information and personal and sensitive data, but also the development and use of AI, the sharing of certain data, and timely disclosure of 24 cybersecurity incidents. Further, new and emerging digital and technology laws have been, and continue to be, implemented globally and create a strong interplay between multiple countries’ data, privacy, AI, and cybersecurity regulations, which contributes to the complexity of the regulatory landscape. In the U.S., for example, we are subject to the Health Insurance Portability and Accountability Act, as amended (HIPAA), the Health Information Technology for Economic and Clinical Health Act and the California Consumer Privacy Act (the CCPA) and California Privacy Rights Act as well as other new and emerging state laws.", "qwen": "neutral"}, {"nummer": "7528", "name": "Best Buy Co., Inc.", "gics": "Consumer Discretionary", "year": "2025", "trigger": "AI", "content": "We believe that recognition and the reputation of our company and our brands are key to our success. Operational factors, such as failure to deliver high quality services, noncompetitive pricing, failure to meet delivery promises or business interruptions, could damage our reputation. External factors, such as negative public remarks or accusations, or our failure to meet enhanced, and sometimes conflicting, expectations on corporate response to sensitive topics, could also be damaging, including those related to inclusion and belonging, employee engagement and climate change. Third parties may commit fraud (including AI-driven fraud) while using our brand without our permission, possibly harming brand perception or reputation. The ubiquity of social media means that customer feedback and other information, which may include fictitious information, about our company are shared with a broad audience in a manner that is easily accessible and rapidly disseminated. Damage to the perception or reputation of our brands could result in, among other things, declines in revenues and customer loyalty, decreases in gift card and service plan sales, lower employee retention and productivity and vendor relationship issues, all of which could materially adversely affect our revenue and profitability. Failure to effectively manage and execute strategic ventures or partnerships could have a negative impact on our business.", "qwen": "neutral"}, {"nummer": "7574", "name": "Booking Holdings Inc.", "gics": "Consumer Discretionary", "year": "2025", "trigger": "AI", "content": "With cyberattacks evolving and increasing in frequency and sophistication, we may not be able to successfully defend against determined adversaries. In addition, our security policies and controls may not keep pace with the innovation of our offerings and technological advances of threat actors. Threat actors may exploit AI-based technologies to breach systems and weaponize AI to target our employees to gain unauthorized access to systems and data. Furthermore, the emergence of quantum technologies may enable threat actors to overcome traditional encryption protocols and launch more sophisticated AI-enabled attacks at scale. We have experienced and responded to cyberattacks, which we believe have not had a material impact on the integrity of our systems or the security of data we maintain. Vulnerabilities in our consumer and partner systems could and have resulted in unauthorized access to personal and confidential data. These risks are likely to increase as we expand our offerings, integrate our products and services, continue to incorporate AI, and store and process more data.", "qwen": "neutral"}, {"nummer": "7669", "name": "Cadence Design Systems, Inc.", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "Customers can access our solutions via our Cadence OnCloud Platform. Business Drivers Our business growth and customer success are fueled by the transformative impact of AI and the increasing complexity of semiconductors and electronic system design that underpins modern society. Anchored in our ISD strategy, we view AI as a pivotal force driving new opportunities across three key horizons. The first, Infrastructure AI, is powered by the demand for high-performance computing (“HPC”) and AI chips essential for data centers and hyperscalers. The second, Physical AI, focuses on embedding AI into physical systems like autonomous vehicles, industrial robotics, and automation. The third, Life Sciences AI, applies AI and computational science to biology, enabling breakthroughs in medical and life sciences industries. The growing complexity of chip and system designs is a fundamental driver of demand for our technology.", "qwen": "neutral"}, {"nummer": "8086", "name": "Cognizant Technology Solutions Corporation", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "AI technology and services require access to high-quality datasets, models (including foundation models), and other AI system components. We currently rely, in part, on third parties to provide these components. In the future, we may face difficulties acquiring the necessary rights from third parties due to market competition, pricing changes, licensing restrictions and other factors. This challenge could hinder our ability to develop, implement or maintain AI technologies. To overcome this, we may need to invest in alternative strategies, such as forming partnerships or developing our own resources. In addition, the development, adoption and use of AI technologies continue to evolve rapidly and ineffective or inadequate AI development or deployment practices by us, our clients or other third parties may not deliver anticipated efficiencies and could result in unintended consequences. Such consequences may include, for example, operational or compliance risks; reliance on outputs that reflect biased, incomplete or inaccurate information; unauthorized disclosure of sensitive information; operational inefficiencies leading to decreased productivity; deliberate misuse; or infringement of third-party IP rights.", "qwen": "neutral"}, {"nummer": "8180", "name": "Datadog, Inc.", "gics": "Information Technology", "year": "2025", "trigger": "artificial intelligence", "content": "Our integrations provide for comprehensive data point aggregation and consistent, up-to-date, high-quality customer experiences across heterogeneous IT environments as they are fully maintained by Datadog. 6 • Powered by robust artificial intelligence and machine learning capabilities . Our platform ingests massive amounts of data, which we correlate and analyze for actionable insights. Our platform features an increasingly broad and deep set of artificial intelligence and machine learning capabilities that can cross-correlate metrics, traces, logs, sessions, security signals, and other data to identify outliers and notify users of potential anomalies; discover and help resolve issues quickly with automated root cause analysis; augment the troubleshooting workflow with contextual insights; and recommend and implement incident resolution actions; all with the goal of improving business outcomes. • Scalable . Our SaaS platform is delivered through the cloud. Our platform is massively scalable, currently monitoring trillions of events per hour and millions of servers and containers at any point in time.", "qwen": "operative"}, {"nummer": "8280", "name": "Dow Inc.", "gics": "Materials", "year": "2025", "trigger": "artificial intelligence", "content": "The Silicone Feedstocks & Intermediates business is dedicated to maximizing productivity and optimizing margins by leveraging Dow's global scale and reach. It produces silicon metal, siloxanes and intermediates, which are critical materials for manufacturing differentiated downstream silicone products. Details on Performance Materials & Coatings' 2025 net sales, by business and geographic region, are as follows: 12 Table of Contents Products Major applications/market segments and products are listed below by business: Business Applications/Market Segments Major Products Key Raw Materials Key Competitors Coatings & Performance Monomers Acrylic binders for architectural paints and coatings, industrial coatings and paper; adhesives; dispersants; impact modifiers; inks and paints; opacifiers and surfactants for both architectural and industrial applications; plastics additives; processing aids; protective and functional coatings; rheology modifiers ACOUSTICRYL ™ Liquid-Applied Sound Damping Technology; acrylates; ACRYSOL ™ Rheology Modifiers; AVANSE ™ Acrylic Binders; EVOQUE ™ Pre-Composite Polymer; foam cell promoters; FORMASHIELD ™ Acrylic Binder; high-quality impact modifiers; MAINCOTE ™ Acrylic Epoxy Hybrid; methacrylates; processing aids; RHOPLEX ™ Acrylic Resin; TAMOL ™ Dispersants; FASTRACK ™ Road Marking Resins; vinyl acetate monomers; weatherable acrylic capstock compounds for thermoplastic and thermosetting materials; RHOBARR ™ sustainable barrier coatings for paper packaging Acetic acid, acetone, acrylic acid, ammonia, butanol, butyl acrylate, methanol, methyl methacrylate, propylene, styrene Arkema, BASF, Celanese, Evonik, LyondellBasell, Wacker Chemie Consumer Solutions Consumer and electronics; home and personal care; industrial and chemical processing; infrastructure; mobility Adhesives and sealants; antifoams and surfactants; coatings and controlled release; coupling agents and crosslinkers; fluids, emulsions and dispersions; formulating and processing aids; granulation and binders; oils; polymers and emollients; opacifiers; reagents; resins, gels and powders; rheology modifiers; rubber; solubility enhancers; aerospace composites; surfactants and solvents; encapsulants for solar photovoltaic applications; ACUSOL ™ Prime 1 Polymer; AMPLIFY ™ Si PE 1000 Polymer System; bio-based, readily biodegradable SunSpheres ™ BIO SPF Booster; DOWSIL ™ Silicone Products; SILASTIC™ Silicone Elastomers; SYL-OFF ™ Silicone Release Coatings Methanol, platinum, silica, silicon metal Elkem, Momentive, Shin-Etsu, Wacker Chemie Current and Future Investments In 2025, growth capital projects included expanding capacity for sustainable barrier coatings in paper packaging for food and beverage markets, as well as adding new silicone intermediates and downstream product capabilities across multiple end-markets such as infrastructure; consumer and electronics; personal care; and mobility. Investments in innovation for growth are focused on addressing market needs such as thermal management in high-performance computing and artificial intelligence applications, industrial power systems and electric vehicle electronics; silicone and hybrid chemistry materials to replace fluorinated materials; high-performance materials for building and infrastructure end-markets; and innovative ingredients imparting improved haptics and performance for personal care formulations. The Company continues to make targeted incremental investments strategically focused on higher return and faster payback projects that require lower levels of capital investment in both the Coatings & Performance Monomers and Consumer Solutions businesses. These investments aim to expand manufacturing capacity, capabilities and efficiency, which further enhance competitiveness across end-markets, particularly in consumer and electronics for data center and mobility applications. Growth investments drive realization of the Company's broad product innovation portfolio where over 90 percent of projects deliver sustainability benefits.", "qwen": "neutral"}, {"nummer": "8349", "name": "Equinix, Inc.", "gics": "Real Estate", "year": "2025", "trigger": "AI", "content": "Item 7 of this Form 10-K focuses on discussion of 2025 and 2024 items as well as 2025 results as compared to 2024 results. For the discussion of 2023 items and 2024 results as compared to 2023 results, please refer to Item 7 of our 2024 Form 10-K as filed with the SEC on February 12, 2025. Our management's discussion and analysis of financial condition and results of operations is intended to assist readers in understanding our financial information from our management's perspective and is presented as follows: • Overview • Results of Operations • Non-GAAP Financial Measures • Liquidity and Capital Resources • Critical Accounting Estimates • Recent Accounting Pronouncements Overview We provide a global, vendor-neutral data center, interconnection and edge solutions platform with offerings that enable our customers to reach everywhere, interconnect everyone and integrate everything. We connect economies, countries, enterprises and communities, delivering seamless digital experiences and cutting-edge AI— quickly, efficiently and with high service reliability. Global enterprises, service providers and business ecosystems of industry partners rely on our IBX data centers and expertise around the world for the safe housing of their critical IT equipment and to protect and connect the 48 Table of Contents world's most valued information assets. They also look to Equinix for the ability to directly and securely interconnect to the networks, clouds and content that enable today's information-driven global digital economy. Our recent IBX data center openings and acquisitions, as well as xScale TM data center investments, have expanded our total global footprint to 280 data centers, including 23 xScale data centers and the MC1 and SN1 data centers that are held in unconsolidated joint ventures, across 77 markets around the world.", "qwen": "neutral"}, {"nummer": "8670", "name": "GoDaddy Inc.", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "If we, or third-party developers whose AI we rely on, do not have sufficient rights to use the data or other material used or processed by such AI technology, we also may incur liability through the actual or alleged violation of applicable laws, rules and regulations, third-party intellectual property, privacy, or other rights or contractual obligations. We may not always be able to anticipate how to comply with these legal and regulatory frameworks and we may have to expend resources to adjust our tools, solutions or business operations to meet the standards set by such frameworks, which vary by jurisdiction. Any inability to appropriately comply with the existing laws, rules and regulations that implicate aspects of AI could result in legal liability, regulatory action or brand and reputational harm. Our use of AI could also pose other concerns. If we enable or offer solutions that draw controversy or if these new offerings do not work as we intend, we may experience brand or reputational harm, competitive harm or legal liability. Further, AI may create content that appears correct but is factually inaccurate, incomplete, insufficient, biased or otherwise flawed or contains copyrighted or other protected material, which may not be easily detectable despite internal policies and diligence efforts. To the extent we or our customers rely on such results, we could incur operational inefficiencies, competitive harm, brand or reputational harm, or other adverse impacts on our business and results of operations.", "qwen": "neutral"}, {"nummer": "8752", "name": "Alphabet Inc.", "gics": "Communication Services", "year": "2025", "trigger": "TPU", "content": "Table of Contents Alphabet Inc. Making AI Helpful for Everyone We believe AI is a profound platform shift that can bring meaningful and positive change to people and societies across the world, and to our business. We aim to build the most advanced, safe, and responsible AI through our full-stack approach, which spans AI-optimized infrastructure; world-class research, including models and tooling; and our products and platforms that bring AI to billions of people, developers, and enterprises. At the foundation of our full-stack approach is our AI-optimized infrastructure — a key differentiator enabling us to power our own products, such as Search and YouTube, and support the services we provide to our Google Cloud customers. Our technical infrastructure allows us to use and offer our customers a range of AI accelerator options, including specialized Graphics Processing Units (GPUs) and our own custom-built Tensor Processing Units (TPUs), such as Ironwood, our seventh-generation TPU. We are focused on driving efficiencies in our data centers, allowing us to leverage our technical infrastructure to deliver our products and services at an increasing scale while simultaneously enabling world-class research and model development. Over the last decade, our research teams have pushed the boundaries of AI forward, which is displayed through Gemini 3, our most intelligent AI model yet. Designed to deliver advanced multimodal understanding, Gemini 3 represents our most capable iteration of agentic and generative coding technologies.", "qwen": "operative"}, {"nummer": "8786", "name": "Alphabet Inc.", "gics": "Communication Services", "year": "2025", "trigger": "frontier models", "content": "The following section generally discusses 2025 results compared to 2024 results. Discussion of 2024 results compared to 2023 results to the extent not included in this report can be found in Item 7 of our 2024 Annual Report on Form 10-K. Understanding Alphabet’s Financial Results Alphabet is a collection of businesses — the largest of which is Google. We report Google in two segments, Google Services and Google Cloud, and all non-Google businesses collectively as Other Bets. Supporting these businesses, we have centralized certain AI-related research and development focused on advanced research in AI and developing the frontier models that serve our businesses, which is reported in Alphabet-level activities. For further details on our segments, see Part I, Item 1 Business and Note 15 of the Notes to Consolidated Financial Statements included in Item 8 of this Annual Report on Form 10-K. Trends in Our Business and Financial Effect The following long-term trends have contributed to the results of our consolidated operations, and we anticipate that they will continue to affect our future results: • As we continue to grow our business and meet the evolving behaviors and needs of our users and customers, our revenue growth and mix along with our cost and margin profiles are being influenced by a number of factors, including: Expanded AI Offerings in our Products and Services: The continuing evolution of the online world has contributed to the growth of our business. We expect that this evolution, including user engagement with AI products and services, will continue to benefit our business and our revenues. As we continue to incorporate AI into our products and services, such as with AI Overviews and AI Mode in Search, and with enterprise AI solutions on our Google Cloud Platform, we may monetize differently than our historical consumer and enterprise offerings which could affect revenue growth rates and margin trends.", "qwen": "prospective"}, {"nummer": "8798", "name": "Alphabet Inc.", "gics": "Communication Services", "year": "2025", "trigger": "frontier models", "content": "We continue this work under the leadership of Alphabet and Google CEO, Sundar Pichai. Alphabet is a collection of businesses — the largest of which is Google. We report Google in two segments, Google Services and Google Cloud, and all non-Google businesses collectively as Other Bets. Supporting these businesses, we have centralized certain AI-related research and development focused on advanced research in AI and developing the frontier models that serve our businesses, which is reported in Alphabet-level activities. Alphabet's structure is about helping each of our businesses prosper through strong leaders and independence. Access and Technology for Everyone The Internet is one of the world’s most powerful equalizers; it propels ideas, people, and businesses large and small. Our mission to organize the world’s information and make it universally accessible and useful is as relevant today as it was when we were founded in 1998.", "qwen": "neutral"}, {"nummer": "8831", "name": "Alphabet Inc.", "gics": "Communication Services", "year": "2025", "trigger": "machine learning", "content": "• Developer Platform: delivers a fully managed AI development platform, through Vertex AI, for accessing, tuning, augmenting, and deploying custom models and agents, helping customers build applications with more than 200 foundation models, including our Gemini family, third-party, and open models. • Cybersecurity: provides AI-powered threat intelligence and cybersecurity solutions to help customers detect, analyze, protect against, and respond to a broad range of cybersecurity threats. • Data and Analytics: enables customers to migrate, clean, prepare, and feed data into their models. Our data platform also unifies data lakes, data warehouses, data governance, and advanced machine learning into a single platform that helps users analyze data using AI models across any cloud. • Agents: ◦ Gemini Enterprise: empowers teams to discover, create, share, and run AI agents all in one secure platform, bringing the best of Google AI to employees through an intuitive chat interface, helping to automate workflows and drive smarter business outcomes. ◦ Gemini for Google Workspace: brings our AI-powered agents into Gmail, Docs, Sheets, and more to help users write, organize, visualize, accelerate workflows, and have more productive meetings. Other Bets Across Alphabet, we are also using technology to try to solve big problems that affect a wide variety of industries, including transportation and health technology.", "qwen": "operative"}, {"nummer": "8929", "name": "Honeywell International Inc.", "gics": "Industrials", "year": "2025", "trigger": "artificial intelligence", "content": "2025 Full-year revenue of $17,510 million 2025 Full-year revenue by business unit $2,513 million $7,777 million $7,220 million Commercial Aviation Original Equipment Commercial Aviation Aftermarket Defense and Space 5 Honeywell International Inc. TABLE OF CONTENTS ABOUT HONEYWELL INDUSTRIAL AUTOMATION Industrial Automation is a global provider of industrial automation solutions that deliver intelligent, sustainable, and secure operations for customers in refining/petrochemicals, life sciences, utilities, and warehouse and logistics segments. With millions of installed assets, Industrial Automation deploys outcome-based solutions to increase asset utilization; improve operational efficiency and labor productivity; reduce carbon emissions with less energy consumption; and enhance cyber security for critical infrastructure and operational assets. Industrial Automation offerings include automation control and instrumentation products and services; smart energy products; sensing technologies with an array of custom-engineered sensors and services; gas detection technologies; and system design, advanced automation equipment, software and analytics for manufacturing, distribution, and fulfillment operations. These products and services are combined with proprietary machine learning and artificial intelligence algorithms in products and projects which are digitally enabled through our industry leading industrial Internet of Things (IoT) platform, Honeywell Forge. 2025 Full-year revenue of $9,401 million 2025 Full-year revenue by business unit $1,171 million $1,132 million $6,165 million $933 million Sensing and Safety Technologies 1 Productivity Solutions and Services 2 Process Solutions Warehouse and Workflow Solutions 2 1 On May 21, 2025, the Company completed the sale of its personal protective equipment (PPE) business which was included in the Sensing and Safety Technologies business unit. 2 On July 8, 2025, the Company announced it is evaluating strategic alternatives for its Productivity Solutions and Services and Warehouse and Workflow Solutions businesses, which are classified as held for sale as of December 31, 2025. BUILDING AUTOMATION Building Automation is a leading global provider of products, software, solutions, and technologies that enable building owners and occupants to ensure their facilities are safe, energy efficient, sustainable, and productive.", "qwen": "operative"}, {"nummer": "8936", "name": "Honeywell International Inc.", "gics": "Industrials", "year": "2025", "trigger": "artificial intelligence", "content": "Our future growth rate depends upon a number of factors, including our ability to (i) identify and evolve with emerging technological and broader industry trends, including technologies such as artificial intelligence and machine learning in our target end markets; (ii) develop and maintain competitive products; (iii) defend our market share against an ever-expanding number of competitors, including many new and non-traditional competitors; (iv) enhance our products by adding innovative features that differentiate our products from those of our competitors and prevent commoditization of our products; (v) develop, manufacture, and bring compelling new products to market quickly and cost-effectively; (vi) adequately protect the intellectual property associated with our inventions; (vii) monitor disruptive technologies and business models; (viii) achieve sufficient return on investment for new products introduced based on capital expenditures and research and development spending; (ix) respond to changes in overall trends related to end market demand; and (x) attract, develop, and retain individuals with the requisite technical expertise and understanding of customers’ needs to develop new technologies and introduce new products. Competitors may also develop after-market services and parts for our products which attract customers and adversely affect our return on investment for new products. The failure of our technologies or products to gain market acceptance due to more attractive offerings by our competitors or the failure to address any of the above factors could significantly reduce our revenues and adversely affect our competitive standing and prospects. Emerging technology, such as generative and agentic artificial intelligence, is complex and rapidly evolving, and while we aim to develop and use artificial intelligence responsibly, we may ultimately be unsuccessful in identifying or resolving all problems, and the technologies that we develop or use may ultimately be flawed, which could harm our reputation and expose us to risks related to potential infringement of others' intellectual property, biases, inaccuracies or errors in outputs from these technologies. Furthermore, any integration of third-party artificial intelligence models with our products and solutions relies on certain safeguards implemented by the third-party developers of the models, and there can be no guarantee that those safeguards are adequate to protect against the risks associated with their deployment. 33 Honeywell International Inc. TABLE OF CONTENTS RISK FACTORS Failure to increase productivity or enhance operations through sustainable operational improvements, as well as an inability to successfully execute repositioning projects or to effectively manage our workforce, may reduce our profitability or adversely impact our businesses. Our profitability and margin growth are dependent upon our ability to drive sustainable improvements.", "qwen": "neutral"}, {"nummer": "9045", "name": "Hewlett Packard Enterprise Company", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "28 Table of Content We believe the proliferation of AI, especially as it relates to our products and solutions that enable AI workloads, has had a significant impact on customer preferences and market dynamics in our industry, and our ability to effectively compete in this space has been and will remain critical to our financial performance. We incorporate AI capabilities into certain product and service offerings and internal operations, and this technology will increasingly become a more significant element of our business and certain of our partners’ businesses. As with many developing technologies, AI presents risks and challenges and may result in unintended consequences that could affect its further development, adoption, and use, and therefore our business and our overall strategy. We manufacture hardware designed to support AI capabilities, and our research into and continued development of such capabilities and manufacturing processes remain ongoing. We have invested, and expect to continue to invest, significant resources to use, acquire, build, and support the development of these capabilities and manufacturing processes, and if our AI-related offerings fail to operate as anticipated or as well as competing offerings or otherwise do not meet customer needs or if we are unable to bring AI-related offerings to market as effectively as our competitors, we may fail to recoup our investments in AI, our competitive position may be harmed, and our business and reputation may be adversely impacted. We may also be exposed to these and other risks through the increased use of AI by our manufacturers, suppliers, and other business partners. Reliance on AI by these third parties could introduce operational vulnerabilities, disrupt our supply chain management, increase cybersecurity risks, and impact our relationships with customers, partners, and suppliers.", "qwen": "prospective"}, {"nummer": "9065", "name": "Hewlett Packard Enterprise Company", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "Therefore, it is likely that these financial metrics will continue demonstrating variability in the future and may deviate from our historical results. Our revenue depends on the overall demand for our products and services, which is difficult to accurately predict, varies from time to time, may be uneven across our portfolio of offerings and our geographies, and is subject to industry-wide or broader macroeconomic market dynamics, all of which have in the past adversely impacted, and may in the future adversely impact, our business and financial condition. Additionally, the varying sizes of customer contracts or orders, variations in customer acceptances of delivered orders, the timing thereof, and cancellations and/or de-bookings of such orders (due to various reasons, including, but not limited to, failure to satisfy terms and compliance matters, whether initiated by us or the customer) can be uneven across our portfolio and have at times impacted, and in the future could impact, our pipeline, bookings, and our ability to recognize revenue, if at all (particularly with respect to contracts and orders involving our AI offerings). Further, larger orders, including some orders for our AI systems, may involve larger amounts of credit or longer payment terms than typical for our business, increasing our risk when customers do not pay in a timely fashion, or at all, particularly where payment terms with major suppliers differ from the terms with our customers. Such variables have in the past negatively impacted our financial performance, and may do so again in the future. Delays or reductions in discretionary IT spending by our customers or potential customers have had, and in the future, could have an adverse effect on demand for our products and services, which could result in a significant decline in revenue. In addition, revenue declines in some of our businesses may affect revenue in our other businesses as we may lose cross-selling opportunities.", "qwen": "neutral"}, {"nummer": "9126", "name": "Henry Schein, Inc.", "gics": "Health Care", "year": "2025", "trigger": "AI", "content": "The safeguards we have designed to promote the ethical implementation of AI may not be sufficient to protect us against negative outcomes. All of these risks are amplified by the critical nature of healthcare decisions and the sensitivity of health-related information, and the occurrence of any of the above could have a material adverse effect on our business, financial condition or operating results. Additionally, if investments in emerging technologies are less successful at attracting and retaining customers than similar investments by our competitors, or if we are otherwise unsuccessful at realizing the benefits of these technological investments generally, this could have a material adverse effect on our business, financial condition, or operating results. Additionally, widely accessible generative AI that rapidly surpasses our organizational ability to understand associated risks and opportunities (including employees’ failure to comply with principles, policies and processes governing AI usage) could endanger our intellectual property, lead to misuse or loss of data and cause reputational harm and other fines, penalties or losses. Risks inherent in acquisitions, dispositions and joint ventures could offset the anticipated benefits. One of our business strategies has been to expand in part through acquisitions and joint ventures and we expect to continue to make acquisitions and enter into joint ventures in the future. There is risk that one or more may not succeed.", "qwen": "neutral"}, {"nummer": "9196", "name": "IDEX Corporation", "gics": "Industrials", "year": "2025", "trigger": "AI", "content": "Given the unpredictability, nature and scope of cybersecurity attacks and incidents, it is possible that potential vulnerabilities could go undetected for an extended period, and it could take considerable time for the Company to obtain full and reliable information as to the extent, amount and type of information and/or systems compromised. Any imposition of liability, particularly liability that is not covered by insurance or is in excess of our insurance coverage, could materially adversely harm our operating results and financial condition. Uncertainties with Respect to the Development, Deployment, and Use of Artificial Intelligence in Our Business and Products May Result in Harm to Our Business and Reputation. We are in the initial stages of our phased approach in reviewing AI solutions and capabilities and incorporating AI into our business activities and product and service offerings. As with many innovations, AI presents risks and challenges that could adversely impact our business. The development, adoption, and use of AI technologies are still in their early stages and ineffective or inadequate AI development or deployment practices could result in unintended consequences. For example, AI algorithms may be flawed or may be based on datasets that are biased or insufficient.", "qwen": "prospective"}, {"nummer": "9198", "name": "IDEX Corporation", "gics": "Industrials", "year": "2025", "trigger": "AI", "content": "Uncertainties with Respect to the Development, Deployment, and Use of Artificial Intelligence in Our Business and Products May Result in Harm to Our Business and Reputation. We are in the initial stages of our phased approach in reviewing AI solutions and capabilities and incorporating AI into our business activities and product and service offerings. As with many innovations, AI presents risks and challenges that could adversely impact our business. The development, adoption, and use of AI technologies are still in their early stages and ineffective or inadequate AI development or deployment practices could result in unintended consequences. For example, AI algorithms may be flawed or may be based on datasets that are biased or insufficient. In addition, any disruption or failure in the AI functionality we have incorporated or may in the future incorporate into our business activities, products or services could adversely impact our business or result in delays or errors in our offerings. The legal and regulatory landscape surrounding AI technologies is rapidly evolving and uncertain, including in the areas of intellectual property, cybersecurity and privacy and data protection.", "qwen": "neutral"}, {"nummer": "9293", "name": "Intel Corporation", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "To the extent we do not effectively hire, onboard, retain and motivate key employees and leadership, our business may be harmed. We are subject to risks associated with our strategic transactions and investments. We routinely evaluate opportunities and enter into agreements for possible acquisitions, divestitures and other strategic transactions. These transactions involve numerous risks, including: ▪ failure of the transaction to advance our business strategy and failure of its anticipated benefits to materialize; ▪ disruption of our ongoing operations and diversion of our management's attention; ▪ our inability to retain key personnel of acquired or majority-owned businesses or our difficulty in integrating or separating employees, business systems and technology or otherwise operating the acquired or majority-owned business, including in areas such as AI where there is a high demand for talent; Risk Factors 48 ▪ our failure to realize a satisfactory return on our investment, potentially resulting in an impairment of goodwill and other assets, such as the $2.8 billion charge we recorded in the third quarter of 2024 primarily related to Mobileye goodwill; ▪ controls, processes and procedures of acquired or majority-owned businesses that do not adequately ensure compliance with laws and regulations and create complexity and inconsistency in application of controls, processes and procedures and our failure to identify and/or address compliance issues, including accounting or tax errors or liabilities; ▪ our failure to identify, or our underestimation of, commitments, liabilities, accounting, tax and other risks associated with acquired businesses or assets, majority-owned businesses or novel transactions; and ▪ the potential for our transactions to result in dilutive issuances of our equity securities or significant additional debt. Any of these risks could have a material adverse effect on our business, results of operations, financial condition, or cash flows, particularly in the case of a large acquisition, divestiture or partial divestiture, or several concurrent strategic transactions. Moreover, our resources are limited and our decision to pursue a transaction has opportunity costs; accordingly, if we pursue a particular transaction, we at times need to forgo the prospect of entering into other transactions or otherwise investing our resources in a manner that could help us achieve our financial or strategic objectives. We are subject to sales-related risks.", "qwen": "neutral"}, {"nummer": "9460", "name": "Gartner, Inc.", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "Additionally, significant 7 delays in new product or service releases or significant problems in creating new products or services could materially adversely affect our business, results of operations and financial position. Technology is rapidly evolving, and if we do not continue to develop new product and service offerings in response to these changes, our business could suffer. Disruptive technologies, including in areas of artificial intelligence (“AI”) and machine learning, are rapidly changing the environment in which we, our clients, and our competitors operate and could affect the nature of how we generate revenue. We anticipate encountering more competition with increased adoption of AI services in the markets in which we compete. We will need to continue to respond to and anticipate these changes by enhancing our product and service offerings to maintain our competitive position. However, we may not be successful in responding to these forces and enhancing our product and service offerings on a timely basis or in a cost-efficient manner, and any enhancements we develop may not adequately address the changing needs of our clients. Our future success will depend upon our ability to develop and introduce in a timely manner new offerings, or enhancements to existing offerings, that address the changing needs of this constantly evolving marketplace.", "qwen": "prospective"}, {"nummer": "9561", "name": "The Kroger Co.", "gics": "Consumer Staples", "year": "2025", "trigger": "AI", "content": "​ Rapidly evolving technological and regulatory developments related to Artificial Intelligence (“AI”) and related technologies may increase competitive, legal, and security risks facing the Company. While we are utilizing AI and machine learning capabilities across our business, our competitors or other third parties may incorporate AI into their products, services and operations more successfully, which could impair our ability to compete effectively, or adversely affect our results of operations or our ability to improve operational efficiency. ​ To effectively compete, we may need to increase investments to innovate new capabilities and processes incorporating AI as well as to develop appropriate protections, safeguards, and policies for handling data and mitigating information security, data privacy and legal risks. Furthermore, the regulatory and legal landscape regarding AI is rapidly evolving and the Company may be challenged to timely comply in a cost-effective manner. ​ Through our sales and marketing activities, we collect and store some personal information that our customers provide to us. We also gather and retain information about our associates in the normal course of business. Under certain circumstances, we may share information with third parties that assist us in conducting our business, as required by law, or otherwise in accordance with our privacy policy.", "qwen": "neutral"}, {"nummer": "9578", "name": "Leidos Holdings, Inc.", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "We utilize artificial intelligence, including generative artificial intelligence, machine learning, and similar tools and technologies that collect, aggregate, analyze, or generate data or other materials or content (collectively, “AI”) in connection with our business. There are significant risks involved in using AI and no assurance can be provided that our use of AI will enhance our products or services, produce the intended results, or keep pace with our competitors. For example, AI algorithms may be flawed, insufficient, of poor quality, rely upon incorrect or inaccurate data, reflect unwanted forms of bias, or contain other errors or inadequacies, any of which may not be easily detectable; AI has been known to produce false or “hallucinatory” inferences or outputs; our use of AI can present ethical issues and may subject us to new or heightened legal, regulatory, ethical, or other challenges; and inappropriate or controversial data practices by developers and end-users, or other factors adversely affecting public opinion of AI, could impair the acceptance of AI solutions, including those incorporated in our products and services. If the AI tools that we use are deficient, inaccurate, or controversial, we could incur operational inefficiencies, competitive harm, legal liability, brand or reputational harm, or other adverse impacts on our business and financial results. If we do not have sufficient rights to use the data or other material or content on which the AI tools we use rely, we also may incur liability through the violation of applicable laws and regulations, third-party intellectual property, data privacy, or other rights, or contracts to which we are a party. In addition, AI regulation is rapidly evolving worldwide as legislators and regulators increasingly focus on these powerful emerging technologies. The technologies underlying AI and its uses are subject to a variety of laws and regulations, including intellectual property, data privacy and security, consumer protection, competition, and equal opportunity laws, and are expected to be subject to increased regulation and new laws or new applications of existing laws and regulations.", "qwen": "neutral"}, {"nummer": "9655", "name": "Lowe's Companies, Inc.", "gics": "Consumer Discretionary", "year": "2025", "trigger": "AI", "content": "We currently leverage internally developed and third-party developed AI, including both predictive and generative AI-powered solutions, to facilitate a more efficient operation of our business and to enhance the experience of our customers. We have developed an AI framework designed to enhance the customer experience and unlock productivity across three pillars – how we sell, how we shop, and how we work. We use AI-powered solutions designed to enable quick and personalized customer interactions, design assistance platforms, and tools for better forecasting, sourcing, inventory planning, and faster fulfillment. We face risk of competitive disadvantage if our competitors more effectively use AI to better serve customers, drive internal efficiencies, and create new or enhanced products or services. Additionally, we are making investments to expand our AI capabilities in our business, including ongoing deployment and improvement of existing machine learning and AI technologies, as well as developing new features using AI technologies. We anticipate increased investments in the future to improve our use of AI, however, there can be no assurance that the development or usage of, or our investments in, AI will always enhance our products or services or be beneficial to our business. Further, the rapidly evolving legal and regulatory environment relating to AI and privacy could impact our implementation of AI technology and increase compliance costs and the risk of non-compliance.", "qwen": "operative"}, {"nummer": "9675", "name": "Southwest Airlines Co.", "gics": "Industrials", "year": "2025", "trigger": "AI", "content": "The Company is expanding its use of AI and machine-learning. Any failure in the Company’s AI implementation strategy, compliance with regulations, or failure to otherwise manage the risks related to AI technologies effectively could materially adversely affect its operations, reputation, and/or financial position. The Company is expanding its use of AI and machine-learning to carry out elements of its business strategy. The implementation of AI technologies also presents significant operational, legal, and competitive risks to the Company. Although the Company believes it diligently evaluates, governs, tests, and deploys AI-related technologies, the Company could face numerous AI-related challenges, such as cybersecurity vulnerabilities, algorithmic biases or errors, evolving regulatory requirements across jurisdictions, and potential competitive disadvantage if the Company’s competitors deploy AI technologies more quickly or more successfully. The complex and evolving regulatory landscape surrounding AI technologies, including regarding violations of intellectual property rights and data privacy concerns, creates additional compliance challenges and potential liability. For example, emerging regulations, state laws, and other proposed legislation around AI may require companies that develop or deploy AI systems to establish formal governance structures and internal controls, including designated oversight personnel, documented risk assessment procedures, and regular compliance reviews of their AI systems.", "qwen": "neutral"}, {"nummer": "9764", "name": "Microchip Technology Incorporated", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "If we enable or offer solutions that draw controversy due to their perceived or actual impact on society, such as AI solutions that have unintended consequences, infringe copyright or rights of publicity, or are controversial because of their impact on human rights, privacy, employment or other social, economic or political issues, or if we are unable to develop effective internal policies and frameworks relating to the responsible development and use of AI enabling products, we may experience brand or reputational harm, competitive harm or legal liability. Complying with regulations from different jurisdictions related to AI could increase our cost of doing business, may change the way that we operate in certain jurisdictions, or may impede our ability to use AI in our internal operations or offer certain products and services in certain jurisdictions if we are unable to comply with regulations. Compliance with existing and proposed government regulation of AI, including in jurisdictions such as the EU, may also increase the cost of related research and development, and create additional reporting and/or transparency requirements. New and updated AI regulations could impose onerous obligations that may disadvantage us and require us to change our business practices, which may negatively impact our financial results. Our failure to comply with federal, state, or international laws and regulations regarding privacy, data protection and handling, and cybersecurity may materially adversely affect our business, results of operations and financial condition. We are subject to numerous laws and regulations in the U.S. and internationally regarding privacy, data protection and handling, and cybersecurity, such as the European Union’s (EU) General Data Protection Regulation (GDPR), the U.K. equivalent to the GDPR, and the California Consumer Privacy Act (CCPA) as amended by the California Privacy Rights Act (CPRA), and the EU Cyber Resilience Act and Cybersecurity Act. The scope of these laws and regulations is rapidly evolving, subject to differing interpretations, and may be inconsistent among jurisdictions.", "qwen": "neutral"}, {"nummer": "9772", "name": "McKesson Corporation", "gics": "Health Care", "year": "2025", "trigger": "AI", "content": "Refer to Financial Note 2 , “ Business Acquisitions and Divestitures ,” to the consolidated financial statements included in this Annual Report for additional information on our European divestitures. 7 Table of Contents Item 1 Index McKESSON CORPORATION Investments, Restructuring, Business Combinations, and Divestitures We invest in new and existing distribution centers to increase scale and capacity, improve efficiency through automation and technology, and enhance regulatory compliance capabilities. Additionally, we invest in data and analytics to support our growth priorities, including artificial intelligence (“AI”). We are in the early stages of exploring potential AI capabilities and related data and analytics across our enterprise to improve productivity and efficiency, as well as enhance our products and services to better support patients, employees, and customers. We have undertaken additional strategic initiatives in recent years designed to increase operational efficiencies, focus on our core healthcare businesses, execute our business strategy, and enhance our competitive position. These initiatives are detailed in Financial Note 2 , “ Business Acquisitions and Divestitures , ” and Financial Note 3 , “ Restructuring, Impairment, and Related Charges, Net ,” to the consolidated financial statements included in this Annual Report. Competition We operate in highly competitive environments in North America and Norway.", "qwen": "prospective"}, {"nummer": "9864", "name": "Moderna, Inc.", "gics": "Health Care", "year": "2025", "trigger": "ChatGPT", "content": "In early 2023, we began a collaboration with OpenAI to co-innovate with a shared vision of AI’s transformative potential in the future of business and healthcare. In 2024, our AI culture led to the deployment across the company of ChatGPT Enterprise and its enhanced capabilities such as Advanced Analytics, Image Generation and GPTs. These GPTs are now embedded across our business functions, including legal, research, manufacturing and commercial, helping to drive productivity. For example, our Dose ID GPT uses ChatGPT Enterprise’s Advanced Data Analytics feature to further evaluate the optimal vaccine dose selected by the clinical study team. By applying standard dose selection criteria and principles, Dose ID provides a rationale, references its sources, and generates informative charts illustrating the key findings. This allows for a detailed review, led by humans and augmented with AI input, while prioritizing safety and optimizing the vaccine dose profile prior to further development in late-stage clinical trials. In 2025, we continued to scale our use of generative AI across the enterprise while further strengthening governance, security and responsible AI controls to support safe and compliant adoption.", "qwen": "operative"}, {"nummer": "9892", "name": "MSCI Inc.", "gics": "Financials", "year": "2025", "trigger": "AI", "content": "These capabilities and technologies enable more efficient data collection, enhance content and support quality-control processes. They also allow us to more effectively scale operations and enhance our product development processes. We have developed AI-enabled solutions including AI Portfolio Insights, which features a generative AI-powered interface to help deliver risk and portfolio insights, and GeoSpatial Asset Intelligence, which incorporates AI-driven data processing to help clients analyze location-specific exposures. We designed our AI governance framework, which includes review and approval processes for AI uses, to provide oversight designed to support responsible use, data protection and risk management. • Modernizing how we build and operate software. We are enhancing our software development and operations practices to deliver new capabilities faster, reduce service interruptions and increase quality. These efforts include enhancing automation, testing, operational monitoring and secure development practices.", "qwen": "operative"}, {"nummer": "9981", "name": "Microsoft Corporation", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "Inadequate account security practices may also result in unauthorized access, and user activity may result in ransomware or other malicious software impacting a customer’s use of our products or services. Weaknesses in our development processes can result in vulnerabilities in our products. Open source software can also contain vulnerabilities that may make our products susceptible to cyberattacks as we increasingly incorporate open source software into our products. Additionally, features that rely on generative AI can be susceptible to security threats. Our customers operate complex systems with third-party hardware and software from multiple vendors that may include systems acquired over many years. They expect our products and services to support all these systems and products, including those that no longer incorporate the strongest current security advances or standards. As a result, we may not be able to discontinue support in our services for a product, service, standard, or feature solely because a more secure alternative is available.", "qwen": "neutral"}, {"nummer": "10134", "name": "ServiceNow, Inc.", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "It can simultaneously identify issues from a customer’s IT infrastructure (e.g., physical servers) and digital components (e.g., email), which helps organizations better manage potential disruptions to business services. ITOM also maintains a single record of all IT configurable items, providing organizations better control over on-premises or cloud-based infrastructures while orchestrating key processes and tasks. Now Assist and AI agents for ITOM simplify complex technical language into easy-to-understand descriptions and provide quick resolution recommendations to IT operations issues. When integrated with our other products such as IT Service Management, ITOM AI agents can help support an organization’s goals to achieve autonomous IT management to help reduce the risk of outages, improve productivity and enhance service reliability. IT Service Management IT Service Management, or ITSM, provides predictive intelligence, incident management and response, routine task and request automation, performance analytics and process optimization. ITSM’s real-time tracking and validation enable quick, controlled IT service deployment for change management, development and operations, which helps organizations manage their IT risk and regulatory requirements. ITSM also includes integrated knowledge management and collaboration tools to streamline issue resolution.", "qwen": "operative"}, {"nummer": "10281", "name": "NVIDIA Corporation", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "In addition, generative AI is expanding the market for our workstation-class GPUs, as more enterprise customers develop and deploy AI applications with their data on-premises. Headquartered in Santa Clara, California, NVIDIA was incorporated in California in April 1993 and reincorporated in Delaware in April 1998. Our Businesses We report our business results in two segments. The Compute & Networking segment includes our Data Center accelerated computing platforms and AI solutions and software; networking; automotive platforms and autonomous and electric vehicle solutions; Jetson for robotics and other embedded platforms; and DGX Cloud computing services. The Graphics segment includes GeForce GPUs for gaming and PCs, the GeForce NOW game streaming service and related infrastructure, and solutions for gaming platforms; Quadro/NVIDIA RTX GPUs for enterprise workstation graphics; virtual GPU, or vGPU, software for cloud-based visual and virtual computing; automotive platforms for infotainment systems; and Omniverse Enterprise software for building and operating industrial AI and digital twin applications. Our Markets We specialize in markets where our computing platforms can provide tremendous acceleration for applications. These platforms incorporate processors, interconnects, software, algorithms, systems, and services to deliver unique value.", "qwen": "neutral"}, {"nummer": "10300", "name": "NVIDIA Corporation", "gics": "Information Technology", "year": "2025", "trigger": "automated driving", "content": "Many leading 3D design and content creation applications developed by our ecosystem partners now support RTX, allowing professionals to accelerate and transform their workflows with NVIDIA RTX GPUs and software. We offer NVIDIA Omniverse as a development platform and operating system for building and running virtual world simulation applications, available as a software subscription for enterprise use and free for individual use. Industrial enterprises are adopting Omniverse’s 3D and simulation technologies to digitalize their complex physical assets, processes, and environments – building digital twins of factories, real time 3D product configurators, testing and validating autonomous robots and vehicles, powered by NVIDIA accelerated computing infrastructure on-premises and in the cloud. 6 Table of Contents Automotive Automotive is comprised of platform solutions for automated driving from the cloud to the car. Leveraging our technology leadership in AI and building on our long-standing automotive relationships, we are delivering a complete end-to-end solution for the AV market under the DRIVE Hyperion brand. We have demonstrated multiple applications of AI within the car: AI can drive the car itself as a pilot in fully autonomous mode or it can also be a co-pilot, assisting the human driver while creating a safer driving experience. We are working with several hundred partners in the automotive ecosystem including automakers, truck makers, tier-one suppliers, sensor manufacturers, automotive research institutions, HD mapping companies, and startups to develop and deploy AI systems for self-driving vehicles.", "qwen": "operative"}, {"nummer": "10404", "name": "ON Semiconductor Corporation", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "We believe that our ability to offer a broad range of products, combined with our global manufacturing and logistics network, provides our customers with single source purchasing. 7 Table of Contents The following table illustrates the product technologies under each of our segments based on our operating strategy: PSG AMG ISG 2025 Revenue (%) 47% 38% 15% SiC products Analog products Actuator Drivers SiC JFET products ASIC products CMOS image sensors Discrete products Logic and Isolation products Image Signal Processors MOSFET products Non-Volatile Memory products Single Photon Detectors Power Module products Ultrasonic Short-Wavelength Infrared Vertical GaN Inductive sensing Indirect Time of Flight sensors Gate Driver products See Note 3: ''Segments and Revenue'' in the notes to our audited consolidated financial statements included elsewhere in this Form 10-K for other information regarding our segments, their revenue and gross profit derived from each segment. Products and Technology The following provides certain information regarding the products and technologies for each of our operating segments. PSG PSG provides a broad portfolio of discrete, module, and integrated semiconductor devices designed to enable high‑efficiency and high‑power conversion across AI data centers, energy infrastructure, automotive and industrial. Our offerings include power switching devices, signal conditioning products, and circuit‑protection technologies that support increasing demands for performance, power density and system reliability. Market demand for PSG products continues to be driven by vehicle electrification, renewable energy expansion, modernization of global power infrastructure, and the rapid scaling of AI and high‑performance computing systems. PSG’s Silicon & WBG power technologies, spanning FETs and diodes, play a critical role in high‑power conversion for energy infrastructure, energy storage, AI data centers, fast-charging systems, electric vehicles and industrial drives.", "qwen": "prospective"}, {"nummer": "10416", "name": "ON Semiconductor Corporation", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "Our extensive range of power technologies are used to help power AI data centers and we expect this part of our business to grow. The emergence of big data and new tools such as machine learning and AI that capitalize on the availability of large data sets is leading semiconductor manufacturers to pursue new products and approaches, and there is intense competition to capture a share of this emerging market. We may not be able to develop and offer the technology solutions that our AI-focused customers demand in a timely manner or effectively, which could have a materially adverse effect on our business. Our failure to commercialize new technologies that can power AI data centers in a timely manner or at all could result in a loss of market share, unanticipated costs and inventory obsolescence, which could adversely affect our financial results. In addition, if AI-related technologies fail to achieve the effectiveness or adoption levels currently anticipated, including due to insufficient available power or other utilities, or if our customers delay or scale back their AI deployments, demand for our AI-related products and solutions and returns on associated investments could be materially lower than we currently expect. As with many new emerging technologies, AI presents risks and challenges and has prompted legal, social and ethical concerns relating to its responsible use that could affect its adoption. Third-party misuse of AI applications, models, or solutions, or ineffective or inadequate AI development or deployment practices by our customers could cause harm to individuals or society and impair the public’s acceptance of AI, which would in turn adversely affect our business.", "qwen": "neutral"}, {"nummer": "10477", "name": "Palo Alto Networks, Inc.", "gics": "Information Technology", "year": "2025", "trigger": "ML-powered", "content": "Prisma ® Access, when combined with Prisma SD-WAN, provides a comprehensive single-vendor SASE offering that is used to secure remote workforces and cloud-delivered branch offices. Prisma Access Browser further extends SASE security and data protection to the end user device, providing workers with freedom to access business applications securely using our secure browser from any device. • Next-Generation Firewalls . Our hardware ML-Powered Next-Generation Firewalls (“NGFWs”) secure on-premises environments including campus locations and data centers. Our software NGFWs secure cloud networks. • Cloud-Delivered Security Services (“CDSS”) . Our network security platform integrates a suite of CDSS that complements our SASE and Firewall solutions.", "qwen": "operative"}, {"nummer": "10486", "name": "Palo Alto Networks, Inc.", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "Our elite consultants serve as trusted advisors to our customers by assessing and testing their security controls against sophisticated threats, transforming their security strategy with a threat-informed approach, and responding to security incidents on behalf of our clients. Additionally, Unit 42 offers managed detection and response (“MDR”) and managed threat hunting services. Products and Services NETWORK SECURITY Secure Access Service Edge • Prisma Access. Prisma Access is a cloud-delivered security offering that helps organizations deliver consistent AI-driven security to remote networks and mobile users. With more than 100 locations around the world, Prisma Access offers global coverage, consistently inspecting all traffic across all ports and providing bidirectional networking to enable branch-to-branch and branch-to-headquarter traffic. Prisma Access consolidates point products into a single cloud-delivered solution, transforming network security and allowing organizations to enable secure hybrid work. Prisma Access protects all application traffic with complete, best-in-class security while also delivering a seamless user experience with industry-leading service-level agreements (“SLA”s).", "qwen": "operative"}, {"nummer": "10533", "name": "Palo Alto Networks, Inc.", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "Our products are designed for different performance requirements throughout an organization, ranging from our PA-400, which is designed for small organizations and remote or branch offices, to our top-of-the-line PA-7500, which is designed for large-scale data centers and service provider use. The same firewall functionality that is delivered in our hardware products is also available in our VM-Series virtual firewalls, which secure virtualized and cloud-based computing environments, and in our CN-Series container firewalls, which secure container environments and traffic. - 43 - Table of Contents Our subscription and support revenue grew to $7.4 billion or 80.5% of total revenue for fiscal 2025, representing year-over-year growth of 15.5%. Our subscriptions provide our end-customers with near real-time access to the latest intrusion prevention, web security, modern malware prevention, data loss prevention, CASB and AI security capabilities across the network, endpoints, and the cloud. Our subscriptions also include security operations, which enable customers to leverage the AI-powered Cortex platform for advanced capabilities such as security information and event management, next-generation antivirus, endpoint detection and response, extended detection and response, identity threat detection and response, cloud detection and response, SOAR, ASM, and CNAPP for comprehensive cloud security. Additionally, we offer MDR for Cortex subscriptions, powered by Unit 42’s elite expertise. When customers purchase our physical, virtual, or container firewalls, or certain cloud offerings, they typically purchase support in order to receive ongoing security updates, upgrades, bug fixes, and repairs.", "qwen": "prospective"}, {"nummer": "10618", "name": "Palantir Technologies Inc.", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "For example, governmental bodies have implemented laws and are considering further regulation of AI (including machine learning), which could negatively impact our ability to use and develop platforms and products incorporating these technologies. The European Union Parliament adopted the EU AIA, that, despite recent moves to delay the implementation of some provisions, when effective, will likely impose onerous obligations related to the development, sale and use of AI-related systems. In addition, Colorado has passed a Consumer Protections for Artificial Intelligence bill introducing state-level oversight of “high-risk” AI systems, which mirrors language and several provisions appearing in the EU AIA. Many states, notably California, Utah, and Texas have signed private-sector AI governance legislation focused on various aspects of AI oversight. Further, certain administrations have encouraged companies to sign on to voluntary commitments to manage the risks posed by AI alongside related legislative or regulatory efforts, some of which we have signed. When such legislation or commitments, or if similar legislation or commitments in other jurisdictions, are enacted or adopted, compliance with such obligations may be difficult, onerous, and costly, and could adversely affect our business, reputation, financial condition, results of operations, and growth prospects. Many governments have enacted laws requiring companies to provide notice of data security breaches or incidents involving certain types of data, including personal data.", "qwen": "neutral"}, {"nummer": "10648", "name": "Pinnacle West Capital Corporation", "gics": "Utilities", "year": "2025", "trigger": "artificial intelligence", "content": "Many of the products and processes resulting from these and other alternative technologies, including energy storage technologies, have not yet been widely used or tested on a long-term basis, and their use on large-scale systems is not as established or mature as APS’s existing technologies and equipment. The implementation of new and additional technologies adds complexity to our information technology and operational technology systems, which could require additional infrastructure and resources. APS’s strategy, including the timing of such strategy, in adopting new technologies, such as artificial intelligence, could also adversely impact APS’s business. For example, if APS fails to strategically implement artificial intelligence, it could miss the opportunity for cost savings, face increasing costs on legacy systems, insufficiently integrate internal and external data sets, or invest in low data quality, risk misusing artificial intelligence, impact employee satisfaction with its implementation of or failure to implement artificial intelligence and other technologies. Widespread installation and acceptance of new technologies could also enable the entry of new market participants, such as technology companies, into the interface between APS and its customers and could have other unpredictable effects on APS’s traditional business model. Deployment of renewable energy technologies is expected to continue across the western states and result in a larger portion of the overall energy production coming from these sources. These trends, which have benefited from historical and continuing government support for certain technologies, have the potential to put downward pressure on wholesale power prices throughout the western states which could make APS’s existing generating facilities less economical and impact their operational patterns and long-term viability.", "qwen": "prospective"}, {"nummer": "10739", "name": "Qnity Electronics, Inc.", "gics": "Information Technology", "year": "2025", "trigger": "artificial intelligence", "content": "CMP pads have served as the industry standard for many years, and we have a leading position in advanced technology nodes. We also offer advanced features which can be used across product families to further meet the individual needs of customers, including groove designs and windows. Key brands include IC1000™, Ikonic™, Visionpad™, Optivision™, Politex™, Suba™ and Emblem™ Lithographic Materials Lithographic materials, such as photoresists and anti-reflective coating materials, help create precise patterns for modern semiconductor devices. These materials provide high resolution and reliability, supporting innovations in computing, artificial intelligence and next-generation automotive technology. We offer materials for all lithography wavelengths, including ultraviolet, deep ultraviolet and EUV lithography. We have a long history in lithography technology with many industry-first innovations and a breadth of offerings. Key brands include EPIC™, EON™, AR™, MICROPOSIT™, MEGAPOSIT™, UVN™, CTO™ and SPR™.", "qwen": "neutral"}, {"nummer": "10835", "name": "Roper Technologies, Inc.", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "We believe our market positions are attributable to the applications expertise used to create high value products and solutions for our customers, the underl
