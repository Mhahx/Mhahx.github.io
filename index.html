<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d1318">
<title>Sentiment Review · 150</title>
<style>
  :root{
    --op:#2db865; --pro:#d4961a; --neu:#4a6d86; --not:#b0451f;
    --bg1:#0d1318; --bg2:#131c24;
    --card:#19222e; --border:#243041;
    --ink:#e8eef3; --muted:#7a94a8;
    --safe-t:env(safe-area-inset-top); --safe-b:env(safe-area-inset-bottom);
  }
  *,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;margin:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
       background:linear-gradient(170deg,var(--bg1),var(--bg2) 60%);color:var(--ink);
       display:flex;flex-direction:column;align-items:center;
       height:100vh;height:100dvh;overflow:hidden;
       padding:var(--safe-t) 0 var(--safe-b)}

  /* header */
  header{width:100%;max-width:480px;padding:12px 20px 8px;flex:0 0 auto}
  .hrow{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .hrow h1{font-size:13px;font-weight:600;margin:0;letter-spacing:.3px;color:var(--muted)}
  .hrow span{font-size:12px;color:var(--muted)}
  .bar{height:4px;background:#1e2d38;border-radius:99px;overflow:hidden}
  .bar i{display:block;height:100%;width:0;border-radius:99px;
         background:linear-gradient(90deg,var(--op),#4dc8ff);transition:width .35s cubic-bezier(.4,0,.2,1)}

  /* stage */
  .stage{width:100%;max-width:480px;flex:1 1 auto;min-height:0;
         padding:8px 16px 0;display:flex;flex-direction:column}

  /* deck — card stack */
  .deck{position:relative;flex:1 1 auto;min-height:0;margin-bottom:10px}
  .ghost{position:absolute;top:0;left:0;right:0;bottom:0;
         border-radius:24px;transform-origin:top center}
  .ghost1{background:#18212c;border:1px solid #1e2d3a;
          transform:scale(.965) translateY(7px);z-index:1}
  .ghost2{background:#141b26;border:1px solid #1a2535;
          transform:scale(.93) translateY(14px);z-index:0}

  /* active card */
  .card{position:absolute;top:0;left:0;right:0;bottom:0;z-index:10;
        background:var(--card);border:1px solid var(--border);border-radius:24px;
        box-shadow:0 24px 64px rgba(0,0,0,.55);
        display:flex;flex-direction:column;overflow:hidden;
        touch-action:pan-y;will-change:transform;cursor:grab}
  .card:active{cursor:grabbing}

  /* drag overlay tint */
  .tint{position:absolute;inset:0;z-index:20;pointer-events:none;
        border-radius:inherit;opacity:0}

  /* swipe direction labels */
  .slbl{position:absolute;z-index:30;padding:7px 14px;border-radius:11px;
        font-size:19px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;
        border:3px solid;opacity:0;pointer-events:none;transition:opacity .07s}
  .slbl.op {top:22px;left:22px;color:var(--op);border-color:var(--op);transform:rotate(-12deg)}
  .slbl.neu{top:22px;right:22px;color:var(--neu);border-color:var(--neu);transform:rotate(12deg)}
  .slbl.pro{top:24px;left:50%;transform:translateX(-50%) rotate(-3deg);color:var(--pro);border-color:var(--pro)}
  .slbl.not{bottom:24px;left:50%;transform:translateX(-50%) rotate(3deg);color:var(--not);border-color:var(--not)}

  /* card header */
  .chead{flex:0 0 auto;padding:18px 18px 0}
  .chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
  .chip{font-size:11px;padding:2px 9px;border-radius:99px;background:#1e2d3a;color:var(--muted)}
  .chip.trig{background:#1d3448;color:#7fd0ff;font-weight:600}
  .chip.haiku{background:#29203e;color:#b090f0}
  .company{font-size:19px;font-weight:700;margin:0 0 3px;line-height:1.2}
  .cmeta{font-size:12px;color:var(--muted);margin-bottom:14px}
  .cdiv{height:1px;background:var(--border);margin:0 18px}

  /* scrollable text body */
  .cbody{flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;
         padding:14px 18px 20px;font-size:15px;line-height:1.65;color:#ccd8e2}
  .cbody mark{background:#284820;color:#a8f070;padding:1px 2px;border-radius:3px}

  /* circular action buttons */
  .actions{display:flex;justify-content:center;align-items:center;
           gap:16px;padding:4px 0 6px;flex:0 0 auto}
  .act{width:62px;height:62px;border-radius:50%;border:none;cursor:pointer;
       display:flex;flex-direction:column;align-items:center;justify-content:center;
       color:#fff;box-shadow:0 6px 18px rgba(0,0,0,.45);
       transition:transform .1s,box-shadow .1s;-webkit-user-select:none;user-select:none}
  .act .icon{font-size:23px;line-height:1}
  .act .lbl{font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;margin-top:2px;opacity:.8}
  .act:active{transform:scale(.88);box-shadow:0 2px 8px rgba(0,0,0,.3)}
  .act-op {background:radial-gradient(circle at 38% 35%,#3dca70,var(--op))}
  .act-pro{background:radial-gradient(circle at 38% 35%,#f5bf3e,var(--pro));color:#1a1205}
  .act-pro .lbl{color:rgba(26,18,5,.75)}
  .act-neu{background:radial-gradient(circle at 38% 35%,#638fa8,var(--neu))}
  .act-not{background:radial-gradient(circle at 38% 35%,#c96040,var(--not))}

  /* toolbar */
  .toolbar{display:flex;flex-wrap:wrap;justify-content:center;gap:3px 14px;
           padding:2px 0 5px;font-size:12px;color:var(--muted);flex:0 0 auto}
  .toolbar a{cursor:pointer;text-decoration:none;padding:4px 2px;
             -webkit-user-select:none;user-select:none}
  .toolbar a:hover{color:var(--ink)}

  /* hints strip */
  .hints{display:none;flex-wrap:wrap;justify-content:center;gap:5px;
         padding:3px 0 2px;flex:0 0 auto}
  .hints.on{display:flex}
  .hchip{font-size:11px;padding:3px 10px;border-radius:99px;background:#1e2d3a;color:var(--muted)}
  .hchip b{color:var(--ink)}

  /* previous-choice line */
  .prev{text-align:center;font-size:12px;color:var(--muted);min-height:16px;
        padding:2px 0 3px;flex:0 0 auto}
  .prev b{color:#7fd0ff}

  /* summary */
  .summary{display:none;width:100%;max-width:480px;padding:24px 20px;overflow-y:auto}
  .summary.on{display:block}
  .summary h2{font-size:20px;margin:0 0 16px}
  .sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
  .scell{background:var(--card);border:1px solid var(--border);border-radius:14px;
         padding:10px 4px;text-align:center}
  .scell b{font-size:22px;display:block;margin-bottom:2px}
  .scell span{font-size:10px;color:var(--muted)}
  .kpi{font-size:14px;color:var(--muted);line-height:1.8;margin-bottom:14px}
  .kpi b{color:var(--ink)}
  .agrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:20px}
  .acell{background:var(--card);border:1px solid var(--border);border-radius:12px;
         padding:10px 6px;text-align:center;font-size:12px}
  .acell b{font-size:18px;display:block;margin-bottom:2px}
  .dlbtn{display:inline-block;padding:12px 20px;border-radius:14px;font-weight:700;
         font-size:14px;cursor:pointer;border:none;margin:4px 6px 0 0;color:#fff;
         background:var(--op)}
  .dlbtn.sec{background:#1e2d38}

  @media(max-width:380px){
    .act{width:54px;height:54px}
    .act .icon{font-size:20px}
    .company{font-size:17px}
    .sgrid{grid-template-columns:repeat(2,1fr)}
  }
</style>
</head>
<body>

<header>
  <div class="hrow">
    <h1>Sentiment Review · Stratified 150</h1>
    <span id="counter">0 / 150</span>
  </div>
  <div class="bar"><i id="prog"></i></div>
</header>

<div class="stage" id="stage">
  <div class="deck">
    <div class="ghost ghost2"></div>
    <div class="ghost ghost1"></div>
    <div class="card" id="card">
      <div class="tint" id="tint"></div>
      <span class="slbl op"  id="lblOp" >OPERATIVE</span>
      <span class="slbl neu" id="lblNeu">NEUTRAL</span>
      <span class="slbl pro" id="lblPro">PROSPECTIVE</span>
      <span class="slbl not" id="lblNot">NOT AI</span>
      <div class="chead">
        <div class="chips" id="chips"></div>
        <div class="company" id="firm"></div>
        <div class="cmeta" id="meta"></div>
      </div>
      <div class="cdiv"></div>
      <div class="cbody" id="content"></div>
    </div>
  </div>

  <div class="actions">
    <button class="act act-neu" data-l="neutral">
      <span class="icon">✕</span><span class="lbl">neutral</span>
    </button>
    <button class="act act-pro" data-l="prospective">
      <span class="icon">★</span><span class="lbl">prosp.</span>
    </button>
    <button class="act act-op" data-l="operative">
      <span class="icon">♥</span><span class="lbl">oper.</span>
    </button>
    <button class="act act-not" data-l="not_ai">
      <span class="icon">✗</span><span class="lbl">not_ai</span>
    </button>
  </div>

  <div class="hints" id="hints">
    <span class="hchip">Qwen: <b id="hQ">—</b></span>
    <span class="hchip">Mistral: <b id="hM">—</b></span>
    <span class="hchip">Llama: <b id="hL">—</b></span>
    <span class="hchip">Ensemble: <b id="hE">—</b></span>
  </div>
  <div class="prev" id="prev"></div>

  <div class="toolbar">
    <a id="back">◀ zurück</a>
    <a id="skip">überspringen ▶</a>
    <a id="tipBtn">hints: aus</a>
    <a id="saveBtn">CSV speichern</a>
    <a id="loadLink">laden</a>
    <a id="resetBtn">reset</a>
  </div>
  <input type="file" id="loadFile" accept=".csv,text/csv" style="display:none">
</div>

<div class="summary" id="summary">
  <h2>✓ Review abgeschlossen</h2>
  <div class="sgrid" id="sgrid"></div>
  <div class="kpi"  id="kpi"></div>
  <p style="font-size:13px;color:var(--muted);margin:0 0 8px">Übereinstimmung pro Label (Ensemble):</p>
  <div class="agrid" id="agrid"></div>
  <button class="dlbtn"     id="dlBtn">CSV herunterladen</button>
  <button class="dlbtn sec" id="reopenBtn">Nochmal ansehen</button>
</div>

<script>
const DATA   = [{"nummer": "653", "name": "Palo Alto Networks, Inc.", "gics": "Information Technology", "year": "2021", "trigger": "machine learning", "content": "<content>ML-Powered Next-Generation Firewall.<\/content> <target>Our ML-Powered Next-Generation Firewalls embed machine learning in the core of the firewall, empowering our customers to stay ahead of new emerging threats, see and secure their entire enterprise, including IoT, and support speed and error reduction with automatic policy recommendations.<\/target> <content>Our ML-Powered Next-Generation Firewalls extend visibility and security to all devices connecting to an end-user’s network, including unmanaged IoT devices without the need to deploy additional sensors.<\/content>", "qwen": "operative", "mistral": "operative", "llama": "operative", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "176", "name": "CrowdStrike Holdings, Inc.", "gics": "Information Technology", "year": "2021", "trigger": "AI", "content": "<content>From the beginning, our strategy was focused on collecting data at scale, centrally storing such data in a singular model, and training our algorithms on these vast amounts of high fidelity data, which we believe is a fundamental differentiator from our competitors.<\/content> <target>Our cloud-scale AI means that the more data that is fed into our Falcon platform, the more intelligent Threat Graph becomes and the more our customers benefit, creating a powerful network effect that increases the overall value we provide.<\/target> <content>AI is revolutionizing many technology fields, including security solutions.<\/content>", "qwen": "operative", "mistral": "prospective", "llama": "operative", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "39", "name": "Advanced Micro Devices, Inc.", "gics": "Information Technology", "year": "2021", "trigger": "AI", "content": "<content>In November, 2021, we introduced the AMD Instinct MI200 series accelerators based on the 2nd Gen AMD CDNA architecture, which is optimized for HPC and AI/ML (Artificial Intelligence/Machine Learning) workloads.<\/content> <target>The MI200 series includes the MI250 Open Accelerator Module (OAM) form factor for purpose-built HPC/AI platforms and the MI210 PCIe form factor for mainstream server platforms.<\/target> <content>We also introduced the AMD Infinity Hub which provides end users with a growing catalog of containerized HPC applications and ML frameworks that are ported and optimized for AMD Instinct accelerators and AMD ROCm.<\/content>", "qwen": "operative", "mistral": "neutral", "llama": "operative", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "787", "name": "Zoetis Inc.", "gics": "Health Care", "year": "2021", "trigger": "image recognition technology", "content": "<content>In 2021 we expanded to Canada, Spain, Germany, Italy, Netherlands, Belgium and Luxembourg.<\/content> <target>Imagyst uses a combination of image recognition technology, algorithms and cloud-based artificial intelligence (AI) to deliver rapid testing results to veterinary clinics.<\/target> <content>In 2021, the company added digital cytology testing to the Vetscan Imagyst platform, which offers a network of expert remote pathologists in addition to AI technology for fecal testing.<\/content>", "qwen": "operative", "mistral": "operative", "llama": "operative", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "309", "name": "Alphabet Inc.", "gics": "Communication Services", "year": "2021", "trigger": "machine learning", "content": "<content>As we said in the original founders' letter, we will not shy away from high-risk, high-reward projects that we believe in, as they are the key to our long-term success.<\/content> <target>The power of AI Across the company, investments in AI and machine learning are increasingly driving many of our latest innovations and have enabled us to build products that are smarter and more helpful.<\/target> <content>For example, in May of 2021, we introduced Multitask Unified Model — or MUM — which has the potential to transform how Google helps with complex tasks.<\/content>", "qwen": "operative", "mistral": "prospective", "llama": "operative", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "278", "name": "F5, Inc.", "gics": "Information Technology", "year": "2021", "trigger": "artificial intelligence", "content": "<content>Adaptive applications utilize an architectural approach that can rapidly respond to changes in performance, global availability, or security problems across one or more infrastructure environments and with little to no human interaction.<\/content> <target>These apps are enabled by a near-real-time collection of live application telemetry, analyzed by machine learning and artificial intelligence techniques, and harnessed to automation toolchains to rapidly adjust infrastructure to new conditions.<\/target> <content>Key components of our strategy include: Bringing our adaptive application vision to life F5 is uniquely positioned to deliver adaptive applications.<\/content>", "qwen": "prospective", "mistral": "operative", "llama": "operative", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "251", "name": "Equifax Inc.", "gics": "Industrials", "year": "2021", "trigger": "automation solutions", "content": "<content>Our services are based on comprehensive databases of consumer and business information derived from numerous sources including credit, financial assets, telecommunications and utility payments, employment, income, educational history, criminal history, healthcare professional licensure and sanctions, demographic and marketing data.<\/content> <target>We use advanced statistical techniques, machine learning and proprietary software tools to analyze available data to create customized insights, decision-making and process automation solutions and processing services for our clients.<\/target> <content>We are a leading provider of information and solutions used in payroll-related and human resource management business process services in the United States of America (“U.S.”).<\/content>", "qwen": "operative", "mistral": "operative", "llama": "neutral", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "185", "name": "CrowdStrike Holdings, Inc.", "gics": "Information Technology", "year": "2021", "trigger": "AI", "content": "<content>Threat Graph can then learn and identify warning signs once and rapidly deliver protection to every customer in our community.<\/content> <target>Further, our AI algorithms are more effective because they are trained on such a broad and representative set of data that captures information about potential attacks throughout the entire threat lifecycle across our customer base.<\/target> <content>• High Efficacy with Low False Positives.<\/content>", "qwen": "operative", "mistral": "operative", "llama": "operative", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "778", "name": "Zebra Technologies Corporation", "gics": "Information Technology", "year": "2021", "trigger": "artificial intelligence", "content": "<content>Our workflow optimization solutions include: • Software-based solutions, which include workforce management, workflow execution and task management, demand-sensing, price optimization, prescriptive analytics, as well as communication and collaboration-based solutions.<\/content> <target>Such solutions are typically delivered through cloud-based software subscriptions and leverage big data, artificial intelligence, and mobile and web applications to provide customers with real-time visibility and actionable insights about their business.<\/target> <content>By analyzing labor, inventory, transactional and real-time situational data, these solutions are able to forecast demand, prescribe actions, schedule workers, and enhance collaboration.<\/content>", "qwen": "operative", "mistral": "operative", "llama": "neutral", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "173", "name": "CrowdStrike Holdings, Inc.", "gics": "Information Technology", "year": "2021", "trigger": "AI", "content": "<content>Threat Graph processes, correlates, and analyzes over five trillion endpoint-related events per week in real time and maintains an index of these events for future use.<\/content> <target>Threat Graph continuously looks for malicious activity by applying graph analytics and AI algorithms to the data streamed from the endpoints.<\/target> <content>Our multi-tenant architecture allows us to collect a broad array of high fidelity data about both potential attacks and benign behavioral patterns across our entire customer base, continuously enhancing our AI algorithms.<\/content>", "qwen": "operative", "mistral": "operative", "llama": "operative", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "582", "name": "NVIDIA Corporation", "gics": "Information Technology", "year": "2021", "trigger": "AI", "content": "<content>Leveraging our technology leadership in AI and building on our long-standing automotive relationships, we are delivering a complete end-to-end solution for the AV market under the DRIVE brand.<\/content> <target>NVIDIA has demonstrated multiple applications of AI within the car: AI can drive the car itself as a pilot in fully autonomous mode or it can also be a co-pilot, assisting the human driver while creating a safer driving experience.<\/target> <content>NVIDIA is working with several hundred partners in the automotive ecosystem including automakers, truck makers, tier-one suppliers, sensor manufacturers, automotive research institutions, HD mapping companies, and startups to develop and deploy AI systems for self-driving vehicles.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "neutral", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "699", "name": "SLB N.V.", "gics": "Energy", "year": "2021", "trigger": "artificial intelligence", "content": "<content>Schlumberger seeks to define the future of digital technology in the energy industry and has designed and built a secure and flexible digital industry platform centered around differentiated digital technologies.<\/content> <target>Enabled by key partnerships with companies such as Google, IBM, Microsoft, Amazon Web Services, AVEVA and NOV, Schlumberger provides an open digital platform that takes advantage of on-demand, high-performance computing and makes digital capabilities such as embedded artificial intelligence or machine learning readily accessible to customers.<\/target> <content>The application of digital technology across the entire E&P value chain—from subsurface to drilling to production—has the potential to deliver a step-change in operational workflows that will significantly elevate our customers’ performance sustainably.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "neutral", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "492", "name": "Moderna, Inc.", "gics": "Health Care", "year": "2021", "trigger": "artificial intelligence", "content": "<content>During this training program, new employees meet with members of the management team and senior functional leaders to learn about the Company and functional activities.<\/content> <target>In December 2021, we announced the launch of our Artificial Intelligence (AI) Academy in partnership with Carnegie Mellon University.<\/target> <content>The AI Academy is intended to educate and empower our workforce to identify and integrate AI and machine learning solutions into our systems and processes.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "prospective", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "109", "name": "Baker Hughes Company", "gics": "Energy", "year": "2021", "trigger": "artificial intelligence", "content": "<content>We continue to invest across all operating segments in products to enhance safety, develop capability, improve performance, and reduce costs aligned with our operational strategy.<\/content> <target>Through our Enterprise Technology Centers we also invest heavily in fundamental technologies such as materials, additive manufacturing, artificial intelligence/machine learning and other digital technologies such as computer vision, data science, and edge computing.<\/target> <content>In OFS, we continue to invest in a range of formation evaluation capabilities as well as drilling, completions, and production hardware.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "neutral", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "513", "name": "Microsoft Corporation", "gics": "Information Technology", "year": "2021", "trigger": "machine learning", "content": "<content>We are accelerating adoption of AI innovations from research to products.<\/content> <target>Our innovation helps every developer be an AI developer, with approachable new tools from Azure Machine Learning Studio for creating simple machine learning models, to the powerful Azure Machine Learning Workbench for the most advanced AI modeling and data science.<\/target> <content>From GitHub to Visual Studio, we provide a developer tool chain for everyone, no matter the technical experience, across all platforms, whether Azure, Windows, or any other cloud or client platform.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "operative", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "390", "name": "Intel Corporation", "gics": "Information Technology", "year": "2021", "trigger": "AI", "content": "<content>Industrial — We are transforming manufacturing today and expanding what is possible for tomorrow's autonomous operations.<\/content> <target>We are driving the realization of Industry 4.0 and, together with our ecosystem partners, addressing industry challenges like the convergence of information technology with operational technology, while bringing AI and analytics to operations.<\/target> <content>This enables customers to make informed decisions that lower maintenance costs, create new service opportunities, and increase productivity.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "neutral", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "87", "name": "Aptiv PLC", "gics": "Consumer Discretionary", "year": "2021", "trigger": "autonomous driving", "content": "<content>We believe that substantial strategic value will be created from our partnership with Hyundai through our commitment to a shared mission of making driverless vehicles a safe, reliable, and accessible reality.<\/content> <target>Furthermore, we anticipate Motional’s presence in both North America and Asia, along with the global presence of both Aptiv and Hyundai, to generate economies of scale to support the development of a complete autonomous driving platform, as well as to facilitate mobility infrastructure advancements.<\/target> <content>Motional began testing fully driverless systems in 2020 and anticipates it will have a production-ready autonomous driving platform available for robotaxi providers, meal delivery providers, fleet operators and automotive manufacturers to test at prototype scale in 2022, with higher volumes available for deployment in 2023.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "neutral", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "86", "name": "Aptiv PLC", "gics": "Consumer Discretionary", "year": "2021", "trigger": "autonomous driving", "content": "<content>Motional brings together one of the industry’s most innovative vehicle technology providers with one of the world’s largest OEMs.<\/content> <target>We expect this partnership to accelerate the path towards the development of production-ready autonomous driving systems for commercialization in the new mobility space.<\/target> <content>We believe that substantial strategic value will be created from our partnership with Hyundai through our commitment to a shared mission of making driverless vehicles a safe, reliable, and accessible reality.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "neutral", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "241", "name": "Dover Corporation", "gics": "Industrials", "year": "2021", "trigger": "machine learning", "content": "<content>We have continued to invest in this facility and our team of software developers, data scientists, and product managers to enhance our digital capabilities.<\/content> <target>The Digital Labs team is driving digital transformation across our businesses in three areas: (i) enhancing the customer experience through more 6 Table of Contents efficient and streamlined digital customer interfaces that make it easy to do bus iness with Dover companies; (ii) developing connected software and machine learning augmented solutions built to int egrate into and work with our core equipment and component offerings; and (iii) driving increased efficiency, safety and quality in our manufacturing operations by employing cutting-edge automation and “digital factory” solutions.<\/target> <content>We believe the Digital Labs center's contributions in these areas enable us to add significant value to our products and to capture commercial growth opportunities.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "neutral", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "244", "name": "DexCom, Inc.", "gics": "Health Care", "year": "2021", "trigger": "machine learning", "content": "<content>Over the longer term, we plan to continue to develop and improve networked platforms with open architecture, connectivity and transmitters capable of communicating with other devices.<\/content> <target>We intend to expand our efforts to accumulate CGM patient data and metrics and apply predictive modeling and machine learning to generate interactive CGM insights that can inform patient behavior.<\/target> <content>We continue to pursue and support development partnerships with insulin pump companies and companies or institutions developing insulin delivery systems, including automated insulin delivery systems.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "prospective", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "427", "name": "IQVIA Holdings Inc.", "gics": "Health Care", "year": "2021", "trigger": "natural language processing", "content": "<content>We provide access to deep clinical data in Oncology, Rare Disease, and other specialty areas.<\/content> <target>Our Natural Language Processing capabilities help us create structured data from unstructured clinical notes.<\/target> <content>We help our global customers across payers, providers, governments, and biopharmaceutical companies to answer critical questions about healthcare interventions related to safety, effectiveness, and value.<\/content>", "qwen": "neutral", "mistral": "operative", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "508", "name": "Microsoft Corporation", "gics": "Information Technology", "year": "2021", "trigger": "AI", "content": "<content>We offer integrated, end-to-end capabilities to protect people and organizations.<\/content> <target>In April 2021, we entered into a definitive agreement to acquire Nuance Communications, Inc., a cloud and AI software provider with healthcare and enterprise AI experience.<\/target> <content>The acquisition will build on our industry-specific cloud offerings.<\/content>", "qwen": "prospective", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "19", "name": "Akamai Technologies, Inc.", "gics": "Information Technology", "year": "2021", "trigger": "intelligent edge", "content": "<content>4 Table of Contents Services and Support We provide an array of service and support offerings designed to assist customers with integrating, configuring, optimizing and managing our core offerings.<\/content> <target>Once customers are deployed on the Akamai Intelligent Edge Platform, they can rely on our professional services and security experts for customized solutions, problem resolution and 24/7 customer support.<\/target> <content>Additional features are available to enterprises that purchase our premium and managed security solutions including a dedicated technical account team, proactive service monitoring, custom technical support handling, security traffic monitoring, technical security reviews, threat advisories and emergency support for security events.<\/content>", "qwen": "neutral", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "466", "name": "Microchip Technology Incorporated", "gics": "Information Technology", "year": "2021", "trigger": "artificial intelligence", "content": "<content>TSS is a combination of hardware, software and services which help our customers increase their revenue, reduce their costs and manage their risks compared to other solutions.<\/content> <target>Our synergistic product portfolio empowers disruptive growth trends, including 5G, artificial intelligence and machine learning, Internet of Things (IoT), advanced driver assist systems (ADAS) and autonomous driving, and electric vehicles, in key end markets such as automotive, aerospace and defense, communications, consumer, data centers and computing, and industrial.<\/target> <content>Impact of COVID-19 on Our Business In the first half of fiscal 2021, the COVID-19 pandemic resulted in a global disruption in economic activity by adversely affecting production, creating supply chain and market disruption, and adversely impacting businesses and individuals.<\/content>", "qwen": "neutral", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "140", "name": "The Cigna Group", "gics": "Health Care", "year": "2021", "trigger": "AI", "content": "<content>State legislatures and regulators are similarly interested in the use of AI, particularly as it is used in modeling, and a handful of states have either passed legislation or issued regulatory guidance concerning AI.<\/content> <target>Additionally, the National Association of Insurance Commissioners (\"NAIC\"), an organization of state insurance regulators, recently established the Innovation, Cybersecurity and Technology Committee to provide a forum for regulators to learn, monitor and confer on emerging technology issues, including, among others, cybersecurity and AI.<\/target> <content>The Cybersecurity Information Sharing Act of 2015 (\"CISA\") encourages organizations to share cyber threat indicators with the federal government and, among other things, directs HHS to develop a set of voluntary cybersecurity best practices for organizations in the health care industry.<\/content>", "qwen": "neutral", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "605", "name": "NVIDIA Corporation", "gics": "Information Technology", "year": "2021", "trigger": "deep learning", "content": "<content>The primary ways in which we seek to do this are summarized below, in addition to an overview of employee programs we implemented in response to the COVID-19 pandemic.<\/content> <target>Recruitment The demand for talent in new markets, such as AI and deep learning, is increasingly competitive.<\/target> <content>Our intern and new college graduate recruiting programs are a sustainable source of talent.<\/content>", "qwen": "prospective", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "547", "name": "ServiceNow, Inc.", "gics": "Information Technology", "year": "2021", "trigger": "AI", "content": "<content>Our focus is on building out our platform and products through both organic investments to support customer needs and acquisitions of talent and enhanced capabilities.<\/content> <target>For example, our larger acquisitions in 2021 focused on bringing development and operations observability and additional AI capabilities to the Now Platform and across our suite of products.<\/target> <content>Competition As customers accelerate their digital transformation plans and digital operation initiatives, they are demanding less complexity and lower total cost in the implementation, sourcing, integration and ongoing maintenance of their information technology environments.<\/content>", "qwen": "prospective", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "581", "name": "NVIDIA Corporation", "gics": "Information Technology", "year": "2021", "trigger": "AI", "content": "<content>Automotive NVIDIA’s Automotive market is comprised of cockpit infotainment solutions, AV platforms, and associated development agreements.<\/content> <target>Leveraging our technology leadership in AI and building on our long-standing automotive relationships, we are delivering a complete end-to-end solution for the AV market under the DRIVE brand.<\/target> <content>NVIDIA has demonstrated multiple applications of AI within the car: AI can drive the car itself as a pilot in fully autonomous mode or it can also be a co-pilot, assisting the human driver while creating a safer driving experience.<\/content>", "qwen": "prospective", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "455", "name": "Lumentum Holdings Inc.", "gics": "Information Technology", "year": "2021", "trigger": "autonomous vehicles", "content": "<content>Applications include biometric identification, computational photography, virtual and augmented reality, and natural user interfaces.<\/content> <target>Emerging applications for our lasers include automotive safety systems, LiDAR for advanced driver assistance systems in automobiles and autonomous vehicles, self-navigating robotics and drones in industrial applications, and 3D capture of objects coupled with 3D imaging or printing.<\/target> <content>In the industrial end-market, our diode lasers are used primarily as pump sources for pulsed and kilowatt class fiber lasers.<\/content>", "qwen": "not_ai", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "343", "name": "Henry Schein, Inc.", "gics": "Health Care", "year": "2021", "trigger": "clinical decision support", "content": "<content>The Cures Act, signed into law on December 13, 2016, among other things, amended the medical device definition to exclude certain software from FDA regulation, including certain clinical decision support software.<\/content> <target>On September 27, 2019, the FDA issued a suite of guidance documents on digital health products, which incorporated applicable Cures Act standards, including regarding the types of clinical decision support tools and other software that are exempt from regulation by the FDA as medical devices, and continues to issue new guidance in this area.<\/target> <content>Certain of our businesses involve the development and sale of software and related products to support physician and dental practice management, and it is possible that the FDA or foreign government authorities could determine that one or more of our products is subject to regulation as a medical device, which could subject us or one or more of our businesses to substantial additional requirements, costs and potential enforcement actions or liabilities for noncompliance with respect to these products.<\/content>", "qwen": "not_ai", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "1043", "name": "Equifax Inc.", "gics": "Industrials", "year": "2022", "trigger": "automation solutions", "content": "<content>Our services are based on comprehensive databases of consumer and business information derived from numerous sources including credit, financial assets, telecommunications and utility payments, employment, income, educational history, criminal history, healthcare professional licensure and sanctions, demographic and marketing data.<\/content> <target>We use advanced statistical techniques, machine learning and proprietary software tools to analyze available data to create customized insights, decision-making and process automation solutions and processing services for our clients.<\/target> <content>We are a leading provider of e-commerce fraud and charge back protection services in North America as well as information and solutions used in payroll-related and human resource management business process services in the U.S. For consumers, we provide products and services to help people understand, manage and protect their personal information and make more informed financial decisions.<\/content>", "qwen": "operative", "mistral": "operative", "llama": "operative", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "1312", "name": "Moderna, Inc.", "gics": "Health Care", "year": "2022", "trigger": "automated decision-making", "content": "<content>The equipment used in the manufacture of research-grade mRNA is integrated with the digital interfaces to capture, extract and interpret the data generated at each step of the manufacturing process, building digital traceability on each mRNA order.<\/content> <target>We have also embedded real-time algorithms and analytics tools to allow for automated decision-making at some stages, accelerate the quality control workflows and provide for continuous improvement of manufacturing processes.<\/target> <content>Dispatching and shipping mRNA: Because we produce large quantities of research-grade mRNA, we require digital tools to track their shipment to our scientists and to external contract research organizations (CROs) conducting in vivo studies.<\/content>", "qwen": "not_ai", "mistral": "operative", "llama": "neutral", "majority_vote": "operative", "tiebreaker": "claude-haiku"}, {"nummer": "1482", "name": "Oracle Corporation", "gics": "Information Technology", "year": "2022", "trigger": "machine learning", "content": "<content>The integration of Oracle Autonomous Database with other Oracle Cloud Services, such as Java Cloud and the Oracle APEX low-code service, along with open interfaces and integrations, is designed to provide developers with a modern, open platform to develop new and innovative applications.<\/content> <target>For analytics workloads, Oracle Autonomous Database is designed to provide customers with easy-to-use analytics tools and machine learning capabilities that are accelerated using Oracle Exadata’s scale-out infrastructure.<\/target> <content>We believe Oracle Autonomous Database’s built-in developer capabilities and automation will enable organizations to: • quickly deploy new data marts and data warehouses; • move existing ones to the cloud; and • create data lake houses.<\/content>", "qwen": "prospective", "mistral": "operative", "llama": "neutral", "majority_vote": "operative", "tiebreaker": "claude-haiku"}, {"nummer": "1112", "name": "Alphabet Inc.", "gics": "Communication Services", "year": "2022", "trigger": "AI", "content": "<content>Some of our most popular products at Google — including Lens and Translate — were built entirely using artificial intelligence technologies such as optical character recognition and machine learning.<\/content> <target>Google Cloud continues to build AI into numerous solutions that our customers can use to develop AI-powered applications — including processing documents, images, and translation — to understand and analyze data more efficiently, and to use packaged solutions for a variety of industries.<\/target> <content>In all these examples, AI significantly enhances the usefulness and multiplies the value of these products and services to people and organizations.<\/content>", "qwen": "operative", "mistral": "operative", "llama": "operative", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "790", "name": "Airbnb, Inc.", "gics": "Consumer Discretionary", "year": "2022", "trigger": "machine learning", "content": "<content>• Incorporation of sophisticated machine learning .<\/content> <target>It incorporates sophisticated machine learning to power key areas, from fraud detection, to enabling customized and real-time community support.<\/target> <content>• Operation of a microservices architecture .<\/content>", "qwen": "operative", "mistral": "operative", "llama": "operative", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "984", "name": "CrowdStrike Holdings, Inc.", "gics": "Information Technology", "year": "2022", "trigger": "AI", "content": "<content>The graph data model allows the AI algorithms to identify relationships between events that are not directly related but which could indicate an attack that would otherwise remain undetected.<\/content> <target>We believe that our AI algorithms are advantaged by the rich proprietary dataset that we use to train them.<\/target> <content>Threat Graph provides customers with complete real time and historical visibility and insight into events occurring on their endpoints for hunting and searching.<\/content>", "qwen": "operative", "mistral": "operative", "llama": "operative", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "1575", "name": "Synchrony Financial", "gics": "Financials", "year": "2022", "trigger": "machine learning", "content": "<content>Synchrony gathers thousands of customer data points curated through customer interactions with Synchrony, our partners, and third-party data providers.<\/content> <target>Through the combination of effective data management, curation of data products for internal use, performance tracking and measurement, and development of decision signals leveraging machine learning algorithms and other data science methods, our experienced team of business analysts and data scientists support decision making throughout the business.<\/target> <content>Our analytics teams help us expand and optimize customer relationships through the building of targeting tools and the deployment of detailed test-and-learn tracking of omni-channel marketing campaigns.<\/content>", "qwen": "operative", "mistral": "operative", "llama": "neutral", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "1285", "name": "Labcorp Holdings Inc.", "gics": "Health Care", "year": "2022", "trigger": "artificial intelligence", "content": "<content>Differentiate Through Digital and Data The healthcare and life sciences industries remain among the most significantly impacted by technological advancements.<\/content> <target>By maximizing the use of advances in artificial intelligence (AI), data, digitalization, and analytics in compliance with applicable regulations, the Company strives to improve operating efficiency and business performance, and to create new, differentiated products and services that the Company believes will help its customers and deliver better care to patients.<\/target> <content>The Company is using AI to better identify and predict trends such as the timing and location of demand shifts for certain tests.<\/content>", "qwen": "operative", "mistral": "prospective", "llama": "operative", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "1173", "name": "International Business Machines Corporation", "gics": "Information Technology", "year": "2022", "trigger": "AI", "content": "<content>And it continues today—we create sustained value for clients by helping them leverage the power of hybrid cloud and artificial intelligence (AI).<\/content> <target>Our hybrid cloud platform and AI technology support clients’ digital transformations and helps them reimagine critical workflows, at scale, and modernize applications to increase agility, drive innovation and create operational efficiencies.<\/target> <content>Our offerings draw from leading IBM capabilities in software, consulting services capability to deliver business outcomes, and deep incumbency in mission-critical infrastructure, all bolstered by one of the world’s leading research organizations.<\/content>", "qwen": "operative", "mistral": "operative", "llama": "operative", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "983", "name": "CrowdStrike Holdings, Inc.", "gics": "Information Technology", "year": "2022", "trigger": "AI", "content": "<content>By applying powerful graph analytics and AI algorithms to cybersecurity, we enrich the data collected with our proprietary and third-party threat intelligence, such as adversary capabilities, motivations, attributions, and threat indicators.<\/content> <target>The graph data model allows the AI algorithms to identify relationships between events that are not directly related but which could indicate an attack that would otherwise remain undetected.<\/target> <content>We believe that our AI algorithms are advantaged by the rich proprietary dataset that we use to train them.<\/content>", "qwen": "operative", "mistral": "operative", "llama": "operative", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "1013", "name": "Dell Technologies Inc.", "gics": "Information Technology", "year": "2022", "trigger": "artificial intelligence", "content": "<content>Most of our research and development (“R&D”) expenditures represent costs to develop the software that powers our solutions.<\/content> <target>This software simplifies the complex through automation, increasingly leveraging artificial intelligence and machine-learning technology.<\/target> <content>We manage our R&D spending by targeting those innovations and solutions that we believe are most valuable to our customers and by relying on the capabilities of our strategic relationships.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "neutral", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "1454", "name": "NVIDIA Corporation", "gics": "Information Technology", "year": "2022", "trigger": "AI", "content": "<content>Engineering and marketing personnel engage with key software developers to promote and discuss our platforms, as well as to ascertain individual product requirements and solve technical problems.<\/content> <target>Our developer program makes our products available to developers prior to launch in order to encourage the development of AI frameworks, SDKs, and APIs for software applications and game titles that are optimized for our platforms.<\/target> <content>Our Deep Learning Institute provides in-person and online training for developers in industries and organizations around the world to build AI and accelerated computing applications that leverage our platforms.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "neutral", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "1114", "name": "Alphabet Inc.", "gics": "Communication Services", "year": "2022", "trigger": "AI", "content": "<content>In all these examples, AI significantly enhances the usefulness and multiplies the value of these products and services to people and organizations.<\/content> <target>Our view is that AI is now, and more than ever, critical to delivering on our mission.<\/target> <content>As we bring our breakthrough AI innovations into the real world to assist people and benefit society everywhere, we are also pursuing further advancements that will help to unlock scientific discoveries and to tackle humanity's greatest challenges and opportunities.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "neutral", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "910", "name": "Baker Hughes Company", "gics": "Energy", "year": "2022", "trigger": "artificial intelligence", "content": "<content>We continue to invest across both operating segments in products to enhance safety, develop capability, improve performance, and reduce costs aligned with our operational strategy.<\/content> <target>Through our Technology Centers we also invest heavily in fundamental technologies such as materials, additive manufacturing, sensing, artificial intelligence/machine learning and other digital technologies such as computer vision, data science, and edge computing.<\/target> <content>In OFSE, we continue to fund a range of formation evaluation capabilities as well as drilling, completions, and production hardware.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "neutral", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "907", "name": "Baker Hughes Company", "gics": "Energy", "year": "2022", "trigger": "AI", "content": "<content>• Digital capabilities: We expect to benefit from the emerging demand for artificial intelligence (\"AI\") based solutions as part of our customers’ digital transformation initiatives.<\/content> <target>Launched in 2019, our partnership with C3.ai, Inc. (\"C3 AI\") continues to enable us to deliver AI that is faster, easier, and more scalable to drive outcomes for our customers.<\/target> <content>In addition, we are delivering existing technology and collaborating on new AI applications specific for oil and gas customers.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "operative", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "1131", "name": "Alphabet Inc.", "gics": "Communication Services", "year": "2022", "trigger": "AI", "content": "<content>In all these examples, AI significantly enhances the usefulness and multiplies the value of these products and services to people and organizations.<\/content> <target>Our view is that AI is now, and more than ever, critical to delivering on our mission.<\/target> <content>As we bring our breakthrough AI innovations into the real world to assist people and benefit society everywhere, we are also pursuing further advancements that will help to unlock scientific discoveries and to tackle humanity's greatest challenges and opportunities.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "neutral", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "909", "name": "Baker Hughes Company", "gics": "Energy", "year": "2022", "trigger": "AI", "content": "<content>In addition, we are delivering existing technology and collaborating on new AI applications specific for oil and gas customers.<\/content> <target>In addition to enhancing our technology portfolio with new AI applications, we are creating a digital element in our core OFSE product lines, helping them to deliver efficiency, predictability, and a better experience for our customers and ourselves.<\/target> <content>We have also continued to invest in our industrial asset management capabilities in IET, including the acquisition of ARMS Reliability and an investment in Augury, a machine health technology company, to support our customers’ digital transformation programs across industrial end markets.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "operative", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "1121", "name": "Alphabet Inc.", "gics": "Communication Services", "year": "2022", "trigger": "AI", "content": "<content>We continue to make significant research and development investments in areas of strategic focus as we seek to develop new, innovative offerings and improve our existing offerings across our businesses.<\/content> <target>We also expect to continue to invest in our technical infrastructure, including servers, network equipment, and data centers, to support the growth of our business and our long-term initiatives, in particular in support of AI.<\/target> <content>In addition acquisitions and strategic investments contribute to the breadth and depth of our offerings, expand our expertise in engineering and other functional areas, and build strong partnerships around strategic initiatives.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "neutral", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "1567", "name": "S&P Global Inc.", "gics": "Financials", "year": "2022", "trigger": "machine learning", "content": "<content>The rapid evolution of AI will require the application of resources to develop, test and maintain our products and services to help ensure that AI is implemented ethically in order to minimize unintended, harmful impact.<\/content> <target>Emerging AI applications may require additional investment in the development of proprietary datasets and machine learning models, and development of new approaches and processes, which may be costly and could impact our profit margin.<\/target> <content>Developing, testing, and deploying AI systems may also increase the cost profile of our offerings due to the nature of the computing costs involved in such systems.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "neutral", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "1115", "name": "Alphabet Inc.", "gics": "Communication Services", "year": "2022", "trigger": "AI", "content": "<content>Our view is that AI is now, and more than ever, critical to delivering on our mission.<\/content> <target>As we bring our breakthrough AI innovations into the real world to assist people and benefit society everywhere, we are also pursuing further advancements that will help to unlock scientific discoveries and to tackle humanity's greatest challenges and opportunities.<\/target> <content>Privacy and security We make it a priority to protect the privacy and security of our products, users, and customers, even if there are near-term financial consequences.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "operative", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "1220", "name": "Intel Corporation", "gics": "Information Technology", "year": "2022", "trigger": "computer vision", "content": "<content>We support our customers with open, containerized software frameworks, such as Intel ® Smart Edge, the OpenVINO toolkit, and the Infrastructure Programmer Developer Kit, enabling the network to continue to improve and evolve without locking customers into a single solution.<\/content> <target>Intel Geti software is designed to enable teams to rapidly develop AI models, and its intuitive computer vision solution is designed to reduce the time needed to build models by easing the complexities of model development and harnessing greater collaboration between teams at the edge.<\/target> <content>MD&A 28 Financial Performance NEX Revenue $B NEX Operating Income $B Revenue Summary 2022 vs. 2021 Revenue was $8.9 billion, up $897 million from 2021, driven by higher Ethernet ASPs and increased demand for 5G products, partially offset by lower demand for Network Xeon.<\/content>", "qwen": "prospective", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "844", "name": "Amazon.com, Inc.", "gics": "Consumer Discretionary", "year": "2022", "trigger": "autonomous vehicles", "content": "<content>Infrastructure costs include servers, networking equipment, and data center related depreciation and amortization, rent, utilities, and other expenses necessary to support AWS and other Amazon businesses.<\/content> <target>Collectively, these costs reflect the investments we make in order to offer a wide variety of products and services to our customers, including expenditures related to initiatives to build and deploy innovative and efficient software and electronic devices and the development of a satellite network for global broadband service and autonomous vehicles for ride-hailing services.<\/target> <content>We seek to invest efficiently in numerous areas of technology and content so we may continue to enhance the customer experience and improve our process efficiency through rapid technology developments, while operating at an ever increasing scale.<\/content>", "qwen": "neutral", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "1544", "name": "ResMed Inc.", "gics": "Health Care", "year": "2022", "trigger": "AI", "content": "<content>Our services and products may use AI now or in the future.<\/content> <target>We intend to continue to comprehensively protect all personal information and to comply with all applicable laws regarding the protection of such information as well as to monitor developments regarding the use of AI that could be relevant to our products and services.<\/target> <content>Compliance with these and any other applicable privacy and data security laws and regulations is a rigorous and time-intensive process, and we may be required to put in place additional mechanisms ensuring compliance with the new data protection rules.<\/content>", "qwen": "prospective", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "1653", "name": "Zebra Technologies Corporation", "gics": "Information Technology", "year": "2022", "trigger": "intelligent automation", "content": "<content>Advance our Enterprise Asset Intelligence vision Our EAI vision is for every asset and front-line worker to be connected, visible, and fully optimized.<\/content> <target>We believe that secular technology trends, particularly in IoT, cloud computing, intelligent automation, and mobility, advance our vision and are transforming our customers’ businesses and our industry, providing us with significant new opportunities to create value for our customers and for the Company.<\/target> <content>We expect to capitalize on these trends, and in particular the proliferation of smart connected sensors and devices in our core market segments, by providing end-to-end solutions that integrate these sensors and devices with cloud-based workflows and analytics applications.<\/content>", "qwen": "prospective", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "987", "name": "CrowdStrike Holdings, Inc.", "gics": "Information Technology", "year": "2022", "trigger": "artificial intelligence", "content": "<content>In October 1999, Mr. Kurtz founded Foundstone, Inc., a security technology company, where he served as its Chief Executive Officer until it was acquired by McAfee, Inc. in October 2004.<\/content> <target>Since November 2017, he has also served as Chairman as a board member, and as President for the CrowdStrike Foundation, a nonprofit established to support the next generation of talent and research in cybersecurity and artificial intelligence through scholarships, grants, and other activities.<\/target> <content>He has also served on the board of directors of Hewlett Packard Enterprise, an enterprise information technology company, since June 2019.<\/content>", "qwen": "not_ai", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "1401", "name": "NRG Energy, Inc.", "gics": "Utilities", "year": "2022", "trigger": "AIP", "content": "<content>NRG provides programs that holistically support its employees’ physical, emotional and financial wellness, allowing employees the opportunity to take control of their well-being and focus on what matters most to them for a healthy, secure future.<\/content> <target>For the 2022 plan year, the Company included well-being goals in the Annual Incentive Plan (AIP), ensuring participants are motivated to improve their physical, emotional and financial well-being.<\/target> <content>Accordingly, certain key employee programs were evaluated and enhanced for 2023: several new programs were added to NRG's voluntary benefits offerings, NRG’s retirement savings plan match was increased by 50% in the U.S. and by 100% in Canada, and paid parental leave was increased to 6 weeks regardless of gender.<\/content>", "qwen": "not_ai", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "897", "name": "Agilent Technologies, Inc.", "gics": "Health Care", "year": "2022", "trigger": "automated workflow", "content": "<content>The Agilent LC portfolio is modular in construction and can be configured as analytical and preparative systems.<\/content> <target>These systems can be stepwise upgraded to highly sophisticated, automated workflow solutions such as method development, multi‑method/walk-up, high-capacity/high-throughput or multi‑dimensional LC and can be extended to application‑based analyzers (e.g., for bio-molecular separations, chiral analysis or size exclusion chromatography).<\/target> <content>As a leader in liquid chromatography, we continue to expand our application space with new HPLC columns, new services and diagnostics offerings and ongoing instrument and software product enhancements.<\/content>", "qwen": "not_ai", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "1270", "name": "Keysight Technologies, Inc.", "gics": "Information Technology", "year": "2022", "trigger": "artificial intelligence", "content": "<content>Keysight has been investing in solutions and technology for the academic, commercial, and government research communities, who are exploring a wide breadth of technologies required to address another new generation of wireless capabilities.<\/content> <target>The expansion of large-scale commercial wireless technologies into healthcare, transportation, finance, manufacturing, and agriculture is expected to drive investment in new technologies in radio and satellite systems, new networking technologies, and the pervasive use of artificial intelligence.<\/target> <content>Keysight is well positioned to be a preferred strategic partner with leading innovative solutions driving the long-term path to 6G.<\/content>", "qwen": "neutral", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "1381", "name": "Nasdaq, Inc.", "gics": "Financials", "year": "2022", "trigger": "machine learning", "content": "<content>We believe the shift to cloud-based markets will provide our exchanges with more security, greater reliability, better scalability and the ability to quickly power up computing resources.<\/content> <target>This will, in turn, enable Nasdaq to provide its clients access to cloud-based capabilities, including virtual connectivity services, market analytics and machine learning, at a lower cost.<\/target> <content>In Europe, we operate exchanges in Tallinn (Estonia), Riga (Latvia) and Vilnius (Lithuania) as Nasdaq Baltic and exchanges in Stockholm (Sweden), Copenhagen (Denmark), Helsinki (Finland), and Reykjavik (Iceland) together with the clearing operations of Nasdaq Clearing, as Nasdaq Nordic.<\/content>", "qwen": "neutral", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "1097", "name": "Gen Digital Inc.", "gics": "Information Technology", "year": "2022", "trigger": "deepfakes", "content": "<content>), and unauthorized access or connection to cloud service accounts; (ii) an individual is digitally victimized through a data breach, cyber theft, cyber extortion, or fraud (stolen personally identifiable information, identity theft, etc.<\/content> <target>); (iii) online stalking, bullying, or harassment is inflicted; or (iv) attacks related to privacy or disinformation (such as online tracking protection, identity impersonation, disinformation on social media, DeepFakes, non-trustworthy WiFi network, EvilTwin attacks, etc.).<\/target> <content>As cybercrime becomes an intensifying threat to our world, consumers are increasingly concerned.<\/content>", "qwen": "not_ai", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "3203", "name": "Palantir Technologies Inc.", "gics": "Information Technology", "year": "2023", "trigger": "large language models", "content": "<content>We have built four principal software platforms, Palantir Gotham (“Gotham”), Palantir Foundry (“Foundry”), Palantir Apollo (“Apollo”), and Palantir Artificial Intelligence Platform (“AIP”).<\/content> <target>Gotham and Foundry enable institutions to transform massive amounts of information into an integrated data asset that reflects their operations, and AIP leverages the power of our existing machine learning technologies alongside large language models (“LLMs”) directly within Gotham and/or Foundry to help connect AI to enterprise data.<\/target> <content>For over a decade, Gotham has surfaced insights for global defense agencies, the intelligence community, disaster relief organizations and beyond.<\/content>", "qwen": "operative", "mistral": "operative", "llama": "operative", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "1842", "name": "AppLovin Corporation", "gics": "Communication Services", "year": "2023", "trigger": "artificial intelligence", "content": "<content>Part I Item 1. Business Our mission is to create meaningful connections between companies and their ideal customers.<\/content> <target>Our software platform provides end-to-end software and artificial intelligence-powered (\"AI\") solutions for businesses to reach, monetize and grow their global audience (\"Software Platform\").<\/target> <content>We also operate a portfolio of owned mobile apps (“Apps”).<\/content>", "qwen": "operative", "mistral": "operative", "llama": "neutral", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "1777", "name": "Advanced Micro Devices, Inc.", "gics": "Information Technology", "year": "2023", "trigger": "AI", "content": "<content>In addition, we unveiled the AMD Instinct MI300A APU, which integrate the CPU and GPU cores on a single package delivering an efficient platform while also providing the compute performance to accelerate training on the latest AI models.<\/content> <target>We enhanced the performance and features of our AMD RoCm™ software by releasing our latest AMD ROCm 6 open software platform for AI and HPC workloads.<\/target> <content>We expanded our Embedded processor portfolio with powerful, scalable offerings for a variety of embedded applications such as the AMD Ryzen™ Embedded 7000 Series processor family.<\/content>", "qwen": "not_ai", "mistral": "neutral", "llama": "operative", "majority_vote": "operative", "tiebreaker": "claude-haiku"}, {"nummer": "3164", "name": "Palo Alto Networks, Inc.", "gics": "Information Technology", "year": "2023", "trigger": "deep learning", "content": "<content>It includes mechanisms—such as protocol decoder-based analysis, protocol anomaly-based protection, stateful pattern matching, statistical anomaly detection, heuristic-based analysis, custom vulnerability and spyware “phone home” signatures, and workflows—to manage popular open-source signature formats to extend our coverage.<\/content> <target>In addition, it offers inline deep learning to deliver real-time detection and prevention of unknown, evasive, and targeted command-and-control (“C2”) communications over HTTP, unknown-TCP, unknown-UDP, and encrypted over SSL.<\/target> <content>Advanced Threat Prevention is the first offering to protect patient zero from unknown command and control in real-time.<\/content>", "qwen": "operative", "mistral": "prospective", "llama": "operative", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "2240", "name": "F5, Inc.", "gics": "Information Technology", "year": "2023", "trigger": "AI", "content": "<content>F5 is leveraging AI to accelerate the strength of both our current and future offerings.<\/content> <target>F5 uses AI in its security solutions to support performance and efficacy.<\/target> <content>Today, our customers are able to further benefit from our three-pronged AI strategy.<\/content>", "qwen": "operative", "mistral": "operative", "llama": "operative", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "3479", "name": "Block, Inc.", "gics": "Information Technology", "year": "2023", "trigger": "machine learning", "content": "<content>We frequently update our software products and have a rapid software release schedule with improvements deployed regularly.<\/content> <target>Our services are built on a scalable technology platform, and we place a strong emphasis on data analytics and machine learning to maximize the efficacy, efficiency, and scalability of our services.<\/target> <content>16 In our Square ecosystem, this technology platform enables us to capture and analyze billions of transactions per year and automate risk assessment for more than 99.95% of all transactions.<\/content>", "qwen": "operative", "mistral": "operative", "llama": "neutral", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "2318", "name": "GE HealthCare Technologies Inc.", "gics": "Health Care", "year": "2023", "trigger": "AI", "content": "<content>Our Ultrasound business’ focus is on designing solutions that are aligned by specialties or care areas for specific clinical workflows to better serve the unique needs of our customers and improve patient outcomes, while lowering the overall cost of care.<\/content> <target>We continue to deliver innovative ultrasound probes, consoles, and digital and AI solutions that increase diagnostic accuracy and simplify clinical and operational workflows.<\/target> <content>Our Ultrasound equipment portfolio, digital and AI solutions, and associated service capabilities serve customers across five clinical areas: Radiology and Primary Care, Women’s Health, Cardiovascular, Point of Care and Handheld, and Surgical Visualization and Guidance: • Radiology and Primary Care Ultrasound is comprised of systems that produce images to support precise diagnoses and treatment across the whole body, including liver, thyroid, renal, breast, vascular, and transcranial applications.<\/content>", "qwen": "not_ai", "mistral": "operative", "llama": "neutral", "majority_vote": "operative", "tiebreaker": "claude-haiku"}, {"nummer": "1854", "name": "Aptiv PLC", "gics": "Consumer Discretionary", "year": "2023", "trigger": "autonomous driving", "content": "<content>We believe we are well-aligned with industry technology trends that will help to support sustainable future growth in this space and are collaborating with leaders in their respective fields to advance the pace of development and commercialization of these emerging technologies.<\/content> <target>In March 2020, we completed a transaction with Hyundai Motor Group (“Hyundai”) to form Motional AD LLC (“Motional”), a joint venture focused on the design, development and commercialization of autonomous driving technologies.<\/target> <content>Motional began testing fully driverless systems in 2020 and began testing a production-ready autonomous driving platform available for robotaxi providers, meal delivery providers, fleet operators and automotive manufacturers at prototype scale in 7 Table of Contents 2022, with initial production deployments in the fourth quarter of 2023 and commercial launch planned in the first half of 2024.<\/content>", "qwen": "prospective", "mistral": "operative", "llama": "neutral", "majority_vote": "operative", "tiebreaker": "claude-haiku"}, {"nummer": "2244", "name": "F5, Inc.", "gics": "Information Technology", "year": "2023", "trigger": "AI", "content": "<content>• Enhanced API security, which leverages machine-based learning, auto-discovery, and anomaly detection, which automates the entire process of finding, securing, and monitoring APIs for anomalous behavior.<\/content> <target>• Next-generation, AI enabled bot mitigation through F5 Distributed Cloud Bot Defense provides our customers the ability to defend applications and APIs from automated attacks.<\/target> <content>The solution leverages AI to analyze massive amounts of traffic and machine learning to ensure sustainable bot prediction models with high efficacy.<\/content>", "qwen": "operative", "mistral": "operative", "llama": "operative", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "1950", "name": "Cadence Design Systems, Inc.", "gics": "Information Technology", "year": "2023", "trigger": "AI", "content": "<content>Our design-for-manufacturing products are also included in our signoff offering and are used by customers to address manufacturing and yield issues as early in the product development process as possible.<\/content> <target>Cadence Cerebrus™ is our generative AI solution that combines all elements of the full-flow IC through signoff that enables additional productivity, automation and improved quality of results throughout the entire design flow.<\/target> <content>Functional Verification Functional verification products are used by our customers to effectively and efficiently verify that the circuitry or the software they have designed is consistent with the functional specification.<\/content>", "qwen": "operative", "mistral": "neutral", "llama": "operative", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "2674", "name": "Intuit Inc.", "gics": "Information Technology", "year": "2023", "trigger": "artificial intelligence", "content": "<content>We work to make this a reality through our three-pillared growth strategy: Grow the Core by transforming financial management software; Connect the Ecosystem, by meeting a wider range of customer needs with a single integrated platform; and Expand Globally, by serving small businesses around the world.<\/content> <target>With this strategy, we enable a powerful ecosystem, personalized using artificial intelligence, that scales across our customers’ most pressing needs.<\/target> <content>Small business owners are constantly faced with challenges and barriers in their journey to success.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "operative", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "2452", "name": "Alphabet Inc.", "gics": "Communication Services", "year": "2023", "trigger": "AI", "content": "<content>For example, revenues from ads on YouTube and Google Play monetize at a lower rate than our traditional search ads.<\/content> <target>We also expect to continue to incorporate AI innovations into our products, such as AI in Search, that could affect our monetization trends.<\/target> <content>When developing new products and services we generally focus first on user experience and then on monetization.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "prospective", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "2883", "name": "Marsh & McLennan Companies, Inc.", "gics": "Financials", "year": "2023", "trigger": "AI", "content": "<content>As a result, our business success is dependent on maintaining the effectiveness of existing technology systems and on continuing to develop and enhance technology systems that support our business processes and strategic initiatives in a cost and resource efficient manner, particularly as our business processes become more digital.<\/content> <target>We have a number of strategic initiatives involving investments in or partnerships with technology companies as part of our growth strategy, as well as investments in technology, including generative AI, and infrastructure to support our own systems.<\/target> <content>These investments may be costly and require significant capital expenditures, may not be profitable or may be less profitable than what we have experienced historically.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "neutral", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "3372", "name": "Trimble Inc.", "gics": "Information Technology", "year": "2023", "trigger": "AI", "content": "<content>Our solutions provide customer benefits such as reduced costs, reduced waste and re-work, increased worker safety and efficiencies, faster project completion times, improved information flow, better decision making, enhanced quality control, and multiple sustainability benefits for our customers.<\/content> <target>During 2023, we announced a number of new developments including: (i) new versions of our Tekla Structure software for improved user experience such as extended collaboration with BIM model data; (ii) new AI features in Sketchup such as AI-powered image search capabilities to access 3D models on 3D Warehouse, as well as generative AI utilizing text prompts to convert a SketchUp 3D model to a rendered image in seconds with SketchUp Diffusion; (iii) new MEP products including Fabrication Smart Tools for use with native Autodesk users; and (iv) AI functionality for Viewpoint Vista and Spectrum to assist users with injection of PDF invoices.<\/target> <content>Civil Engineering Construction and Asset Management.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "neutral", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "2661", "name": "Intuit Inc.", "gics": "Information Technology", "year": "2023", "trigger": "artificial intelligence", "content": "<content>We serve 100 million customers and generated revenue of $14.4 billion in our fiscal year ended July 31, 2023.<\/content> <target>The continuing evolution of artificial intelligence (AI) is fundamentally reshaping our world — and Intuit is taking advantage of this technological revolution to find new ways to improve the customer experience and deliver on our mission.<\/target> <content>Intuit is uniquely positioned for the next wave of transformation with generative AI given our rich data platform and established AI foundation.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "neutral", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "2178", "name": "Ques
