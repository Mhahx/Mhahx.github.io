ying critical nature of our offerings, and the inherent customer intimacy of our chosen niche markets. Our businesses realize growth from new and existing customers in their niche markets through successfully executing go-to-market strategies, developing new products and applications, and delivering professional services. Increasingly, this includes AI-enabled products and functionality embedded within customers’ mission-critical workflows. By leveraging our deep domain expertise, proprietary data, and long-standing customer relationships, we believe these AI capabilities enhance product differentiation, and drive incremental automation and improved customer outcomes which support expanded monetization opportunities. Diversified End Markets and Geographic Reach – We have a global presence, with sales to customers outside of the U.S. totaling $1,029.7 in 2025. Information regarding our international operations is set forth in Note 14 of the Notes to Consolidated Financial Statements included in this Annual Report. 4 Our Reportable Segments Roper’s segment reporting structure is based on business model and delivery of performance obligations.", "qwen": "operative"}, {"nummer": "10981", "name": "Molson Coors Beverage Company", "gics": "Consumer Staples", "year": "2025", "trigger": "artificial intelligence", "content": "The use of artificial intelligence, combined with an uncertain regulatory environment, may result in reputational harm, liability, or other adverse consequences to our brands, marketing and business operations. Molson Coors or its third-party vendors may adopt and integrate artificial intelligence tools into our systems for specific use cases, including leveraging artificial intelligence in our marketing efforts, after review by legal and information security and in alignment with internal oversight and policies and procedures. Our vendors and third-party partners may also incorporate artificial intelligence tools into their offerings with or without disclosing this use to us in a timely or complete manner. The providers of these artificial intelligence tools may not meet existing or evolving regulatory or industry standards concerning privacy and data protection, which may result in a loss of intellectual property or confidential information and/or cause harm to our reputation and the public perception of the effectiveness of our security measures or other internal controls. Further, bad actors around the world use increasingly sophisticated methods, including the use of artificial intelligence, to engage in cyberattacks or illegal activities involving the theft and misuse of personal information, confidential information and intellectual property. The technologies underlying artificial intelligence and their use cases are rapidly developing, and it is not possible to predict all of the legal, operational or technological risks related to the use of artificial intelligence. While new artificial intelligence initiatives, laws and regulations are emerging and evolving, uncertainty will remain, and our obligation to comply with the evolving regulatory landscape could entail significant costs, negatively affect our business, or limit our ability to incorporate certain artificial intelligence capabilities into our business.", "qwen": "neutral"}, {"nummer": "11088", "name": "Tesla, Inc.", "gics": "Consumer Discretionary", "year": "2025", "trigger": "AI", "content": "We have planned electric vehicles to address additional vehicle markets, and will continue leveraging developments in our proprietary Full Self-Driving (“FSD”) (Supervised) features, battery cell and other technologies. For purposes of this filing, use of the term “FSD (Supervised)” includes the equivalent naming convention, “FSD (Capability)” that is used in the European, Middle East and Asia-Pacific regions. In June 2025, we launched our Robotaxi service, an autonomous ride-hailing platform that harnesses our technology and vehicles. We expect this service rietary or copyrighted material which could be fed into AI models without our knowledge. Evolved AI-based ecosystems and workflow automation developed by our customers or generic datasets enhanced by AI could compete more effectively with our products or solutions. This could result in duplication of our products or solutions by AI tools and reduce the relevance or value proposition of such products or solutions.", "qwen": "neutral"}, {"nummer": "11275", "name": "Verizon Communications Inc.", "gics": "Communication Services", "year": "2025", "trigger": "AI", "content": "6 Table of Contents Spectrum The spectrum licenses we hold can be used for mobile and fixed wireless voice, video and data communications services. We are licensed by the Federal Communications Commission (FCC) to provide these wireless services on the following low and mid-band spectrum in areas that collectively cover nearly all of the population of the U.S.: (i) the 700 MHz Upper C block, (ii) Cellular spectrum (850 MHz), (iii) Personal Communication Services (PCS) spectrum (1900 MHz), (iv) AWS 1 and AWS 3 bands (1700 MHz uplink and 2100 MHz downlink), and (v) the 3.7 GHz band (C-Band). We also hold spectrum licenses in the 28, Upper 37 and 39 GHz bands, known as millimeter wave spectrum, and utilize both Priority Access Licenses (PALs) and General Authorized Access (GAA) in the 3.5 GHz band (Citizens Broadband Radio Service). We anticipate that demand for spectrum will continue to increase over time, driven by growth in customer connections and the increased usage of wireless broadband services that use more bandwidth and require faster rates of speed, as well as AI driven data demands and future transition to 6G. Information regarding spectrum license transactions, including our pending acquisition of select spectrum licenses of United States Cellular Corporation (currently known as Array Digital Infrastructure, Inc.) and certain of its subsidiaries, is presented in Note 3 to the consolidated financial statements included in this Annual Report. Competition and Related Trends The telecommunications industry is highly competitive. The rapid development of new technologies, services and products has eliminated many of the distinctions among wireless, cable, internet and traditional telephone services and brought new competitors to our markets.", "qwen": "neutral"}];
const LABELS = ["operative","prospective","neutral","not_ai"];
const KEY = "sentiment_review_v1";
const EXIT = {
  operative:"translateX(125%) rotate(9deg)",
  prospective:"translateY(-125%) rotate(-4deg)",
  neutral:"translateX(-125%) rotate(-9deg)",
  not_ai:"translateY(125%) rotate(4deg)"
};
const $ = id => document.getElementById(id);

let results = JSON.parse(localStorage.getItem(KEY) || "{}");
let showTip = false;
let idx = 0;

function save(){ localStorage.setItem(KEY, JSON.stringify(results)); }
function firstUnreviewed(){
  for(let i=0;i<DATA.length;i++){ if(!results[DATA[i].nummer]) return i; }
  return DATA.length;
}
function esc(s){return (s+"").replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
function highlight(text, trig){
  let t = esc(text);
  if(trig){
    const safe = trig.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
    try{ t = t.replace(new RegExp("("+safe+")","gi"),"<mark>$1</mark>"); }catch(e){}
  }
  return t;
}

function render(){
  const done = Object.keys(results).length;
  $("prog").style.width = (done/DATA.length*100)+"%";
  $("counter").textContent = done+" / "+DATA.length+" bewertet";

  if(idx >= DATA.length){ showSummary(); return; }
  $("stage").style.display="flex";
  $("summary").classList.remove("show");

  const card = $("card");
  card.style.transition=""; card.style.transform=""; card.style.opacity="";
  $("tagR").style.opacity=0; $("tagL").style.opacity=0;

  const d = DATA[idx];
  $("leftinfo").textContent = "Karte "+(idx+1)+" / "+DATA.length;
  $("tags").innerHTML =
    '<span class="badge">#'+d.nummer+'</span>'+
    '<span class="badge">'+esc(d.gics)+'</span>'+
    '<span class="badge">'+esc(d.year)+'</span>'+
    '<span class="badge trig">🔎 '+esc(d.trigger)+'</span>';
  $("firm").textContent = d.name;
  $("sub").textContent = "Trigger-Wort hervorgehoben";
  $("content").innerHTML = highlight(d.content, d.trigger);
  $("content").scrollTop = 0;

  let tip = "";
  const prev = results[d.nummer];
  if(prev) tip += 'Deine Wahl: <b>'+prev+'</b>  ';
  if(showTip && d.qwen) tip += '· Qwen-Tipp: <b>'+d.qwen+'</b>';
  $("tip").innerHTML = tip;
}

function flyOut(label){
  if(idx>=DATA.length) return;
  const d = DATA[idx];
  results[d.nummer] = label; save();
  const card = $("card");
  card.style.transition="transform .26s ease, opacity .26s ease";
  card.style.transform = EXIT[label];
  card.style.opacity = 0;
  setTimeout(()=>{ idx++; render(); }, 250);
}

function showSummary(){
  $("stage").style.display="none";
  $("summary").classList.add("show");
  const counts={operative:0,prospective:0,neutral:0,not_ai:0};
  let agree=0, comparable=0;
  DATA.forEach(d=>{ const r=results[d.nummer];
    if(r){ counts[r]=(counts[r]||0)+1;
      if(d.qwen){ comparable++; if(d.qwen===r) agree++; } } });
  $("sumgrid").innerHTML = LABELS.map(l=>
    '<div class="stat"><b>'+(counts[l]||0)+'</b><span>'+l+'</span></div>').join("");
  let kpi="Bewertet: <b>"+Object.keys(results).length+" / "+DATA.length+"</b>";
  if(comparable){ const acc=(agree/comparable*100).toFixed(1);
    kpi+="<br>Übereinstimmung mit Qwen: <b>"+agree+" / "+comparable+" ("+acc+"%)</b>"; }
  $("kpi").innerHTML = kpi;
}

/* ---- CSV export / import ---- */
function buildCSV(){
  let rows=[["Nummer","Name","GICS","Year","Trigger_word","Sentiment_human","Sentiment_qwen"]];
  DATA.forEach(d=>{ if(results[d.nummer])
    rows.push([d.nummer,d.name,d.gics,d.year,d.trigger,results[d.nummer],d.qwen]); });
  return rows.map(r=>r.map(c=>{ c=(""+c);
    return /[;"\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c; }).join(";")).join("\n");
}
function downloadCSV(){
  const blob=new Blob(["﻿"+buildCSV()],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download="review_150_human.csv"; a.click();
}
function parseCSV(text){
  const rows=[]; let row=[],cur="",q=false;
  for(let i=0;i<text.length;i++){ const c=text[i];
    if(q){ if(c=='"'){ if(text[i+1]=='"'){cur+='"';i++;} else q=false; } else cur+=c; }
    else{ if(c=='"')q=true; else if(c==';'){row.push(cur);cur="";}
      else if(c=='\n'){row.push(cur);rows.push(row);row=[];cur="";}
      else if(c=='\r'){} else cur+=c; } }
  if(cur!==""||row.length){ row.push(cur); rows.push(row); }
  return rows;
}
function importCSV(text){
  const rows=parseCSV(text); if(!rows.length) return;
  const head=rows[0].map(h=>h.trim().toLowerCase());
  const iN=head.indexOf("nummer");
  let iL=head.indexOf("sentiment_human"); if(iL<0)iL=head.indexOf("sentiment");
  if(iN<0||iL<0){ alert("CSV erkannt nicht: Spalten 'Nummer' und 'Sentiment_human' fehlen."); return; }
  let n=0;
  for(let i=1;i<rows.length;i++){ const r=rows[i]; if(!r[iN])continue;
    const lab=(r[iL]||"").trim().toLowerCase();
    if(LABELS.includes(lab)){ results[r[iN].trim()]=lab; n++; } }
  save(); idx=firstUnreviewed(); render();
  alert(n+" Bewertungen geladen.");
}

/* ---- events ---- */
document.querySelectorAll("button.lab").forEach(b=> b.onclick=()=>flyOut(b.dataset.l));
$("back").onclick=()=>{ if(idx>0){ idx--; render(); } };
$("skip").onclick=()=>{ if(idx<DATA.length){ idx++; render(); } };
$("toggleTip").onclick=()=>{ showTip=!showTip;
  $("toggleTip").textContent="Modell-Tipp: "+(showTip?"an":"aus"); render(); };
$("save").onclick=downloadCSV;
$("loadlink").onclick=()=>$("loadfile").click();
$("loadfile").onchange=e=>{ const f=e.target.files[0]; if(!f)return;
  const rd=new FileReader(); rd.onload=()=>importCSV(rd.result); rd.readAsText(f); };
$("reset").onclick=()=>{ if(confirm("Alle eigenen Bewertungen löschen?")){
  results={}; localStorage.removeItem(KEY); idx=0; render(); } };
$("download").onclick=downloadCSV;
$("reopen").onclick=()=>{ idx=0; render(); };

document.addEventListener("keydown",e=>{
  if(e.key==="1")flyOut("operative");
  else if(e.key==="2")flyOut("prospective");
  else if(e.key==="3")flyOut("neutral");
  else if(e.key==="4")flyOut("not_ai");
  else if(e.key==="ArrowLeft"){ if(idx>0){idx--;render();} }
  else if(e.key==="ArrowRight"){ if(idx<DATA.length){idx++;render();} }
});

/* ---- horizontal swipe (right=operative, left=neutral) ---- */
(function(){
  const card=$("card"); const TH=85;
  let startX=0,startY=0,dragging=false,axis=null;
  card.addEventListener("pointerdown",e=>{
    if(idx>=DATA.length) return;
    startX=e.clientX; startY=e.clientY; dragging=true; axis=null;
    card.style.transition="";
  });
  card.addEventListener("pointermove",e=>{
    if(!dragging) return;
    const dx=e.clientX-startX, dy=e.clientY-startY;
    if(!axis){
      if(Math.abs(dx)>10 && Math.abs(dx)>Math.abs(dy)){ axis="x";
        try{card.setPointerCapture(e.pointerId);}catch(_){} }
      else if(Math.abs(dy)>10){ axis="y"; }   // let content scroll
    }
    if(axis==="x"){
      e.preventDefault();
      card.style.transform="translateX("+dx+"px) rotate("+(dx/22)+"deg)";
      $("tagR").style.opacity = dx>0 ? Math.min(1,dx/TH) : 0;
      $("tagL").style.opacity = dx<0 ? Math.min(1,-dx/TH) : 0;
    }
  });
  function end(e){
    if(!dragging) return; dragging=false;
    const dx=(e.clientX||startX)-startX;
    if(axis==="x" && Math.abs(dx)>=TH){ flyOut(dx>0?"operative":"neutral"); }
    else{
      card.style.transition="transform .2s ease";
      card.style.transform=""; $("tagR").style.opacity=0; $("tagL").style.opacity=0;
    }
    axis=null;
  }
  card.addEventListener("pointerup",end);
  card.addEventListener("pointercancel",end);
})();

idx = firstUnreviewed();
render();
</script>
</body>
</html>
