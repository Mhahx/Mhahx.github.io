<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f1419">
<title>Sentiment-Review · 150 Treffer</title>
<style>
  :root{
    --op:#2e9e5b; --pro:#e0a020; --neu:#57738c; --not:#b0451f;
    --card:#1b232c; --ink:#e8eef3; --muted:#8aa0b3;
    --safe-t:env(safe-area-inset-top); --safe-b:env(safe-area-inset-bottom);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
       background:linear-gradient(160deg,#0f1419,#16202b);color:var(--ink);
       display:flex;flex-direction:column;align-items:center;
       height:100vh;height:100dvh;overflow:hidden;
       padding:var(--safe-t) 0 var(--safe-b)}
  header{width:100%;max-width:760px;padding:12px 16px 4px;flex:0 0 auto}
  h1{font-size:15px;margin:0 0 8px;font-weight:600;letter-spacing:.2px}
  .bar{height:8px;background:#26323d;border-radius:99px;overflow:hidden}
  .bar > i{display:block;height:100%;width:0;
           background:linear-gradient(90deg,#2e9e5b,#46c1ff);transition:width .25s}
  .meta-line{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:5px}

  .stage{position:relative;width:100%;max-width:760px;flex:1 1 auto;min-height:0;
         padding:10px 16px 14px;display:flex;flex-direction:column}
  .card{position:relative;background:var(--card);border:1px solid #2a3742;border-radius:18px;
        padding:16px 18px;box-shadow:0 18px 40px rgba(0,0,0,.45);
        display:flex;flex-direction:column;min-height:0;flex:1 1 auto;
        touch-action:pan-y;will-change:transform}
  .swipe-tag{position:absolute;top:18px;padding:6px 12px;border-radius:10px;font-weight:800;
             font-size:15px;opacity:0;border:2px solid;pointer-events:none;transition:opacity .1s}
  .swipe-tag.r{right:18px;color:var(--op);border-color:var(--op);transform:rotate(12deg)}
  .swipe-tag.l{left:18px;color:var(--neu);border-color:var(--neu);transform:rotate(-12deg)}
  .tags{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:6px}
  .badge{font-size:11px;padding:3px 9px;border-radius:99px;background:#26323d;color:var(--muted)}
  .badge.trig{background:#243b4d;color:#7fd0ff;font-weight:600}
  .firm{font-size:18px;font-weight:700;margin:2px 0}
  .sub{font-size:11px;color:var(--muted);margin-bottom:10px}
  .content{overflow-y:auto;-webkit-overflow-scrolling:touch;font-size:15px;line-height:1.6;
           color:#d4dde5;padding-right:4px;flex:1 1 auto;min-height:0}
  .content mark{background:#3a5a2e;color:#cdffb0;padding:0 2px;border-radius:3px}

  .hint{font-size:11px;color:var(--muted);text-align:center;margin:8px 0 2px}
  .hint b{color:#7fd0ff}
  .btns{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px;flex:0 0 auto}
  button.lab{border:none;border-radius:14px;padding:13px 4px;font-size:14px;font-weight:700;
             color:#fff;cursor:pointer;display:flex;flex-direction:column;gap:2px;
             align-items:center;min-height:54px;justify-content:center;
             transition:transform .08s, filter .15s}
  button.lab small{font-weight:500;opacity:.85;font-size:10px}
  button.lab:active{transform:scale(.95)}
  .b-op{background:var(--op)} .b-pro{background:var(--pro);color:#1a1205}
  .b-neu{background:var(--neu)} .b-not{background:var(--not)}

  .toolbar{display:flex;flex-wrap:wrap;justify-content:center;gap:10px 16px;
           margin-top:10px;font-size:13px;flex:0 0 auto}
  .toolbar a{color:var(--muted);cursor:pointer;text-decoration:none;user-select:none;
             padding:4px 2px}
  .toolbar a:active{color:var(--ink)}
  .tip{margin-top:8px;text-align:center;font-size:12px;color:var(--muted);min-height:15px;flex:0 0 auto}
  .tip b{color:#7fd0ff}

  .summary{display:none;width:100%;max-width:760px;padding:20px 16px;overflow-y:auto}
  .summary.show{display:block}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:14px 0}
  .stat{background:var(--card);border:1px solid #2a3742;border-radius:14px;padding:12px 6px;text-align:center}
  .stat b{font-size:24px;display:block}
  .stat span{font-size:11px;color:var(--muted)}
  .dl{display:inline-block;background:#2e9e5b;color:#fff;padding:12px 20px;border-radius:12px;
      font-weight:700;cursor:pointer;border:none;font-size:15px;margin:6px 6px 0 0}
  .dl.sec{background:#26323d;color:var(--ink)}
  .kpi{font-size:14px;color:var(--muted);margin-top:12px;line-height:1.7}
  .kpi b{color:var(--ink)}

  @media (max-width:520px){
    .btns{grid-template-columns:repeat(2,1fr)}
    button.lab{font-size:15px;min-height:58px}
    .firm{font-size:17px}
    .content{font-size:15px}
    .grid{grid-template-columns:repeat(2,1fr)}
  }
</style>
</head>
<body>
<header>
  <h1>🗂️ Sentiment-Review — manuelles Qualifizieren</h1>
  <div class="bar"><i id="prog"></i></div>
  <div class="meta-line"><span id="counter">0 / 0</span><span id="leftinfo"></span></div>
</header>

<div class="stage" id="stage">
  <div class="card" id="card">
    <span class="swipe-tag r" id="tagR">operative</span>
    <span class="swipe-tag l" id="tagL">neutral</span>
    <div class="tags" id="tags"></div>
    <div class="firm" id="firm"></div>
    <div class="sub" id="sub"></div>
    <div class="content" id="content"></div>
  </div>
  <div class="hint">Wische <b>→ operative</b> · <b>← neutral</b> &nbsp;|&nbsp; oder tippe · Tasten <b>1–4</b></div>
  <div class="btns">
    <button class="lab b-op"  data-l="operative">operative<small>1 · in Nutzung</small></button>
    <button class="lab b-pro" data-l="prospective">prospective<small>2 · geplant</small></button>
    <button class="lab b-neu" data-l="neutral">neutral<small>3 · nur erwähnt</small></button>
    <button class="lab b-not" data-l="not_ai">not_ai<small>4 · kein AI</small></button>
  </div>
  <div class="toolbar">
    <a id="back">◀ Zurück</a>
    <a id="skip">Überspringen ▶</a>
    <a id="toggleTip">Modell-Tipp: aus</a>
    <a id="save">💾 CSV sichern</a>
    <a id="loadlink">⤴ Laden</a>
    <a id="reset">⟲ Reset</a>
  </div>
  <div class="tip" id="tip"></div>
  <input type="file" id="loadfile" accept=".csv,text/csv" style="display:none">
</div>

<div class="summary" id="summary">
  <h1>✅ Review abgeschlossen</h1>
  <div class="grid" id="sumgrid"></div>
  <div class="kpi" id="kpi"></div>
  <div style="margin-top:16px">
    <button class="dl" id="download">⬇ Ergebnisse als CSV</button>
    <button class="dl sec" id="reopen">Nochmal durchgehen</button>
  </div>
</div>

rational technology features to customers. These products are a response to needs across the verticals we serve to reduce edge complexity, add capabilities to developers, lower the cost of ownership, and support a range of environmental conditions.", "qwen": ""}, {"nummer": "435", "name": "Intel Corporation", "gics": "Information Technology", "year": "2021", "trigger": "AI", "content": "—Shannon Poulin, PSG General Manager ■ We are shipping our Intel ® Agilex™ FPGA family, featuring industry-leading FPGA fabric performance, power efficiency, and transceiver performance. We released our Intel ® eASIC™ N5X device family (Diamond Mesa) for low-latency 5G network acceleration, cloud acceleration, and storage, AI, and edge applications. ■ We announced Arrow Creek, an FPGA-based Acceleration Development Platform SmartNIC adapter for high-performance 100G networking acceleration, and RedHat support for our Intel Open FPGA Stack scalable, source-accessible FPGA hardware and software infrastructure.", "qwen": ""}, {"nummer": "489", "name": "Intuitive Surgical, Inc.", "gics": "Health Care", "year": "2021", "trigger": "robotic-assisted", "content": "Ion endoluminal system. In February 2019, we obtained FDA clearance for the Ion endoluminal system, our new flexible, robotic-assisted, catheter-based platform designed to navigate through very small lung airways to reach peripheral nodules for biopsies. The Ion system uses an ultra-thin articulating robotic catheter that can articulate 180 degrees in all directions.", "qwen": ""}, {"nummer": "521", "name": "Lumentum Holdings Inc.", "gics": "Information Technology", "year": "2021", "trigger": "computer vision", "content": "Laser-based 3D sensing and LiDAR for security, industrial and automotive applications are rapidly developing markets. The technology enables computer vision applications that enhance security, safety, and new functionality in the electronic devices that people rely on every day. The use of LiDAR and in-cabin 3D sensing in automobile and delivery vehicles over time significantly adds to our long-term market opportunity.", "qwen": ""}, {"nummer": "526", "name": "Mastercard Incorporated", "gics": "Financials", "year": "2021", "trigger": "machine learning", "content": "This experience is based on the EMV Secure Remote Commerce industry standard that enables a faster, more secure checkout experience across web and mobile sites, mobile apps and connected devices ◦ Our Digital First Card program enables customers to offer their cardholders a fully digital payment experience with an optional physical card, meeting cardholder expectations of immediacy, safety and convenience during card application, authentication and instant card access, securing purchases (whether contactless, in-store, in-app or via the web) and managing alerts, controls and benefits ◦ Our Digital Doors program helps small businesses establish and protect an online presence, including accepting digital payments • Securing more transactions. We are leveraging tokenization, biometrics and machine learning technologies in our push to secure every transaction. These efforts include driving EMV-level security and benefits through all our payment channels.", "qwen": ""}, {"nummer": "712", "name": "Palo Alto Networks, Inc.", "gics": "Information Technology", "year": "2021", "trigger": "machine learning", "content": "• DNS Security. This cloud-based subscription uses machine learning to proactively block malicious domains and stops attacks in progress. Unlike other solutions, it does not require endpoint routing configurations to be maintained and therefore cannot be bypassed.", "qwen": ""}, {"nummer": "751", "name": "Palantir Technologies Inc.", "gics": "Information Technology", "year": "2021", "trigger": "AI", "content": "If the recommendations, forecasts, or analyses that AI applications assist in producing are deficient or inaccurate, we could be subjected to competitive harm, potential legal liability, and brand or reputational harm. Some AI scenarios present ethical issues. Though our technologies and business practices are designed to mitigate many of these risks, if we enable or offer AI solutions that are controversial because of their purported or real impact on human rights, privacy, employment, or other social issues, we may experience brand or reputational harm.", "qwen": ""}, {"nummer": "772", "name": "Revvity, Inc.", "gics": "Health Care", "year": "2021", "trigger": "precision medicine", "content": "• PerkinElmer Signals TM electronic notebook, a scientific research data management solution, which allows researchers to record research data and experiments in digital notebooks, drag and drop, store, organize, share, find and filter data easily. • PerkinElmer Signals TM Translational data management, aggregation and analysis platform, which offers out-of-the-box support for the complete precision medicine workflow from data acquisition to biomarker discovery and validation. • ChemDraw ® 18, a chemical structure drawing and visualization application for scientists and researchers.", "qwen": ""}, {"nummer": "917", "name": "Advanced Micro Devices, Inc.", "gics": "Information Technology", "year": "2022", "trigger": "machine learning", "content": "FidelityFX Super Resolution (FSR) uses upscaling technologies to help boost frame rates in games. Our FSR 2.0 technology uses temporal data and optimized anti-aliasing to boost frame rates in supported games while delivering similar or better image quality than native resolution without requirement dedicated machine learning hardware. Our AMD Radeon RX 7900 XTX and Radeon RX 7900 XT graphics cards are built on high-performance, energy-efficient AMD RDNA 3 architecture.", "qwen": ""}, {"nummer": "1041", "name": "The Cigna Group", "gics": "Health Care", "year": "2022", "trigger": "AI", "content": "Additionally, 26 the National Association of Insurance Commissioners (\"NAIC\"), an organization of state insurance regulators, recently ncluding automated insulin delivery systems.", "qwen": ""}, {"nummer": "1170", "name": "F5, Inc.", "gics": "Information Technology", "year": "2022", "trigger": "artificial intelligence", "content": "Our multi-cloud application security and delivery solutions reduce our customers’ operational complexity and costs, enabling our customers to scale, secure, and optimize both legacy and modern applications, across any infrastructure and create extraordinary digital experiences for their end users. We are leveraging near real-time collection of live application telemetry, machine learning and artificial intelligence, and toolchain automation to create adaptive applications capable of rapidly responding to changes in performance, availability, and security threats with little to no human interaction. Key components of our strategy include: Bringing our adaptive application vision to life F5 is uniquely positioned to deliver adaptive applications.", "qwen": ""}, {"nummer": "1292", "name": "International Business Machines Corporation", "gics": "Information Technology", "year": "2022", "trigger": "artificial intelligence", "content": "These products, services, systems and networks are also used by customers in heavily regulated industries, including those in the financial services, healthcare, critical infrastructure and government sectors. Successful cybersecurity attacks or other security incidents could result in, for example, one or more of the following: unauthorized access to, disclosure, modification, misuse, loss, or destruction of company, customer, or other third party data or systems; theft or import or export of sensitive, regulated, or confidential data including personal information and intellectual property, including key innovations in artificial intelligence, quantum, or other disruptive technologies; the loss of access to critical data or systems through ransomware, crypto mining, destructive attacks or other means; and business delays, service or system disruptions or denials of service. In the event of such actions, the company, its customers and other third parties could be exposed to liability, litigation, and regulatory or other government action, including debarment, as well as the loss of existing or potential customers, damage to brand and reputation, damage to our competitive position, and other financial loss.", "qwen": ""}, {"nummer": "1308", "name": "Intel Corporation", "gics": "Information Technology", "year": "2022", "trigger": "AI", "content": "We optimize for the most widely used AI frameworks and libraries, including TensorFlow, Pytorch, Scikit-learn, NumPy, XGBoost, and Spark, with certain optimizations delivering up to 100 times performance improvements to support end-to-end AI. We also develop innovative Intel software to accelerate developer productivity, such as OpenVINO™, Intel ® Neural Compressor, BigDL, and AI software reference kits. ▪ We seek to continually improve our system and foundational-level software in support of our client, data center, networking, and graphics products, delivering AI-optimized software across the stack, including BIOS, firmware, simulation, operating systems, and virtualization.", "qwen": ""}, {"nummer": "1425", "name": "KeyCorp", "gics": "Financials", "year": "2022", "trigger": "model risk", "content": "We have an enterprise-wide model risk management program designed to accurately identify, measure, report, monitor, and manage model risk. The management of model risk includes independent validation and model governance, establishing and monitoring model control standards and model risk metrics, and completeness and accuracy of the inventory of models . Banking regulators continue to focus on the models used by banks and bank holding companies in their businesses.", "qwen": ""}, {"nummer": "1490", "name": "Microsoft Corporation", "gics": "Information Technology", "year": "2022", "trigger": "intelligent edge", "content": "Being a global-scale cloud, Azure uniquely offers hybrid consistency, developer productivity, AI capabilities, and trusted security and compliance. We see more emerging use cases and needs for compute and security at the edge and are accelerating our innovation across the spectrum of intelligent edge devices, from Internet of Things (“IoT”) sensors to gateway devices and edge hardware to build, manage, and secure edge workloads. With Azure Stack, organizations can extend Azure into their own datacenters to create a consistent stack across the public cloud and the intelligent edge.", "qwen": ""}, {"nummer": "1520", "name": "Motorola Solutions, Inc.", "gics": "Information Technology", "year": "2022", "trigger": "AI", "content": "The LMR technology within the Products and Systems Integration segment represent ed 82% of the net sales of the total segment in 2022. Video Our Video technology includes video management infrastructure, AI-video powered security cameras including fixed and certain mobile video equipment as well as on-premise and cloud-based access control solutions. Since 2018, we have developed our video security and access control business through investments in research and development and acquisitions, directly contributing to our growth strategy to serve as a leader in end-to-end video security solutions and supporting the expansion of our portfolio.", "qwen": ""}, {"nummer": "1536", "name": "Northrop Grumman Corporation", "gics": "Industrials", "year": "2022", "trigger": "artificial intelligence", "content": "Our broad portfolio is aligned to support national security priorities and our solutions equip our customers with capabilities they need to connect, protect and advance humanity. The company is a leading provider of space systems, advanced aircraft, missile defense, advanced weapons and long-range fires capabilities, mission systems, networking and communications, strategic deterrence systems, and breakthrough technologies, such as artificial intelligence, advanced computing and cyber. We are focused on competing and winning programs that enable continued growth, performing on our commitments and affordably delivering capability our customers need.", "qwen": ""}, {"nummer": "1585", "name": "NVIDIA Corporation", "gics": "Information Technology", "year": "2022", "trigger": "AI", "content": "In addition to software that is delivered to customers as an integral part of our data center computing platform, we offer enterprise software products on a standalone basis as a perpetual license or subscription. Our enterprise software offerings include NVIDIA AI Enterprise, a comprehensive suite of enterprise-grade AI software; NVIDIA Fleet Command software-as-a-service for securely deploying and managing AI applications across distributed edge infrastructure; NVIDIA Base Command software-as-a-service for managing large-scale, multi-user and multi-team AI development workflows; and NVIDIA vGPU software products that enable powerful GPU performance for workloads ranging from graphics-rich virtual desktops and workstations to data science and AI. Professional Visualization We serve the Professional Visualization market by working closely with independent software vendors, or ISVs, to optimize their offerings for NVIDIA GPUs.", "qwen": ""}, {"nummer": "1655", "name": "Palo Alto Networks, Inc.", "gics": "Information Technology", "year": "2022", "trigger": "ML-powered", "content": "It provides enterprise data protection and compliance across all SaaS applications and prevents cloud threats in real time with best-in-class security. The solution is easy to deploy being natively integrated on our range of ML-Powered Next-Generation Firewalls, eliminating the architectural complexity of traditional CASB products, while offering low total cost of ownership. It can be combined with SaaS Security API as a complete integrated CASB.", "qwen": ""}, {"nummer": "1675", "name": "Palantir Technologies Inc.", "gics": "Information Technology", "year": "2022", "trigger": "machine learning", "content": "• A multinational insurer sought to build and apply machine-learning models to surface fraudulent insurance claims, while ensuring that processing was sufficiently transparent, interpretable, and accountable to decision makers and oversight authorities. We helped to configure and implement a number of supporting privacy-enhancing features, including pseudonymization processes to minimize data exposure, rigorous documentation of machine learning model features and parameters, and auditing tools for users and regulators. Our Team We employ a team of engineers, lawyers, and social scientists to ensure that our company remains a leader in the field when it comes to privacy practices and software development.", "qwen": ""}, {"nummer": "1680", "name": "QUALCOMM Incorporated", "gics": "Information Technology", "year": "2022", "trigger": "automated driving", "content": "In IoT, our inventions have helped power growth in industries and applications such as consumer (including computing, voice and music and XR), edge networking (including mobile broadband and wireless access points) and industrial (including handhelds, retail, transportation and logistics and utilities). In automotive, our connectivity, digital cockpit and advanced driver assistance and automated driving (ADAS/AD) platforms are helping to connect the car to its environment and the cloud, create unique in-cabin experiences and enable a comprehensive assisted and automated driving solution. We derive revenues principally from sales of integrated circuit products, including our Snapdragon® family of highly-integrated, system-based solutions, and licensing of our intellectual property, including patents and other rights.", "qwen": ""}, {"nummer": "1797", "name": "Verizon Communications Inc.", "gics": "Communication Services", "year": "2022", "trigger": "intelligent edge", "content": "In addition, we monetize certain receivables through asset-backed debt transactions. Capital Expenditures Our 2023 rtfolios designed to boost productivity, enhance policy management and simplify tasks. Our AI-scale infrastructure will allow our customers to process AI workloads more efficiently.", "qwen": ""}, {"nummer": "2287", "name": "Cognizant Technology Solutions Corporation", "gics": "Information Technology", "year": "2023", "trigger": "AI", "content": "In turn, these consequences may cause decreased demand for our services or harm to our business, results of operations, or reputation. AI technology and services are part of a highly competitive and rapidly evolving market. We plan to incur significant development and operational costs to build and support our AI capabilities to meet the needs of our clients.", "qwen": ""}, {"nummer": "2288", "name": "Cognizant Technology Solutions Corporation", "gics": "Information Technology", "year": "2023", "trigger": "AI", "content": "AI technology and services are part of a highly competitive and rapidly evolving market. We plan to incur significant development and operational costs to build and support our AI capabilities to meet the needs of our clients. We face significant competition from our traditional competitors as well as other third parties, including those that are new to the market, and our clients may develop their own AI-related capabilities.", "qwen": ""}, {"nummer": "2341", "name": "Dell Technologies Inc.", "gics": "Information Technology", "year": "2023", "trigger": "artificial intelligence", "content": "Our server portfolio includes high-performance rack, blade, and tower servers. Our servers are designed with the capability to run high value workloads across customers’ IT environments, including artificial intelligence, machine learning, and edge workloads. Our networking portfolio helps our business customers transform and modernize their infrastructure, mobilize and enrich end-user experiences, and accelerate business applications and processes.", "qwen": ""}, {"nummer": "2505", "name": "GE HealthCare Technologies ake, Magic Editor, and Audio Magic Eraser. As we look ahead, we are designing our Android and Chrome operating systems with new AI-forward user experiences.", "qwen": ""}, {"nummer": "2665", "name": "The Goldman Sachs Group, Inc.", "gics": "Financials", "year": "2023", "trigger": "AI", "content": "We have invested significant resources into the development of electronic trading systems and expect to continue to do so, but there is no assurance that the revenues generated by these systems will yield an adequate return, particularly given the generally lower commissions arising from electronic trades. In addition, the emergence, adoption and evolution of new technologies, including distributed ledgers, such as digital assets and blockchain, and AI, have required us to invest resources to adapt our existing products and services, and we expect to continue to make such investments, which could be material. The adoption and evolution of such new technologies may also increase our compliance and regulatory costs.", "qwen": ""}, {"nummer": "2678", "name": "Honeywell International Inc.", "gics": "Industrials", "year": "2023", "trigger": "process automation", "content": "Periods of increased volatility in oil and natural gas prices may result in less investment by our customers and therefore, lower demand for our products and services. • Safety and Productivity Solutions —Operating results may be adversely impacted by reduced investments in process automation, safety monitoring, and plant capacity utilization initiatives, fluctuations in retail markets, a slowdown in demand for safety products, changes in the competitive landscape, including new market entrants and new technologies that may lead to product commoditization, and adverse industry economic conditions, all of which could result in lower market share, reduced selling prices, and lower margins. A significant percentage of our sales and operations is in non-U.S. jurisdictions and is subject to the economic, political, regulatory, foreign exchange, and other risks of international operations.", "qwen": ""}, {"nummer": "2804", "name": "Intel Corporation", "gics": "Information Technology", "year": "2023", "trigger": "GenAI", "content": "■ We continue to update solutions to improve developers' digital strategies and to accelerate market adoption of edge and AI applications. We announced 13th Gen Intel Core processors for Internet of Things edge and OpenVINO toolkit version 2023.1 with enhanced features for GenAI and edge computing. ■ We continue to work with our ecosystem partners like Ericsson, Nokia, Cisco, Dell Technologies, HPE, Lenovo, Amazon, Google, and Microsoft to drive the software-defined transformation of the world's network and edge infrastructure and accelerate AI-driven automation of physical operations.", "qwen": ""}, {"nummer": "3151", "name": "MSCI Inc.", "gics": "Financials", "year": "2023", "trigger": "AI", "content": "The use of AI applications may also result in cyber-attacks or other security incidents or a failure to protect confidential information (e.g., propriety, third-party, employee or client information). Laws and regulations applicable to AI, including intellectual property, data privacy and security, consumer protection, competition, and equal opportunity laws, continue to develop and may be inconsistent from jurisdiction to jurisdiction. Because AI technology itself is highly complex and rapidly developing, it is not possible to predict all of the legal, operational or technological risks that may arise relating to the use of AI.", "qwen": ""}, {"nummer": "3258", "name": "Micron Technology, Inc.", "gics": "Information Technology", "year": "2023", "trigger": "AI", "content": "We are in a strong position to serve AI demand for fast storage as these data-intensive applications proliferate. In 2023, we launched our first 200+ layer NAND data center SSD, and qualification has completed at some customers and is in progress at other customers largely to e our most valuable asset and are the source of our innovation and our success.", "qwen": ""}, {"nummer": "3528", "name": "Regency Centers Corporation", "gics": "Real Estate", "year": "2023", "trigger": "AI", "content": "These obligations may prevent or limit our ability to use AI in our business, lead to regulatory fines or penalties, or require us to change our business practices. If we cannot use AI, or that use is restricted, our business may be less efficient, or we may be at a competitive disadvantage. Any of these factors could adversely affect our business, financial condition, and results of operations.", "qwen": ""}, {"nummer": "3583", "name": "S&P Global Inc.", "gics": "Financials", "year": "2023", "trigger": "AI", "content": "• The products we develop or license, and the proprietary methodologies, models and processes on which these products rely, from time to time contain undetected errors or defects, despite testing and/or other quality assurance practices. Moreover, many of our products use new and evolving technologies, such as AI, that may contain their own undetected errors or defects. For example, the AI used in our products could include undetected errors or defects that lead to harmful consequences such as accuracy issues, unintended biases or discriminatory outputs.", "qwen": ""}, {"nummer": "3594", "name": "Seagate Technology Holdings plc", "gics": "Information Technology", "year": "2023", "trigger": "autonomous vehicles", "content": "As more data is created at endpoints outside traditional data centers, which requires processing at the edge and in the core or cloud, the need for data storage and management between the edge and cloud has also increased. Use cases include connected and autonomous vehicles, smart manufacturing and smart cities. We believe the proliferation and personal creation of media-rich digital content, further enabled by fifth-generation wireless (“5G”) technology, the edge, the Internet of Things (“IoT”), machine learning (“ML”) and artificial intelligence (“AI”), will continue to create demand for higher capacity storage solutions.", "qwen": ""}, {"nummer": "3599", "name": "Seagate Technology Holdings plc", "gics": "Information Technology", "year": "2023", "trigger": "machine learning", "content": "Disk Drive Assembly. Following the completion of the head disk assembly, it is mated to the PCBA, and the completed unit goes through extensive defect mapping and machine learning prior to packaging and shipment. Disk drive assembly and machine learning operations occur primarily at our facilities located in China and Thailand.", "qwen": ""}, {"nummer": "3612", "name": "Teledyne Technologies Incorporated", "gics": "Information Technology", "year": "2023", "trigger": "artificial intelligence", "content": "New technologies, including generative AI, quantum computing, new uses of QR codes and other innovations in digital communications, introduce new attack vectors, and new potential compromise scenarios, which malicious adversaries can exploit. Issues in the development and use of artificial intelligence may result in reputational harm or liability, and failure to introduce new and innovative products that have artificial intelligence capabilities could put us at a competitive disadvantage. 18 Table of Contents We currently incorporate machine learning and artificial intelligence capabilities (“AI”) into certain of our products and solutions and may seek to expand the use of AI in our offerings in the future.", "qwen": ""}, {"nummer": "3658", "name": "Tesla, Inc.", "gics": "Consumer Discretionary", "year": "2023", "trigger": "self-driving vehicles", "content": "We are continuing to develop our Autopilot and FSD Capability technology. There are a variety of international, federal and state regulations that may apply to, and may adversely affect, the design and performance, sale, marketing, registration and operation of Autopilot and FSD Capability, and future capability, including full self-driving vehicles that may not be operated by a human driver. This includes many existing vehicle standards that were not originally intended to apply to vehicles that may not be operated by a human driver.", "qwen": ""}, {"nummer": "3734", "name": "W. R. Berkley Corporation", "gics": "Financials", "year": "2023", "trigger": "artificial intelligence", "content": "For example, in 2021 Colorado enacted a law that prohibits insurers from using external consumer data and information sources (“ECDIS”), as well as algorithms or predictive models that use ECDIS, in a way that unfairly discriminates based on race, color, national or ethnic origin, religion, sex, sexual orientation, disability, gender identity or gender expression. In August 2023, Colorado adopted regulations requiring life insurers to adopt a governance and risk management framework for the use of artificial intelligence, machine learning and other technologies that utilize “external consumer data.” It is expected that Colorado will also adopt governance and testing regulations for other lines of insurance, in accordance with the requirements of its 2021 law. We cannot predict whether states will adopt the AI Bulletin, or what, if any, changes to laws or regulations may be enacted with regard to “big data” or artificial intelligence technologies.", "qwen": ""}, {"nummer": "3753", "name": "Zimmer Biomet Holdings, Inc.", "gics": "Health Care", "year": "2023", "trigger": "artificial intelligence", "content": "Certain of these laws and regulations impose time-sensitive notification requirements to governmental authorities or consumers. We are also subject to emerging guidance governing data security and cyber risk management for medical devices as well as emerging guidance relating to artificial intelligence. Failure to comply with any such data protection laws, regulations and guidance could result in government enforcement actions (which could include civil and/or criminal penalties), private litigation and/or adverse publicity and could negatively affect our operating results and business.", "qwen": ""}, {"nummer": "3812", "name": "Analog Devices, Inc.", "gics": "Information Technology", "year": "2024", "trigger": "AI", "content": "In addition, we face significant competition from other companies that are incorporating AI into their products and technologies. These other companies may incorporate AI in products or technologies that are similar to, or that customers perceive as superior to, our technologies or are more cost-effective to develop and deploy. AI technology is complex and rapidly evolving, and if we are unable to innovate quickly enough to keep pace with these rapid technological developments, our business could be harmed.", "qwen": ""}, {"nummer": "3815", "name": "Analog Devices, Inc.", "gics": "Information Technology", "year": "2024", "trigger": "AI", "content": "AI technology may also give rise to significant legal and regulatory liability. Governments around the world have adopted, and may continue to adopt, laws and regulations related to AI, including the European Union’s AI Act, and several U.S. government agencies have increased investigations and enforcement efforts related to the use of AI technology, which could increase our compliance costs and limit our ability to use AI in the development of our products and services. While the incoming administration has signaled that AI policy will be a priority, the scope and impact of any such policies cannot yet be determined.", "qwen": ""}, {"nummer": "4011", "name": "Amazon.com, Inc.", "gics": "Consumer Discretionary", "year": "2024", "trigger": "machine learning", "content": "We believe that advances in technology, specifically the speed and reduced cost of processing power, data storage and analytics, improved wireless connectivity, and the practical applications of artificial intelligence and machine learning, will continue to improve users’ experience on the internet and increase its ubiquity in people’s lives. To best take advantage of these continued advances in technology, we are investing in AWS, which offers a broad set of on-demand technology services, including compute, storage, database, analytics, and machine learning, and other services to developers and enterprises of all sizes. We are also investing in initiatives to build and deploy innovative and efficient software and electronic devices as well as other initiatives including the development of a satellite network for global broadband service and autonomous vehicles for ride-hailing services.", "qwen": ""}, {"nummer": "4013", "name": "Amazon.com, Inc.", "gics": "Consumer Discretionary", "year": "2024", "trigger": "artificial intelligence", "content": "These segments reflect the way the Company evaluates its business performance and manages its operations. See Item 8 of Part II, “Financial Statements and Supplementary Data — Note 10 — Segment Information.” Overview Macroeconomic factors, including changes in inflation and interest rates, global economic and geopolitical developments, and the development and adoption of technologies and services, including artificial intelligence, have direct and indirect impacts on our results of operations that are difficult to isolate and quantify. These could affect customer demand for our products and services, our ability to predict growth needs, expenses, and the benefits we gain from new technologies.", "qwen": ""}, {"nummer": "4041", "name": "Arista Networks, Inc.", "gics": "Information Technology", "year": "2024", "trigger": "AI", "content": "The Arista 7800R AI Spine, 7060 AI Leaf and the Distributed Etherlink Switch (\"DES\") are designed to address the demanding scale and performance requirements driven by large-scale AI networks. Arista also provides solutions for compute, GPU and storage interconnects in driving AI/ML workloads, leveraging its IP/Ethernet switches to deliver unparalleled performance and scalability. The Arista 7700R4 DES is an ultra- ly with these new laws and regulations.", "qwen": ""}, {"nummer": "6305", "name": "NVIDIA Corporation", "gics": "Information Technology", "year": "2024", "trigger": "AI", "content": "In addition to software delivered to customers as an integral part of our data center computing platform, we offer paid licenses to NVIDIA AI Enterprise, a comprehensive suite of enterprise-grade AI software and NVIDIA vGPU software for graphics-rich virtual desktops and workstations. In fiscal year 2024, we launched the NVIDIA DGX Cloud, an AI-training-as-a-service platform which includes cloud-based infrastructure and software for AI, customizable pretrained AI models, and access to NVIDIA experts. We have partnered with leading cloud service providers to host this service in their data centers.", "qwen": ""}, {"nummer": "6483", "name": "Pfizer Inc.", "gics": "Health Care", "year": "2024", "trigger": "AI", "content": "Such claims, actions and inquiries may relate to alleged non-compliance with laws and regulations associated with the dissemination of product (approved and unapproved) information, potentially resulting in government enforcement action and reputational damage. These risks may be heightened by the use of AI in our operations as well as in our digital marketing, including social media, mobile applications and blogger outreach, as well as direct-to-consumer marketing and digital platform offerings. In connection with the resolution of a U.S. government investigation concerning independent copay assistance organizations that provide financial assistance to Medicare patients, in 2018, we entered into a Corporate Integrity Agreement with the Office of the Inspector General of the HHS (OIG), which expired in May 2023.", "qwen": ""}, {"nummer": "6544", "name": "PPL Corporation", "gics": "Utilities", "year": "2024", "trigger": "AI", "content": "Artificial intelligence (AI) is an emerging area of technology that has the potential to impact various aspects of our business operatio  Technology", "year": "2025", "trigger": "AI", "content": "Any inability to appropriately comply with the existing laws, rules and regulations that implicate aspects of AI could result in legal liability, regulatory action or brand and reputational harm. Our use of AI could also pose other concerns. If we enable or offer solutions that draw controversy or if these new offerings do not work as we intend, we may experience brand or reputational harm, competitive harm or legal liability.", "qwen": ""}, {"nummer": "8752", "name": "Alphabet Inc.", "gics": "Communication Services", "year": "2025", "trigger": "TPU", "content": "At the foundation of our full-stack approach is our AI-optimized infrastructure — a key differentiator enabling us to power our own products, such as Search and YouTube, and support the services we provide to our Google Cloud customers. Our technical infrastructure allows us to use and offer our customers a range of AI accelerator options, including specialized Graphics Processing Units (GPUs) and our own custom-built Tensor Processing Units (TPUs), such as Ironwood, our seventh-generation TPU. We are focused on driving efficiencies in our data centers, allowing us to leverage our technical infrastructure to deliver our products and services at an increasing scale while simultaneously enabling world-class research and model development.", "qwen": ""}, {"nummer": "8786", "name": "Alphabet Inc.", "gics": "Communication Services", "year": "2025", "trigger": "frontier models", "content": "We report Google in two segments, Google Services and Google Cloud, and all non-Google businesses collectively as Other Bets. Supporting these businesses, we have centralized certain AI-related research and development focused on advanced research in AI and developing the frontier models that serve our businesses, which is reported in Alphabet-level activities. For further details on our segments, see Part I, Item 1 Business and Note 15 of the Notes to Consolidated Financial Statements included in Item 8 of this Annual Report on Form 10-K. Trends in Our Business and Financial Effect The following long-term trends have contributed to the results of our consolidated operations, and we anticipate that they will continue to affect our future results: • As we continue to grow our business and meet the evolving behaviors and needs of our users and customers, our revenue growth and mix along with our cost and margin profiles are being influenced by a number of factors, including: Expanded AI Offerings in our Products and Services: The continuing evolution of the online world has contributed to the growth of our business.", "qwen": ""}, {"nummer": "8798", "name": "Alphabet Inc.", "gics": "Communication Services", "year": "2025", "trigger": "frontier models", "content": "We report Google in two segments, Google Services and Google Cloud, and all non-Google businesses collectively as Other Bets. Supporting these businesses, we have centralized certain AI-related research and development focused on advanced research in AI and developing the frontier models that serve our businesses, which is reported in Alphabet-level activities. Alphabet's structure is about helping each of our businesses prosper through strong leaders and independence.", "qwen": ""}, {"nummer": "8831", "name": "Alphabet Inc.", "gics": "Communication Services", "year": "2025", "trigger": "machine learning", "content": "• Data and Analytics: enables customers to migrate, clean, prepare, and feed data into their models. Our data platform also unifies data lakes, data warehouses, data governance, and advanced machine learning into a single platform that helps users analyze data using AI models across any cloud. • Agents: ◦ Gemini Enterprise: empowers teams to discover, create, share, and run AI agents all in one secure platform, bringing the best of Google AI to employees through an intuitive chat interface, helping to automate workflows and drive smarter business outcomes.", "qwen": ""}, {"nummer": "8929", "name": "Honeywell International Inc.", "gics": "Industrials", "year": "2025", "trigger": "artificial intelligence", "content": "Industrial Automation offerings include automation control and instrumentation products and services; smart energy products; sensing technologies with an array of custom-engineered sensors and services; gas detection technologies; and system design, advanced automation equipment, software and analytics for manufacturing, distribution, and fulfillment operations. These products and services are combined with proprietary machine learning and artificial intelligence algorithms in products and projects which are digitally enabled through our industry leading industrial Internet of Things (IoT) platform, Honeywell Forge. 2025 Full-year revenue of $9,401 million 2025 Full-year revenue by business unit $1,171 million $1,132 million $6,165 million $933 million Sensing and Safety Technologies 1 Productivity Solutions and Services 2 Process Solutions Warehouse and Workflow Solutions 2 1 On May 21, 2025, the Company completed the sale of its personal protective equipment (PPE) business which was included in the Sensing and Safety Technologies business unit.", "qwen": ""}, {"nummer": "8936", "name": "Honeywell International Inc.", "gics": "Industrials", "year": "2025", "trigger": "artificial intelligence", "content": "The failure of our technologies or products to gain market acceptance due to more attractive offerings by our competitors or the failure to address any of the above factors could significantly reduce our revenues and adversely affect our competitive standing and prospects. Emerging technology, such as generative and agentic artificial intelligence, is complex and rapidly evolving, and while we aim to develop and use artificial intelligence responsibly, we may ultimately be unsuccessful in identifying or resolving all problems, and the technologies that we develop or use may ultimately be flawed, which could harm our reputation and expose us to risks related to potential infringement of others' intellectual property, biases, inaccuracies or errors in outputs from these technologies. Furthermore, any integration of third-party artificial intelligence models with our products and solutions relies on certain safeguards implemented by the third-party developers of the models, and there can be no guarantee that those safeguards are adequate to protect against the risks associated with their deployment.", "qwen": ""}, {"nummer": "9045", "name": "Hewlett Packard Enterprise Company", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "As with many developing technologies, AI presents risks and challenges and may result in unintended consequences that could affect its further development, adoption, and use, and therefore our business and our overall strategy. We manufacture hardware designed to support AI capabilities, and our research into and continued development of such capabilities and manufacturing processes remain ongoing. We have invested, and expect to continue to invest, significant resources to use, acquire, build, and support the development of these capabilities and manufacturing processes, and if our AI-related offerings fail to operate as anticipated or as well as competing offerings or otherwise do not meet customer needs or if we are unable to bring AI-related offerings to market as effectively as our competitors, we may fail to recoup our investments in AI, our competitive position may be harmed, and our business and reputation may be adversely impacted.", "qwen": ""}, {"nummer": "9065", "name": "Hewlett Packard Enterprise Company", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "Additionally, the varying sizes of customer contracts or orders, variations in customer acceptances of delivered orders, the timing thereof, and cancellations and/or de-bookings of such orders (due to various reasons, including, but not limited to, failure to satisfy terms and compliance matters, whether initiated by us or the customer) can be uneven across our portfolio and have at times impacted, and in the future could impact, our pipeline, bookings, and our ability to recognize revenue, if at all (particularly with respect to contracts and orders involving our AI offerings). Further, larger orders, including some orders for our AI systems, may involve larger amounts of credit or longer payment terms than typical for our business, increasing our risk when customers do not pay in a timely fashion, or at all, particularly where payment terms with major suppliers differ from the terms with our customers. Such variables have in the past negatively impacted our financial performance, and may do so again in the future.", "qwen": ""}, {"nummer": "9126", "name": "Henry Schein, Inc.", "gics": "Health Care", "year": "2025", "trigger": "AI", "content": "Additionally, if investments in emerging technologies are less successful at attracting and retaining customers than similar investments by our competitors, or if we are otherwise unsuccessful at realizing the benefits of these technological investments generally, this could have a material adverse effect on our business, financial condition, or operating results. Additionally, widely accessible generative AI that rapidly surpasses our organizational ability to understand associated risks and opportunities (including employees’ failure to comply with principles, policies and processes governing AI usage) could endanger our intellectual property, lead to misuse or loss of data and cause reputational harm and other fines, penalties or losses. Risks inherent in acquisitions, dispositions and joint ventures could offset the anticipated benefits.", "qwen": ""}, {"nummer": "9196", "name": "IDEX Corporation", "gics": "Industrials", "year": "2025", "trigger": "AI", "content": "We are in the initial stages of our phased approach in reviewing AI solutions and capabilities and incorporating AI into our business activities and product and service offerings. As with many innovations, AI presents risks and challenges that could adversely impact our business. The development, adoption, and use of AI technologies are still in their early stages and ineffective or inadequate AI development or deployment practices could result in unintended consequences.", "qwen": ""}, {"nummer": "9198", "name": "IDEX Corporation", "gics": "Industrials", "year": "2025", "trigger": "AI", "content": "The development, adoption, and use of AI technologies are still in their early stages and ineffective or inadequate AI development or deployment practices could result in unintended consequences. For example, AI algorithms may be flawed or may be based on datasets that are biased or insufficient. In addition, any disruption or failure in the AI functionality we have incorporated or may in the future incorporate into our business activities, products or services could adversely impact our business or result in delays or errors in our offerings.", "qwen": ""}, {"nummer": "9293", "name": "Intel Corporation", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "We routinely evaluate opportunities and enter into agreements for possible acquisitions, divestitures and other strategic transactions. These transactions involve numerous risks, including: ▪ failure of the transaction to advance our business strategy and failure of its anticipated benefits to materialize; ▪ disruption of our ongoing operations and diversion of our management's attention; ▪ our inability to retain key personnel of acquired or majority-owned businesses or our difficulty in integrating or separating employees, business systems and technology or otherwise operating the acquired or majority-owned business, including in areas such as AI where there is a high demand for talent; Risk Factors 48 ▪ our failure to realize a satisfactory return on our investment, potentially resulting in an impairment of goodwill and other assets, such as the $2.8 billion charge we recorded in the third quarter of 2024 primarily related to Mobileye goodwill; ▪ controls, processes and procedures of acquired or majority-owned businesses that do not adequately ensure compliance with laws and regulations and create complexity and inconsistency in application of controls, processes and procedures and our failure to identify and/or address compliance issues, including accounting or tax errors or liabilities; ▪ our failure to identify, or our underestimation of, commitments, liabilities, accounting, tax and other risks associated with acquired businesses or assets, majority-owned businesses or novel transactions; and ▪ the potential for our transactions to result in dilutive issuances of our equity securities or significant additional debt. Any of these risks could have a material adverse effect on our business, results of operations, financial condition, or cash flows, particularly in the case of a large acquisition, divestiture or partial divestiture, or several concurrent strategic transactions.", "qwen": ""}, {"nummer": "9460", "name": "Gartner, Inc.", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "Disruptive technologies, including in areas of artificial intelligence (“AI”) and machine learning, are rapidly changing the environment in which we, our clients, and our competitors operate and could affect the nature of how we generate revenue. We anticipate encountering more competition with increased adoption of AI services in the markets in which we compete. We will need to continue to respond to and anticipate these changes by enhancing our product and service offerings to maintain our competitive position.", "qwen": ""}, {"nummer": "9561", "name": "The Kroger Co.", "gics": "Consumer Staples", "year": "2025", "trigger": "AI", "content": "​ To effectively compete, we may need to increase investments to innovate new capabilities and processes incorporating AI as well as to develop appropriate protections, safeguards, and policies for handling data and mitigating information security, data privacy and legal risks. Furthermore, the regulatory and legal landscape regarding AI is rapidly evolving and the Company may be challenged to timely comply in a cost-effective manner. ​ Through our sales and marketing activities, we collect and store some personal information that our customers provide to us.", "qwen": ""}, {"nummer": "9578", "name": "Leidos Holdings, Inc.", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "If the AI tools that we use are deficient, inaccurate, or controversial, we could incur operational inefficiencies, competitive harm, legal liability, brand or reputational harm, or other adverse impacts on our business and financial results. If we do not have sufficient rights to use the data or other material or content on which the AI tools we use rely, we also may incur liability through the violation of applicable laws and regulations, third-party intellectual property, data privacy, or other rights, or contracts to which we are a party. In addition, AI regulation is rapidly evolving worldwide as legislators and regulators increasingly focus on these powerful emerging technologies.", "qwen": ""}, {"nummer": "9655", "name": "Lowe's Companies, Inc.", "gics": "Consumer Discretionary", "year": "2025", "trigger": "AI", "content": "We use AI-powered solutions designed to enable quick and personalized customer interactions, design assistance platforms, and tools for better forecasting, sourcing, inventory planning, and faster fulfillment. We face risk of competitive disadvantage if our competitors more effectively use AI to better serve customers, drive internal efficiencies, and create new or enhanced products or services. Additionally, we are making investments to expand our AI capabilities in our business, including ongoing deployment and improvement of existing machine learning and AI technologies, as well as developing new features using AI technologies.", "qwen": ""}, {"nummer": "9675", "name": "Southwest Airlines Co.", "gics": "Industrials", "year": "2025", "trigger": "AI", "content": "The Company is expanding its use of AI and machine-learning to carry out elements of its business strategy. The implementation of AI technologies also presents significant operational, legal, and competitive risks to the Company. Although the Company believes it diligently evaluates, governs, tests, and deploys AI-related technologies, the Company could face numerous AI-related challenges, such as cybersecurity vulnerabilities, algorithmic biases or errors, evolving regulatory requirements across jurisdictions, and potential competitive disadvantage if the Company’s competitors deploy AI technologies more quickly or more successfully.", "qwen": ""}, {"nummer": "9764", "name": "Microchip Technology Incorporated", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "Compliance with existing and proposed government regulation of AI, including in jurisdictions such as the EU, may also increase the cost of related research and development, and create additional reporting and/or transparency requirements. New and updated AI regulations could impose onerous obligations that may disadvantage us and require us to change our business practices, which may negatively impact our financial results. Our failure to comply with federal, state, or international laws and regulations regarding privacy, data protection and handling, and cybersecurity may materially adversely affect our business, results of operations and financial condition.", "qwen": ""}, {"nummer": "9772", "name": "McKesson Corporation", "gics": "Health Care", "year": "2025", "trigger": "AI", "content": "Additionally, we invest in data and analytics to support our growth priorities, including artificial intelligence (“AI”). We are in the early stages of exploring potential AI capabilities and related data and analytics across our enterprise to improve productivity and efficiency, as well as enhance our products and services to better support patients, employees, and customers. We have undertaken additional strategic initiatives in recent years designed to increase operational efficiencies, focus on our core healthcare businesses, execute our business strategy, and enhance our competitive position.", "qwen": ""}, {"nummer": "9864", "name": "Moderna, Inc.", "gics": "Health Care", "year": "2025", "trigger": "ChatGPT", "content": "These GPTs are now embedded across our business functions, including legal, research, manufacturing and commercial, helping to drive productivity. For example, our Dose ID GPT uses ChatGPT Enterprise’s Advanced Data Analytics feature to further evaluate the optimal vaccine dose selected by the clinical study team. By applying standard dose selection criteria and principles, Dose ID provides a rationale, references its sources, and generates informative charts illustrating the key findings.", "qwen": ""}, {"nummer": "9892", "name": "MSCI Inc.", "gics": "Financials", "year": "2025", "trigger": "AI", "content": "We have developed AI-enabled solutions including AI Portfolio Insights, which features a generative AI-powered interface to help deliver risk and portfolio insights, and GeoSpatial Asset Intelligence, which incorporates AI-driven data processing to help clients analyze location-specific exposures. We designed our AI governance framework, which includes review and approval processes for AI uses, to provide oversight designed to support responsible use, data protection and risk management. • Modernizing how we build and operate software.", "qwen": ""}, {"nummer": "9981", "name": "Microsoft Corporation", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "Open source software can also contain vulnerabilities that may make our products susceptible to cyberattacks as we increasingly incorporate open source software into our products. Additionally, features that rely on generative AI can be susceptible to security threats. Our customers operate complex systems with third-party hardware and software from multiple vendors that may include systems acquired over many years.", "qwen": ""}, {"nummer": "10134", "name": "ServiceNow, Inc.", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "Now Assist and AI agents for ITOM simplify complex technical language into easy-to-understand descriptions and provide quick resolution recommendations to IT operations issues. When integrated with our other products such as IT Service Management, ITOM AI agents can help support an organization’s goals to achieve autonomous IT management to help reduce the risk of outages, improve productivity and enhance service reliability. IT Service Management IT Service Management, or ITSM, provides predictive intelligence, incident management and response, routine task and request automation, performance analytics and process optimization.", "qwen": ""}, {"nummer": "10281", "name": "NVIDIA Corporation", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "Our Businesses We report our business results in two segments. The Compute & Networking segment includes our Data Center accelerated computing platforms and AI solutions and software; networking; automotive platforms and autonomous and electric vehicle solutions; Jetson for robotics and other embedded platforms; and DGX Cloud computing services. The Graphics segment includes GeForce GPUs for gaming and PCs, the GeForce NOW game streaming service and related infrastructure, and solutions for gaming platforms; Quadro/NVIDIA RTX GPUs for enterprise workstation graphics; virtual GPU, or vGPU, software for cloud-based visual and virtual computing; automotive platforms for infotainment systems; and Omniverse Enterprise software for building and operating industrial AI and digital twin applications.", "qwen": ""}, {"nummer": "10300", "name": "NVIDIA Corporation", "gics": "Information Technology", "year": "2025", "trigger": "automated driving", "content": "Industrial enterprises are adopting Omniverse’s 3D and simulation technologies to digitalize their complex physical assets, processes, and environments – building digital twins of factories, real time 3D product configurators, testing and validating autonomous robots and vehicles, powered by NVIDIA accelerated computing infrastructure on-premises and in the cloud. 6 Table of Contents Automotive Automotive is comprised of platform solutions for automated driving from the cloud to the car. Leveraging our technology leadership in AI and building on our long-standing automotive relationships, we are delivering a complete end-to-end solution for the AV market under the DRIVE Hyperion brand.", "qwen": ""}, {"nummer": "10404", "name": "ON Semiconductor Corporation", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "Products and Technology The following provides certain information regarding the products and technologies for each of our operating segments. PSG PSG provides a broad portfolio of discrete, module, and integrated semiconductor devices designed to enable high‑efficiency and high‑power conversion across AI data centers, energy infrastructure, automotive and industrial. Our offerings include power switching devices, signal conditioning products, and circuit‑protection technologies that support increasing demands for performance, power density and system reliability.", "qwen": ""}, {"nummer": "10416", "name": "ON Semiconductor Corporation", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "We may not be able to develop and offer the technology solutions that our AI-focused customers demand in a timely manner or effectively, which could have a materially adverse effect on our business. Our failure to commercialize new technologies that can power AI data centers in a timely manner or at all could result in a loss of market share, unanticipated costs and inventory obsolescence, which could adversely affect our financial results. In addition, if AI-related technologies fail to achieve the effectiveness or adoption levels currently anticipated, including due to insufficient available power or other utilities, or if our customers delay or scale back their AI deployments, demand for our AI-related products and solutions and returns on associated investments could be materially lower than we currently expect.", "qwen": ""}, {"nummer": "10477", "name": "Palo Alto Networks, Inc.", "gics": "Information Technology", "year": "2025", "trigger": "ML-powered", "content": "• Next-Generation Firewalls . Our hardware ML-Powered Next-Generation Firewalls (“NGFWs”) secure on-premises environments including campus locations and data centers. Our software NGFWs secure cloud networks.", "qwen": ""}, {"nummer": "10486", "name": "Palo Alto Networks, Inc.", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "Products and Services NETWORK SECURITY Secure Access Service Edge • Prisma Access. Prisma Access is a cloud-delivered security offering that helps organizations deliver consistent AI-driven security to remote networks and mobile users. With more than 100 locations around the world, Prisma Access offers global coverage, consistently inspecting all traffic across all ports and providing bidirectional networking to enable branch-to-branch and branch-to-headquarter traffic.", "qwen": ""}, {"nummer": "10533", "name": "Palo Alto Networks, Inc.", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "- 43 - Table of Contents Our subscription and support revenue grew to $7.4 billion or 80.5% of total revenue for fiscal 2025, representing year-over-year growth of 15.5%. Our subscriptions provide our end-customers with near real-time access to the latest intrusion prevention, web security, modern malware prevention, data loss prevention, CASB and AI security capabilities across the network, endpoints, and the cloud. Our subscriptions also include security operations, which enable customers to leverage the AI-powered Cortex platform for advanced capabilities such as security information and event management, next-generation antivirus, endpoint detection and response, extended detection and response, identity threat detection and response, cloud detection and response, SOAR, ASM, and CNAPP for comprehensive cloud security.", "qwen": ""}, {"nummer": "10618", "name": "Palantir Technologies Inc.", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "In addition, Colorado has passed a Consumer Protections for Artificial Intelligence bill introducing state-level oversight of “high-risk” AI systems, which mirrors language and several provisions appearing in the EU AIA. Many states, notably California, Utah, and Texas have signed private-sector AI governance legislation focused on various aspects of AI oversight. Further, certain administrations have encouraged companies to sign on to voluntary commitments to manage the risks posed by AI alongside related legislative or regulatory efforts, some of which we have signed.", "qwen": ""}, {"nummer": "10648", "name": "Pinnacle West Capital Corporation", "gics": "Utilities", "year": "2025", "trigger": "artificial intelligence", "content": "APS’s strategy, including the timing of such strategy, in adopting new technologies, such as artificial intelligence, could also adversely impact APS’s business. For example, if APS fails to strategically implement artificial intelligence, it could miss the opportunity for cost savings, face increasing costs on legacy systems, insufficiently integrate internal and external data sets, or invest in low data quality, risk misusing artificial intelligence, impact employee satisfaction with its implementation of or failure to implement artificial intelligence and other technologies. Widespread installation and acceptance of new technologies could also enable the entry of new market participants, such as technology companies, into the interface between APS and its customers and could have other unpredictable effects on APS’s traditional business model.", "qwen": ""}, {"nummer": "10739", "name": "Qnity Electronics, Inc.", "gics": "Information Technology", "year": "2025", "trigger": "artificial intelligence", "content": "Key brands include IC1000™, Ikonic™, Visionpad™, Optivision™, Politex™, Suba™ and Emblem™ Lithographic Materials Lithographic materials, such as photoresists and anti-reflective coating materials, help create precise patterns for modern semiconductor devices. These materials provide high resolution and reliability, supporting innovations in computing, artificial intelligence and next-generation automotive technology. We offer materials for all lithography wavelengths, including ultraviolet, deep ultraviolet and EUV lithography.", "qwen": ""}, {"nummer": "10835", "name": "Roper Technologies, Inc.", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "Increasingly, this includes AI-enabled products and functionality embedded within customers’ mission-critical workflows. By leveraging our deep domain expertise, proprietary data, and long-standing customer relationships, we believe these AI capabilities enhance product differentiation, and drive incremental automation and improved customer outcomes which support expanded monetization opportunities. Diversified End Markets and Geographic Reach – We have a global presence, with sales to customers outside of the U.S. totaling $1,029.7 in 2025.", "qwen": ""}, {"nummer": "10981", "name": "Molson Coors Beverage Company", "gics": "Consumer Staples", "year": "2025", "trigger": "artificial intelligence", "content": "Our vendors and third-party partners may also incorporate artificial intelligence tools into their offerings with or without disclosing this use to us in a timely or complete manner. The providers of these artificial intelligence tools may not meet existing or evolving regulatory or industry standards concerning privacy and data protection, which may result in a loss of intellectual property or confidential information and/or cause harm to our reputation and the public perception of the effectiveness of our security measures or other internal controls. Further, bad actors around the world use increasingly sophisticated methods, including the use of artificial intelligence, to engage in cyberattacks or illegal activities involving the theft and misuse of personal information, confidential information and intellectual property.", "qwen": ""}, {"nummer": "11088", "name": "Tesla, Inc.", "gics": "Consumer Discretionary", "year": "2025", "trigger": "AI", "content": "In June 2025, we launched our Robotaxi service, an autonomous ride-hailing platform that harnesses our technology and vehicles. We expect this service will open access to an expanded customer base as modes of transportation evolve, and, along with products such as FSD (Supervised) subscriptions, unlock the potential to advance a service-driven business model based on AI, software and fleet-based profits. Our Robotaxi business currently operates with Model Y vehicles but, in time, will include Cybercab, our purpose-built autonomous vehicle.", "qwen": ""}, {"nummer": "11146", "name": "Take-Two Interactive Software, Inc.", "gics": "Communication Services", "year": "2025", "trigger": "artificial intelligence", "content": "These risks are not presented in order of importance or probability of occurrence. Summary of Risk Factors Material risks that may affect our business, operating results and financial condition include, but are not necessarily limited to: Risks relating to our business and industry • Our industry is highly competitive • Uncertainty of achieving market acceptance, delays or disrupt
