ur securities. The market price of our debt and equity securities may fluctuate significantly in response to many factors, many of which are out of our control, including: • actual or anticipated variations in our operating results; • changes in our funds from operations or earnings estimates; • publication of research reports about us or the real estate industry in general and recommendations by financial analysts or actions taken by rating agencies with respect to our securities or those of other REITs; • increases in market interest rates that drive investors in, or potential purchasers of, our stock to seek other investments or demand a higher dividend yield; • changes in market valuations of similar companies; • adverse market reaction to any additional debt we incur in the future; • any future issuances of equity securities; • additions or departures of key management personnel; • strategic actions by us or our competitors, such as acquisitions or restructurings; • actions by institutional stockholders; • reports by corporate governance rating companies; • increased investor focus on sustainability-related risks, including climate change; • changes in our dividend payments; • potential tax law changes relating to REITs; • speculation in the press or investment community; and • general market and economic conditions.", "qwen": "neutral"}, {"nummer": "3583", "name": "S&P Global Inc.", "gics": "Financials", "year": "2023", "trigger": "AI", "content": "The use of our products as part of such activities, including the investment process, from time to time exposes us to claims for significant dollar amounts by our clients or the parties whose assets are managed by our clients. Such claims have not materially adversely affected us to date, but there can be no assurance that future claims will not materially adversely affect our business, financial condition or results of operations. • The products we develop or license, and the proprietary methodologies, models and processes on which these products rely, from time to time contain undetected errors or defects, despite testing and/or other quality assurance practices. Moreover, many of our products use new and evolving technologies, such as AI, that may contain their own undetected errors or defects. For example, the AI used in our products could include undetected errors or defects that lead to harmful consequences such as accuracy issues, unintended biases or discriminatory outputs. Errors or defects may exist during any part of a product’s life cycle and may persist notwithstanding testing and/or other quality assurance practices. Ineffective or insufficient collaboration within the Company increases the risk that such errors or defects may not be detected.", "qwen": "neutral"}, {"nummer": "3594", "name": "Seagate Technology Holdings plc", "gics": "Information Technology", "year": "2023", "trigger": "autonomous vehicles", "content": "Industry Overview Data Storage Industry The data storage industry includes companies that manufacture components or subcomponents designed for data storage devices, as well as providers of storage solutions, software and services for enterprise cloud, big data, computing platforms and consumer markets. The rapid growth of data generation and the intelligent application of data are driving demand for data storage. As more data is created at endpoints outside traditional data centers, which requires processing at the edge and in the core or cloud, the need for data storage and management between the edge and cloud has also increased. Use cases include connected and autonomous vehicles, smart manufacturing and smart cities. We believe the proliferation and personal creation of media-rich digital content, further enabled by fifth-generation wireless (“5G”) technology, the edge, the Internet of Things (“IoT”), machine learning (“ML”) and artificial intelligence (“AI”), will continue to create demand for higher capacity storage solutions. The resulting mass data ecosystem is expected to require increasing amounts of data storage at the edge, in the core and in between. Markets The principal data storage markets include: Mass Capacity Storage Markets Mass capacity storage supports high capacity, low-cost per terabyte (“TB”) storage applications, including nearline, video and image applications (“VIA”) and network-attached storage (“ NAS”) and edge-to-cloud data storage infrastructures.", "qwen": "neutral"}, {"nummer": "3599", "name": "Seagate Technology Holdings plc", "gics": "Information Technology", "year": "2023", "trigger": "machine learning", "content": "The E-block and the 7 Table of Contents recording media are mounted inside the head disk assembly. We purchase spindle motors from outside vendors and from time to time participate in the design of the motors that go into our products. Disk Drive Assembly. Following the completion of the head disk assembly, it is mated to the PCBA, and the completed unit goes through extensive defect mapping and machine learning prior to packaging and shipment. Disk drive assembly and machine learning operations occur primarily at our facilities located in China and Thailand. We perform subassembly and component manufacturing operations at our facilities in China, Malaysia, Northern Ireland, Singapore, Thailand and the United States. Contract Manufacturing.", "qwen": "neutral"}, {"nummer": "3612", "name": "Teledyne Technologies Incorporated", "gics": "Information Technology", "year": "2023", "trigger": "artificial intelligence", "content": "Security breaches also could result in a violation of applicable U.S. and international privacy and other laws, including GDPR, Health Insurance Portability and Accountability Act, Payment Card Industry Data Security Standard, and California Consumer Privacy Act, or SEC regulations, and subject us to private consumer or securities litigation and governmental investigations and proceedings, any of which could result in our exposure to material civil or criminal liability. The systemic cybersecurity risk environment is elevated, in part by geopolitical conflicts and tensions, including the war between Ukraine and Russia, the war in Israel and neighboring regions, and increased supply chain-related cyber-risks. New technologies, including generative AI, quantum computing, new uses of QR codes and other innovations in digital communications, introduce new attack vectors, and new potential compromise scenarios, which malicious adversaries can exploit. Issues in the development and use of artificial intelligence may result in reputational harm or liability, and failure to introduce new and innovative products that have artificial intelligence capabilities could put us at a competitive disadvantage. 18 Table of Contents We currently incorporate machine learning and artificial intelligence capabilities (“AI”) into certain of our products and solutions and may seek to expand the use of AI in our offerings in the future. As with many innovations, AI presents risks, challenges, and unintended consequences that could affect our business. AI algorithms and training methodologies may be flawed.", "qwen": "operative"}, {"nummer": "3658", "name": "Tesla, Inc.", "gics": "Consumer Discretionary", "year": "2023", "trigger": "self-driving vehicles", "content": "This process may include official review and certification of our vehicles by foreign regulatory agencies prior to market entry, as well as compliance with foreign reporting and recall management systems requirements. In particular, we offer in our vehicles in certain markets Autopilot and FSD Capability features that today assist drivers with certain tedious and potentially dangerous aspects of road travel, but which currently require drivers to remain fully engaged in the driving operation. We are continuing to develop our Autopilot and FSD Capability technology. There are a variety of international, federal and state regulations that may apply to, and may adversely affect, the design and performance, sale, marketing, registration and operation of Autopilot and FSD Capability, and future capability, including full self-driving vehicles that may not be operated by a human driver. This includes many existing vehicle standards that were not originally intended to apply to vehicles that may not be operated by a human driver. Such regulations continue to rapidly change, which increases the likelihood of a patchwork of complex or conflicting regulations, or may delay, restrict or prohibit the availability of certain functionalities and vehicle designs, which could adversely affect our business. Finally, as a manufacturer, installer and service provider with respect to solar generation and energy storage systems, a supplier of electricity generated and stored by certain of the solar energy and energy storage systems we install for customers, and a provider of grid services through virtual power plant models, we are impacted by federal, state and local regulations and policies concerning the import or export of components, electricity pricing, the interconnection of electricity generation and storage equipment with the electrical grid and the sale of electricity generated by third party-owned systems.", "qwen": "operative"}, {"nummer": "3734", "name": "W. R. Berkley Corporation", "gics": "Financials", "year": "2023", "trigger": "artificial intelligence", "content": "In 2024, the NAIC plans to form a new task force to create a regulatory framework for the oversight of insurers’ use of third-party data and models. The NAIC and state insurance regulators are also focused on addressing unfair discrimination by insurers in the use of consumer data and technology, and certain states have passed laws or are considering action targeting unfair discrimination practices. For example, in 2021 Colorado enacted a law that prohibits insurers from using external consumer data and information sources (“ECDIS”), as well as algorithms or predictive models that use ECDIS, in a way that unfairly discriminates based on race, color, national or ethnic origin, religion, sex, sexual orientation, disability, gender identity or gender expression. In August 2023, Colorado adopted regulations requiring life insurers to adopt a governance and risk management framework for the use of artificial intelligence, machine learning and other technologies that utilize “external consumer data.” It is expected that Colorado will also adopt governance and testing regulations for other lines of insurance, in accordance with the requirements of its 2021 law. We cannot predict whether states will adopt the AI Bulletin, or what, if any, changes to laws or regulations may be enacted with regard to “big data” or artificial intelligence technologies. Risk-Based Capital Requirements . The NAIC utilizes a Risk-Based Capital (“RBC”) formula that is designed to measure the adequacy of an insurer's statutory surplus in relation to the risks inherent in its business.", "qwen": "neutral"}, {"nummer": "3753", "name": "Zimmer Biomet Holdings, Inc.", "gics": "Health Care", "year": "2023", "trigger": "artificial intelligence", "content": "We do not expect that the ongoing costs of compliance with these environmental requirements will have a material impact on our consolidated earnings, capital expenditures or competitive position. Data Privacy Laws We are subject to evolving supranational, national, state and international data privacy and security laws and regulations that govern the collection, use, disclosure, transfer, location, storage, disposal and protection of health-related and other personal information, including laws and regulations that regulate and restrict cross-border data transfers. Certain of these laws and regulations impose time-sensitive notification requirements to governmental authorities or consumers. We are also subject to emerging guidance governing data security and cyber risk management for medical devices as well as emerging guidance relating to artificial intelligence. Failure to comply with any such data protection laws, regulations and guidance could result in government enforcement actions (which could include civil and/or criminal penalties), private litigation and/or adverse publicity and could negatively affect our operating results and business. Information regarding the risks associated with data privacy and protection laws may be found in Item 1A. Risk Factors – If we fail to comply with data privacy and security laws and regulations, we could face substantial penalties and our business, operations and financial condition could be adversely affected.", "qwen": "neutral"}, {"nummer": "3812", "name": "Analog Devices, Inc.", "gics": "Information Technology", "year": "2024", "trigger": "AI", "content": "The development and deployment of AI involves significant competitive, legal, regulatory and other risks. The implementation of AI is costly, requires a significant amount of data and there can be no assurance that AI will enhance our products or services or be beneficial to our business, including our efficiency or profitability. In addition, we face significant competition from other companies that are incorporating AI into their products and technologies. These other companies may incorporate AI in products or technologies that are similar to, or that customers perceive as superior to, our technologies or are more cost-effective to develop and deploy. AI technology is complex and rapidly evolving, and if we are unable to innovate quickly enough to keep pace with these rapid technological developments, our business could be harmed. AI technology may also give rise to significant legal and regulatory liability. Governments around the world have adopted, and may continue to adopt, laws and regulations related to AI, including the European Union’s AI Act, and several U.S. government agencies have increased investigations and enforcement efforts related to the use of AI technology, which could increase our compliance costs and limit our ability to use AI in the development of our products and services.", "qwen": "neutral"}, {"nummer": "3815", "name": "Analog Devices, Inc.", "gics": "Information Technology", "year": "2024", "trigger": "AI", "content": "These other companies may incorporate AI in products or technologies that are similar to, or that customers perceive as superior to, our technologies or are more cost-effective to develop and deploy. AI technology is complex and rapidly evolving, and if we are unable to innovate quickly enough to keep pace with these rapid technological developments, our business could be harmed. AI technology may also give rise to significant legal and regulatory liability. Governments around the world have adopted, and may continue to adopt, laws and regulations related to AI, including the European Union’s AI Act, and several U.S. government agencies have increased investigations and enforcement efforts related to the use of AI technology, which could increase our compliance costs and limit our ability to use AI in the development of our products and services. While the incoming administration has signaled that AI policy will be a priority, the scope and impact of any such policies cannot yet be determined. In addition, the use of AI in the development of our products and services, or by our customers in end products that incorporate our products, could cause loss of intellectual property, or subject us to risks related to intellectual property infringement or misappropriation, data privacy or cybersecurity. AI algorithms or training methodologies may also be flawed, and datasets may contain irrelevant, insufficient or biased information.", "qwen": "neutral"}, {"nummer": "4011", "name": "Amazon.com, Inc.", "gics": "Consumer Discretionary", "year": "2024", "trigger": "machine learning", "content": "Our technology and infrastructure investment and capital spending projects often support a variety of product and service offerings due to geographic expansion and the cross-functionality of our systems and operations. We seek to invest efficiently in several areas of technology and infrastructure, including AWS, and expansion of new and existing product categories and service offerings, as well as in infrastructure to enhance the customer experience and improve our process efficiencies. We believe that advances in technology, specifically the speed and reduced cost of processing power, data storage and analytics, improved wireless connectivity, and the practical applications of artificial intelligence and machine learning, will continue to improve users’ experience on the internet and increase its ubiquity in people’s lives. To best take advantage of these continued advances in technology, we are investing in AWS, which offers a broad set of on-demand technology services, including compute, storage, database, analytics, and machine learning, and other services to developers and enterprises of all sizes. We are also investing in initiatives to build and deploy innovative and efficient software and electronic devices as well as other initiatives including the development of a satellite network for global broadband service and autonomous vehicles for ride-hailing services. We seek to efficiently manage shareholder dilution while maintaining the flexibility to issue shares for strategic purposes, such as financings, acquisitions, and aligning employee compensation with shareholders’ interests. We utilize restricted stock units as our primary vehicle for equity compensation because we believe this compensation model aligns the long-term interests of our shareholders and employees.", "qwen": "prospective"}, {"nummer": "4013", "name": "Amazon.com, Inc.", "gics": "Consumer Discretionary", "year": "2024", "trigger": "artificial intelligence", "content": "In addition, economic conditions and actions by policymaking bodies are contributing to changing interest rates and significant capital market volatility, which, along with any increases in our borrowing levels, could increase our future borrowing costs. 23 Table of Contents Results of Operations We have organized our operations into three segments: North America, International, and AWS. These segments reflect the way the Company evaluates its business performance and manages its operations. See Item 8 of Part II, “Financial Statements and Supplementary Data — Note 10 — Segment Information.” Overview Macroeconomic factors, including changes in inflation and interest rates, global economic and geopolitical developments, and the development and adoption of technologies and services, including artificial intelligence, have direct and indirect impacts on our results of operations that are difficult to isolate and quantify. These could affect customer demand for our products and services, our ability to predict growth needs, expenses, and the benefits we gain from new technologies. We expect some or all of them to continue to impact our operations into Q1 2025. Net Sales Net sales include product and service sales.", "qwen": "neutral"}, {"nummer": "4041", "name": "Arista Networks, Inc.", "gics": "Information Technology", "year": "2024", "trigger": "AI", "content": "6 Table of Contents The Arista Etherlink AI portfolio of 800G switches, coupled with Arista's EOS innovations such as AI Analyzer along with optimal load balancing solutions, offer compelling solutions for contemporary AI applications and deployment. Arista also continues to be innovative in such areas as deep packet buffer architectures, virtual output queuing, non-disruptive upgrades, embedded optics and next-generation optics, reversible cooling and overall system power efficiency. The Arista 7800R AI Spine, 7060 AI Leaf and the Distributed Etherlink Switch (\"DES\") are designed to address the demanding scale and performance requirements driven by large-scale AI networks. Arista also provides solutions for compute, GPU and storage interconnects in driving AI/ML workloads, leveraging its IP/Ethernet switches to deliver unparalleled performance and scalability. The Arista 7700R4 DES is an ultra-scalable, intelligent distributed system engineered to meet the rigorous demands of large-scale AI and machine learning (\"ML\") environments. Building upon the foundations of the 7800R4 series, the 7700R4 DES delivers strong performance and scalability for accelerated computing. The Arista 7700R4 represents a significant advancement in networking technology, offering a robust and scalable solution tailored for the most demanding AI and ML workloads.", "qwen": "operative"}, {"nummer": "4120", "name": "Alexandria Real Estate Equities, Inc.", "gics": "Real Estate", "year": "2024", "trigger": "AI", "content": "It is widely thought that the life science and healthcare industries, like most industries, are in only the early stages of an advanced technology revolution that may have profound, and largely currently unknown, impacts on their businesses, including the processes and strategies underlying R&D and commercialization of new products. We have always strived to provide our tenants with state-of-the-art laboratory facilities incorporating cutting-edge infrastructure features (including energy delivery, environmental, sustainability, security, and waste disposal features) to enable our tenants to perform at the highest levels. It is currently unknown how the ongoing adoption of advanced technologies and automation in the life science industry will impact the optimal space configurations and infrastructure features of the “laboratory of the future,” and we may face new tenant requirements and requests that will require significant expenditures that may not be entirely recoverable through increased rents. For example, the adoption of AI by our tenants may lead to infrastructure requirements that our buildings currently do not accommodate, such as increased power needs due to high-performance computing. Infrastructure upgrades may necessitate substantial capital expenditures and could potentially impact the environmental footprint of our building operations. 45 If technological developments result in a reduction or reconfiguration in space requirements by our tenants, demand by individual tenants and prospective tenants for space may decrease over time. If we are not able to offset any reduction in demand from the foregoing developments through repurposing space, property dispositions, or other means, the realization of any of the aforementioned risks could have a material adverse impact on our revenues, net operating income, results of operations, funds from operations, operating margins, occupancy, earnings per share, FFO per share, our overall business, and the market value of our common stock.", "qwen": "neutral"}, {"nummer": "4305", "name": "Cadence Design Systems, Inc.", "gics": "Information Technology", "year": "2024", "trigger": "AI", "content": "The Protium platform leverages a common front end with the Palladium environment to move designs rapidly from emulation to the prototyping stage, enabling software development to begin weeks to months earlier than otherwise possible. Verisium™ is our generative AI solution for multi-run verification that enables additional productivity, automation, and quality of results throughout the entire verification flow. Semiconductor IP Our semiconductor IP product category includes strategic and mission-critical design architectures that our customers use to integrate into their highly differentiated design blocks, SoC subsystems, and chiplets. These are typically designed into silicon chips that are found in high volume in multiple markets such as automotive, hyperscale, mobile computing, and many consumer products including mobile phones, and AI chips. Our IP offerings include controllers and physical interfaces, which are commonly used in computing, networking, and embedded systems. We have a broad portfolio of PCI Express, Universal Accelerator Link, Compute Express Link, multiple memory interfaces including High Bandwidth Memory and Graphics Double Data Rate, and many other standards. In addition, our portfolio includes a wide variety of digital signal processor IPs.", "qwen": "neutral"}, {"nummer": "4334", "name": "Cadence Design Systems, Inc.", "gics": "Information Technology", "year": "2024", "trigger": "AI", "content": "Further, the cost to comply with such laws, regulations, decisions and/or guidance interpreting existing laws, could be significant and would increase our operating expenses (such as by imposing additional reporting obligations regarding our use of AI Technologies). Such an increase in operating expenses, as well as any actual or perceived failure to comply with such laws and regulations, could adversely affect our business, financial condition and results of operations. Further, the IP ownership and license rights, including copyright, surrounding AI Technologies have not been fully addressed by U.S. courts or other federal or state laws or regulations, and the use or adoption of AI Technologies into our products and services may result in exposure to claims of copyright infringement or other IP misappropriation. The implementation of AI Technologies may accelerate or exacerbate potential risks related to technological developments. These risks include the possibility of AI Technologies malfunctioning, producing biased or inaccurate results or failing to meet performance expectations. The development and deployment of AI Technologies carries the risk of other unintended consequences, such as ethical concerns, privacy violations and negative public perception. The rapid evolution of AI Technologies requires the application of resources to help ensure that AI is implemented responsibly in order to minimize unintended, harmful impact.", "qwen": "neutral"}, {"nummer": "4340", "name": "Cadence Design Systems, Inc.", "gics": "Information Technology", "year": "2024", "trigger": "AI", "content": "We own and manage certain IT Systems but also rely on third parties for IT Systems and related products and services, including cloud computing. In addition, we and certain third-party providers collect, maintain and process data about our customers, employees, business partners and others, including personally identifiable information, as well as proprietary data such as trade secrets (collectively, \"Confidential Information\"). We face numerous, evolving cybersecurity risks that threaten the confidentiality, integrity and availability of our IT Systems, Confidential Information, products and services, including from diverse threat actors, such as state-sponsored organizations, opportunistic hackers and malicious insiders, as well as through diverse attack vectors, such as social engineering (including phishing), malware (including ransomware) and denial-of-service attacks, and due to human or technological error, such as misconfigurations, “bugs” or other vulnerabilities in software or hardware. Additionally, advances in technology, an increased level of sophistication and expertise of hackers, widespread access to generative AI, and new discoveries in the field of cryptography can result in a compromise or breach of our IT Systems or security measures implemented to protect our systems. We have experienced cyberattacks and other security incidents in the past and will continue to experience varying degrees of attacks and incidents in the future. Any such incidents could compromise our IT Systems, which could cause system disruptions or slowdowns and lead to the information stored on our networks being accessed, publicly disclosed, lost or stolen. Any actual or perceived unauthorized access or disclosure to our Confidential Information poses significant risk to our business as it could result in reputational and financial harm and further subject us to liability to our customers, suppliers, business partners and others.", "qwen": "neutral"}, {"nummer": "4375", "name": "Ciena Corporation", "gics": "Information Technology", "year": "2024", "trigger": "AI", "content": "Customers and Markets We sell our product and service solutions through direct and indirect sales channels to network operators in the following customer and market segments: • Communications Service Providers. Our communications service provider customers include regional, metro, national and international wireline and wireless carriers, and access network providers. • Cloud Providers. Our cloud provider customers – also referred to in our markets as web-scale or hyper-scale providers – include internet content providers and providers of internet services and infrastructure, including data centers, cloud compute, SaaS, storage, AI, and web hosting services. In addition to their direct purchases, these customers are also significant purchasers of capacity on submarine and wireline networks globally, and they heavily influence networking solution alternatives by other network operators, including communications service providers. • Cable and Multiservice Operators (MSO). Our customers include regional, metro, national, and international cable and multiservice operators.", "qwen": "neutral"}, {"nummer": "4387", "name": "Ciena Corporation", "gics": "Information Technology", "year": "2024", "trigger": "AI", "content": "AI technologies are complex and rapidly evolving, and the technologies that we develop or use may ultimately be flawed. Moreover, AI technology is subject to rapidly evolving domestic and international laws and regulations, which could impose significant costs and obligations on the Company. For example, in 2023 the U.S. government issued an executive order on safe, secure and trustworthy AI, and the EU’s Artificial Intelligence Act, which establishes EU-wide rules on data quality, transparency, human oversight and accountability with respect to the use of AI, was enacted in August 2024. Emerging regulations may also pertain to data privacy, data protection, and the ethical use of AI, as well as clarifying intellectual property considerations. Our use of AI could give rise to legal or regulatory action or increased scrutiny or liability, and maydamage our reputation or otherwise materially harm our business. Risks Relating to the Macroeconomic Environment and our Global Presence Our business and operating results could be adversely affected by unfavorable changes in macroeconomic and market conditions and any reduction in the level of customer spending in response. Our business and operating results depend significantly on general market and economic conditions.", "qwen": "neutral"}, {"nummer": "4423", "name": "Centene Corporation", "gics": "Health Care", "year": "2024", "trigger": "artificial intelligence", "content": "These statements are not guarantees of future performance and are subject to risks, uncertainties and assumptions. All forward-looking statements included in this filing are based on information available to us on the date of this filing. Except as may be otherwise required by law, we undertake no obligation to update or revise the forward-looking statements included in this filing, whether as a result of new information, future events, or otherwise, after the date of this filing. You should not place undue reliance on any forward-looking statements, as actual results may differ materially from projections, estimates, or other forward-looking statements due to a variety of important factors, variables and events including, but not limited to: • our ability to design and price products that are competitive and/or actuarially sound including but not limited to any impacts resulting from Medicaid redeterminations; • our ability to maintain or achieve improvement in the Centers for Medicare and Medicaid Services (CMS) Star ratings and maintain or achieve improvement in other quality scores in each case that could impact revenue and future growth; • our ability to accurately predict and effectively manage health benefits and other operating expenses and reserves, including fluctuations in medical utilization rates; • competition, including for providers, broker distribution networks, contract reprocurements and organic growth; • our ability to adequately anticipate demand and timely provide for operational resources to maintain service level requirements in compliance with the terms of our contracts and state and federal regulations; • our ability to manage our information systems effectively; • disruption, unexpected costs, or similar risks from business transactions, including acquisitions, divestitures, and changes in our relationships with third-party vendors; • impairments to real estate, investments, goodwill, and intangible assets; • changes in senior management, loss of one or more key personnel or an inability to attract, hire, integrate and retain skilled personnel; • membership and revenue declines or unexpected trends; • rate cuts, insufficient rate changes or other payment reductions or delays by governmental payors and other risks and uncertainties affecting our government businesses; • changes in healthcare practices, new technologies, and advances in medicine; • our ability to effectively and ethically use artificial intelligence and machine learning in compliance with applicable laws; • increased healthcare costs; • inflation and interest rates; • the effect of social, economic, and political conditions and geopolitical events, including as a result of changes in U.S. presidential administrations or Congress; • changes in market conditions; Table of Contents • changes in federal or state laws or regulations, including changes with respect to income tax reform or government healthcare programs as well as changes with respect to the Patient Protection and Affordable Care Act and the Health Care and Education Affordability Reconciliation Act (collectively referred to as the ACA) and any regulations enacted thereunder, including the timing and terms of renewal or modification of the enhanced advance premium tax credits or program integrity initiatives that could have the effect of reducing membership or profitability of our products; • uncertainty concerning government shutdowns, debt ceilings or funding; • tax matters; • disasters, climate-related incidents, acts of war or aggression or major epidemics; • changes in expected contract start dates and terms; • changes in provider, broker, vendor, state, federal and other contracts and delays in the timing of regulatory approval of contracts, including due to protests and our ability to timely comply with any such changes to our contractual requirements or manage any unexpected delays in regulatory approval of contracts; • the expiration, suspension, or termination of our contracts with federal or state governments (including, but not limited to, Medicaid, Medicare or other customers); • the difficulty of predicting the timing or outcome of legal or regulatory audits, investigations, proceedings or matters, including, but not limited to, our ability to resolve claims and/or allegations made by states with regard to past practices on acceptable terms, or at all, or whether additional claims, reviews or investigations will be brought by states, the federal government or shareholder litigants, or government investigations; • challenges to our contract awards; • cyber-attacks or other data security incidents or our failure to comply with applicable privacy, data or security laws and regulations; • the exertion of management's time and our resources, and other expenses incurred and business changes required in connection with complying with the terms of our contracts and the undertakings in connection with any regulatory, governmental, or third party consents or approvals for acquisitions or dispositions; • any changes in expected closing dates, estimated purchase price, or accretion for acquisitions or dispositions; • losses in our investment portfolio; • restrictions and limitations in connection with our indebtedness; • a downgrade of our corporate family rating, issuer rating or credit rating of our indebtedness; and • the availability of debt and equity financing on terms that are favorable to us. This list of important factors is not intended to be exhaustive. We discuss certain of these matters more fully, as well as certain other factors that may affect our business operations, financial condition, and results of operations, in our filings with the Securities and Exchange Commission (SEC), including our quarterly reports on Form 10-Q and current reports on Form 8-K. Due to these important factors and risks, we cannot give assurances with respect to our future performance, including without limitation our ability to maintain adequate premium levels or our ability to control our future medical and selling, general and administrative costs. Table of Contents SUMMARY OF RISK FACTORS Our business is subject to numerous risks and uncertainties that you should be aware of in evaluating our business, including risks that may prevent us from achieving our business objectives or may adversely affect our business, financial condition, results of operations, cash flows and prospects.", "qwen": "neutral"}, {"nummer": "4507", "name": "Salesforce, Inc.", "gics": "Information Technology", "year": "2024", "trigger": "AI", "content": "If we enable or offer solutions that draw controversy due to their perceived or actual impact on human rights, privacy, employment, or in other social contexts, we may experience new or enhanced governmental or regulatory scrutiny, brand or reputational harm, competitive harm or legal liability. Data practices by us or others that result in controversy could also impair the acceptance of AI solutions. This in turn could undermine confidence in the decisions, predictions, analysis or other content that our AI applications produce, subjecting us to competitive harm, legal liability and brand or reputational harm. The rapid evolution of AI will require the application of resources to develop, test and maintain our products and services to help ensure that AI is implemented ethically in order to minimize unintended, harmful impact. Uncertainty around new and emerging AI applications such as generative AI content creation will require additional investment in the licensing or development of proprietary datasets, machine learning models and systems to test for accuracy, bias and other variables, which are often complex, may be costly and could impact our profit margin. Moreover, the move from AI content classification to AI content generation through our development of Einstein GPT and other generative AI products brings additional risks and responsibility. Known risks of generative AI currently include risks related to accuracy, bias, toxicity, privacy and security and data provenance.", "qwen": "neutral"}, {"nummer": "4553", "name": "CrowdStrike Holdings, Inc.", "gics": "Information Technology", "year": "2024", "trigger": "artificial intelligence", "content": "Michael Sentonas - President Mr. Sentonas has served as our President since March 2023. Prior to being appointed President, Mr. Sentonas served as our Chief Technology Officer since February 2020, and as our Vice President, Technology Strategy from May 2016 to February 2020. Immediately prior to joining us, Mr. Sentonas served at McAfee Corp. from March 2004 to April 2016 in various positions, and finally as Chief Technology Officer – Security Connected from November 2013 to April 2016. Mr. Sentonas is a board member of the CrowdStrike Foundation, a nonprofit established to support the next generation of talent and research in cybersecurity and artificial intelligence through scholarships, grants, and other activities, and a member of the Forbes Technology Counsel, an organization for senior technology executives. He is an active public speaker on security issues and advises government and business communities on global and local cyber security threats. Mr. Sentonas holds a B.S. in computer science from Edith Cowan University, Western Australia.", "qwen": "neutral"}, {"nummer": "4555", "name": "CrowdStrike Holdings, Inc.", "gics": "Information Technology", "year": "2024", "trigger": "AI", "content": "Further, they may have greater resources for research and development of new technologies, the provision of customer support, and the pursuit of acquisitions. Our larger competitors have substantially broader and more diverse product and services offerings as well as routes to market, which allows them to leverage their relationships based on other products or incorporate functionality into existing products to gain business in a manner that discourages users from purchasing our platform, including our cloud modules. Conditions in our market could change rapidly and significantly as a result of technological advancements, including with respect to AI. Our competitors may more successfully incorporate AI into their products, gain or leverage superior access to certain AI technologies, and achieve higher market acceptance of their AI solutions. Conditions in our market could also change rapidly and significantly due to partnering or acquisitions by our competitors or continuing market consolidation. Some of our competitors have recently made acquisitions of businesses or have established cooperative relationships that may allow them to offer more directly competitive and comprehensive solutions than were previously offered and adapt more quickly to new technologies and customer needs. These competitive pressures in our market or our failure to compete effectively may result in price reductions, fewer orders, reduced revenue and gross margins, increased net losses and loss of market share.", "qwen": "neutral"}, {"nummer": "4558", "name": "CrowdStrike Holdings, Inc.", "gics": "Information Technology", "year": "2024", "trigger": "AI", "content": "Litigation could be costly for us to defend, have a negative effect on our results of operations and financial condition or require us to devote additional research and development resources to change our solutions. Responding to any infringement or noncompliance claim by an open source vendor, regardless of its validity, discovering certain open source software code in our Falcon platform, or a finding that we have breached the terms of an open source software license, could harm our business, results of operations and financial condition, by, among other things: 42 Table of Contents • resulting in time-consuming and costly litigation; • diverting management’s time and attention from developing our business; • requiring us to pay monetary damages or enter into royalty and licensing agreements that we would not normally find acceptable; • causing delays in the deployment of our Falcon platform or service offerings to our customers; • requiring us to stop offering certain services or features of our Falcon platform; • requiring us to redesign certain components of our Falcon platform using alternative non-infringing or non-open source technology, which could require significant effort and expense; • requiring us to disclose our software source code and the detailed program commands for our software; and • requiring us to satisfy indemnification obligations to our customers. We utilize Artificial Intelligence, which could expose us to liability or adversely affect our business. We incorporate novel uses of AI technologies, including generative AI, into our products and operations. AI is complex and rapidly evolving, and we face significant competition from other companies as well as an evolving regulatory landscape. The introduction of AI into new or existing products may result in new or enhanced governmental or regulatory scrutiny, litigation, confidentiality, ethical concerns, or other complications that could adversely affect our business, reputation, or financial results. For example, if we do not have sufficient rights to use the data or other material or content on which our AI technologies rely, we may incur liability through the violation of applicable laws, third-party intellectual property, privacy or other rights, or contracts to which we are a party.", "qwen": "neutral"}, {"nummer": "4742", "name": "Domino's Pizza, Inc.", "gics": "Consumer Discretionary", "year": "2024", "trigger": "AI", "content": "Moreover, technology and consumer offerings continue to develop, and we expect that new or enhanced technologies and consumer offerings will be available in the future. We may pursue certain of those technologies and consumer offerings if we believe they offer a sustainable customer proposition and can be successfully integrated into our business model. However, we cannot predict consumer acceptance of these delivery channels or their impact on our business. We may incorporate traditional and generative AI solutions into our business, and these solutions may become important in our operations over time. The use of these AI solutions may expose us to additional risks and expenses, including, for example, if we were to incorporate AI technologies which we become dependent on or fail to adopt AI in a timely or effective manner. 22 In addition, our competitors, some of whom have greater resources than we do, may be able to benefit more from changes in technologies or consumer acceptance of alternative methods of delivery. There can be no assurance that we will be able to successfully respond to changing consumer preferences, including with respect to new technologies and alternative methods of delivery, or to effectively adjust our product mix, service offerings, and marketing and merchandising initiatives for products and services that address, and anticipate advances in, technology and market trends.", "qwen": "prospective"}, {"nummer": "4804", "name": "Equity Residential", "gics": "Real Estate", "year": "2024", "trigger": "autonomy", "content": "We are subject to risks involved in activity through real estate technology and other real estate fund investments. We have entered into, and may continue in the future to enter into, real estate technology and other real estate fund investments. Noncontrolling interests and passive investments are inherently risky because we have limited ability to influence business decisions. The managers of such investments have autonomy over the day-to-day operations of the business and may make business, financial or management decisions with which we do not agree or take risks or otherwise act in a manner that does not serve our interests. In addition, the market for the technologies or products these companies are developing are typically in the early stages and may not materialize to the expected scale, causing these companies to abandon, modify or alter their product, service or overall strategy. Further, there is no assurance that these companies can obtain additional capital or resources, generate sufficient cash flow to sustain operations and successfully execute their strategy or that their equity will become sufficiently liquid for us to effectively monetize our investment. The performance of these investments may also rely on the services of a limited number of key individuals, the loss of whom could significantly adversely affect such investments’ performance.", "qwen": "neutral"}, {"nummer": "5156", "name": "The Goldman Sachs Group, Inc.", "gics": "Financials", "year": "2024", "trigger": "AI", "content": "This has led to claims by other market participants and regulators that such institutions have colluded in order to manipulate markets or market prices, including allegations that antitrust laws have been violated. While we have extensive procedures and controls that are designed to identify and prevent such activities, they may not be effective. Allegations of such activities, particularly by regulators, can have a negative reputational impact and can subject us to large fines and settlements, and potentially significant penalties, including treble damages. The growth of electronic trading and the introduction of new products and technologies, including trading and distributed ledger technologies, such as cryptocurrencies, and AI technologies, has increased competition. Technology is fundamental to our business and our industry. The growth of electronic trading and the introduction of new technologies is changing our businesses and presenting us with new challenges. Securities, futures and options transactions are increasingly occurring electronically, both on our own systems and through other alternative trading systems, and it appears that the trend toward alternative trading systems will continue.", "qwen": "neutral"}, {"nummer": "5169", "name": "The Hartford Insurance Group, Inc.", "gics": "Financials", "year": "2024", "trigger": "artificial intelligence", "content": "The small business market remains highly competitive and fragmented as carriers seek to differentiate themselves through product expansion, price, enhanced service and leading technology. Larger carriers such as The Hartford are continually advancing their pricing sophistication and ease of doing business with agents and customers through the use of technology, analytics and other capabilities that improve the process of evaluating a risk, quoting new business and servicing customers. The Company also continuously enhances digital capabilities as customers and distributors demand more access and convenience, and expands product and underwriting capabilities to accommodate both larger accounts and a broader risk appetite. Existing competitors and new entrants, including start-up and non-traditional carriers, are actively looking to expand sales of business insurance products to small businesses through increasing their underwriting appetite, deepening their relationships with distribution partners, leveraging emerging artificial intelligence capabilities, and through on-line and direct-to-consumer marketing. Carriers that can quote business in an automated way have a competitive advantage by shortening the time from quoting to issuance. Through its ICON quoting tool, The Hartford quotes over 75% of its Spectrum package business and workers’ compensation new business policies without human intervention. Middle & Large Business Middle & large business is considered “higher touch” and involves highly specialized expertise, including individual underwriting and pricing decisions.", "qwen": "operative"}, {"nummer": "5314", "name": "Hewlett Packard Enterprise Company", "gics": "Information Technology", "year": "2024", "trigger": "intelligent edge", "content": "Other companies may calculate and define similarly labeled items differently, which may limit the usefulness of this measure for comparative purposes. 47 Table of Contents HEWLETT PACKARD ENTERPRISE COMPANY AND SUBSIDIARIES Management's Discussion and Analysis of Financial Condition and Results of Operations (Continued) Results of operations in dollars and as a percentage of net revenue were as follows: For the fiscal years ended October 31, 2024 2023 2022 Dollars % of Revenue Dollars % of Revenue Dollars % of Revenue Dollars in millions Net revenue $ 30,127 100.0 % $ 29,135 100.0 % $ 28,496 100.0 % Cost of sales (exclusive of amortization shown separately below) 20,249 67.2 % 18,896 64.9 % 18,990 66.6 % Gross profit 9,878 32.8 % 10,239 35.1 % 9,506 33.4 % Research and development 2,246 7.5 % 2,349 8.1 % 2,045 7.2 % Selling, general and administrative 4,871 16.2 % 5,160 17.7 % 4,941 17.3 % Amortization of intangible assets 267 0.9 % 288 1.0 % 293 1.0 % Impairment of goodwill — — % — — % 905 3.2 % Transformation costs 93 0.3 % 283 1.0 % 473 1.7 % Disaster charges 7 — % 1 — % 48 0.2 % Acquisition, disposition and other related charges 204 0.6 % 69 0.1 % 19 0.1 % Earnings from operations 2,190 7.3 % 2,089 7.2 % 782 2.7 % Interest and other, net (117) (0.4) % cycles, while our traditional desktop software products tend to have predictable development cycles and regular product release cycles. In addition, developing consumer and professional tax software and services presents unique challenges because of the demanding development cycle required to accurately incorporate federal and state tax law and tax form changes within a rigid timetable. The development timing for our small business payroll and merchant payment processing services offerings varies with business needs and regulatory requirements, and the length of the development cycle depends on the scope and complexity of each project. We continue to make substantial investments in research and development, and we expect to focus our future research and development efforts on enhancing existing products and services with financial recommendations, personalization, and ease of use enabled by AI and other advanced technologies. We continue to focus on developing new products and services, including global offerings, and significant research and development efforts for ongoing projects to update the technology platforms for several of our offerings. SEASONALITY Our Consumer and ProTax offerings have a significant and distinct seasonal pattern as sales and revenue from our income tax preparation products and services are typically heavily concentrated in the period from November through April. This seasonal pattern typically results in higher net revenues during our second and third quarters ending January 31 and April 30, respectively.", "qwen": "prospective"}, {"nummer": "5575", "name": "IQVIA Holdings Inc.", "gics": "Health Care", "year": "2024", "trigger": "AI", "content": "14 • For lower risk activities, a variety of policies, standard operating procedures, guidance and training support our employees in the use of AI models — for example, the use of AI assistants to improve employee communications, and ensuring we have the necessary rights to use any non-IQVIA content with AI tools. • We have established private instances of certain public large language models. This ensures proprietary IQVIA content is not used to train public models and that the output and AI models derived from the use of proprietary content remains subject to IQVIA requirements and guidelines. • Robust AI policies and practices must be built on a solid foundation of good information governance policies and practices relating to data privacy, information security, intellectual property management, contract compliance, vendor management and related domains. IQVIA has extensive policies and practices addressing these topics, and substantial resources and experience in each of these domains. • Good AI policies and practices also depend upon strong supporting policies, practices and experience relating to the design, development, testing, implementation, management and support of technology. IQVIA has extensive policies and practices addressing these topics, and substantial resources and experience relating to the responsible use of technology.", "qwen": "prospective"}, {"nummer": "5636", "name": "Gartner, Inc.", "gics": "Information Technology", "year": "2024", "trigger": "AI", "content": "Some search engines also provide substantive content in search results, which, if expanded to the areas in which we operate, could reduce the need to enter our websites. When a major search engine changes its algorithms in a manner that negatively affects our placement in search results or makes it less likely for our target audience to enter our websites, our business, results of operations and financial position may be harmed. Similarly, some of our content is exposed to the datasets leveraged by AI chatbots, and these chatbots may provide substantive content, either with or without contribution, in query responses to users which could reduce the need to enter our websites. Uncertainty in the development, deployment, and use of AI in our platform and products and by our customers and competitors may result in harm to our business and reputation. We use, and may expand our use of, machine learning and AI technologies in some of our products, services, and processes. Developing, testing, and deploying AI systems will require additional investment and increase our costs. Our competitors or other third parties may also incorporate AI into their offerings more effectively and/or quickly than we do, which could impair our ability to compete effectively and adversely affect our business and financial results.", "qwen": "operative"}, {"nummer": "5821", "name": "Mastercard Incorporated", "gics": "Financials", "year": "2024", "trigger": "AI", "content": "We advance our customers’ growth by helping them to acquire new customers, as well as increase engagement with existing customers, through a curated set of direct marketing solutions and strategies. We focus on business outcomes and combine our proprietary data and insights with our marketing expertise to create innovative solutions that span the entire customer lifecycle, from brand design and product adoption to customer retention and portfolio optimization. Our end-to-end approach is built on collaboration with our customers and partners to constantly optimize marketing performance and deliver results. MASTERCARD 2024 FORM 10-K 15 PART I ITEM 1. BUSINESS • Personalization services , which leverage AI to help businesses provide personalized digital experiences for their customers. Our personalization platform and decision engine delivers product recommendations, offers and content to consumers across digital channels. • Issuer and merchant loyalty services . We have built a scalable rewards platform that enables issuers to provide consumers with a variety of benefits and services, such as personalized offers and rewards, access to a global airport lounge network, concierge services, insurance services, emergency card replacement, emergency cash advances and a 24-hour account holder service center.", "qwen": "operative"}, {"nummer": "5882", "name": "Mondelez International, Inc.", "gics": "Consumer Staples", "year": "2024", "trigger": "artificial intelligence", "content": "Failure to effectively respond to actions, innovations or other challenges from our competitors could adversely affect our business. Competitor and customer pressures require that we timely and effectively respond to changes in relevant markets, including changes to distribution channels and technological developments. These pressures could affect our prices, including our ability to price in response to commodity and other cost increases. Our ability to succeed depends on our ability to adapt to changing market conditions, which includes identifying and responding to new or developing trends, technological advancements (including advancements such as artificial intelligence, machine learning and augmented reality) which are increasingly important for understanding evolving consumer preferences. Our ability to adjust distribution methods and pricing, including adapting to fluctuating inflation, new or increased tariffs and/or trade barriers, economic conditions and recessions, as well as implementing effective trade incentives is also critical to advancing our priorities. Failure in these areas could negatively impact availability of or demand for our products, our operating results, achievement of our strategic and financial goals and our ability to capitalize on new revenue or value-producing opportunities. The rapid growth of some channels, such as discounters and digital commerce, may impact our current operations or strategies more quickly than we planned for, create consumer price deflation, alter the buying behavior of consumers or disrupt our retail customer relationships.", "qwen": "neutral"}, {"nummer": "5926", "name": "Moderna, Inc.", "gics": "Health Care", "year": "2024", "trigger": "AI", "content": "At the commercial stage, our digital and commercial organizations partner to drive performance and prepare for product launches. Digital and AI are key components of our commercialization strategy and are vital to our ability to increase our speed to market, enhance our commercial capabilities and continuously improve the quality of our products. We believe that our ability to move with both scale and speed positions us well to pursue our goals related to future product launches. In early 2023, we began a collaboration with OpenAI to co-innovate with a shared vision of AI’s transformative potential in the future of business and healthcare. In 2024, our AI culture led to the deployment across the company of ChatGPT Enterprise and its enhanced capabilities such as Advanced Analytics, Image Generation and GPTs. These GPTs are now embedded across our business functions, including legal, research, manufacturing and commercial, helping to drive productivity. For example, our Dose ID GPT uses ChatGPT Enterprise’s Advanced Data Analytics feature to further evaluate the optimal vaccine dose selected by the clinical study team.", "qwen": "operative"}, {"nummer": "5931", "name": "Moderna, Inc.", "gics": "Health Care", "year": "2024", "trigger": "artificial intelligence", "content": "This content includes presentations by external speakers at in-house scientific seminars, scientific courses at external universities and peer-to-peer video series in which in-house experts provide an introductory view of complex topics they tackle within their teams. New employees participate in our Moderna ONE onboarding program, which is an interactive learning experience designed to immerse our people in our culture and Mindsets from day one. Following onboarding, our employees continue to learn throughout their careers at Moderna and we deploy a digital learning management system to track and administer training programs for each of employee. In December 2021, we launched our Artificial Intelligence (AI) Academy. The AI Academy is intended to educate and empower our employees to identify and integrate AI and machine learning solutions into every Moderna system and process to bring mRNA medicines to patients. In 2024, we enhanced the AI Academy with a required GPT training to empower employees to transform the way they work with the power of AI. 34 Table of Contents Our culture As an organization, we are bold, collaborative, curious and relentless.", "qwen": "prospective"}, {"nummer": "5978", "name": "MSCI Inc.", "gics": "Financials", "year": "2024", "trigger": "AI", "content": "You should read the section titled “Forward-Looking Statements” on page 1 for a description of the types of statements that are considered forward-looking statements, as well as the significance of such statements in the context of this Annual Report on Form 10-K. This information should be read in conjunction with “Management’s Discussion and Analysis of Financial Condition and Results of Operations” and the consolidated financial statements and related notes, which discuss factors that could materially affect our future results. Summary of Risk Factors Our business is subject to numerous risks and uncertainties, discussed in more detail in the following section. These risks include, among others, the following key risks: • Our dependence on third parties to supply us with data, applications and services and to distribute our products; • Undetected errors, defects, malfunctions or similar problems leading to increased costs or liability; • Our exposure to potential reputational and credibility concerns; • The possibility that our clients seek to negotiate lower asset-based fees or cease using our indexes as the basis for indexed investment products; • Cancellations or reductions by our clients or reduced demand for our products or services; • The impact of failures, disruptions, instability or vulnerabilities in our information technology systems, networks or applications; • Our inability to ensure and protect the confidentiality of data; • Our exposure to security incidents including cyber-attacks or failures of our plans, systems, networks or procedures; • Unanticipated failures, interruptions or delays in the performance or delivery of our products as a result of the adoption of new technologies; • Security vulnerabilities resulting from our use of open source code; • Issues related to the use and development of AI resulting in reputational harm, competitive harm, regulatory scrutiny or legal liability; • The impact of changes in economic conditions and the global capital markets, including those resulting from geopolitical events, adverse equity market conditions, volatility in the financial markets and evolving investment trends; • The effects on us from competition and financial and budgetary pressures affecting our clients; • Our need to successfully develop new and enhanced products and services in order to remain competitive; • The impact of our global operations and any expansion and our exposure to additional issues from our increased global footprint; • Failure to comply with laws, rules or regulations; changes to current laws, rules or regulations; or the introduction of new laws, rules or regulations relevant to our business; • Inability to protect our intellectual property rights; • Failure to attract, develop or retain qualified personnel; • The impact of foreign currency exchange rate fluctuation; • The impact of our indebtedness on our financial flexibility; • The impact of changes in our credit ratings; and • Our exposure to tax liabilities in various jurisdictions. Operational Risks We are dependent on third parties to supply data, applications and services for our products and services and are dependent on certain vendors to distribute our products. A refusal or failure by a key vendor to distribute our products; any loss of key third- 14 Table of Content s party suppliers of data, applications or services; a decline in the accuracy or quality of such data, applications or services; or any failure by us to comply with our suppliers’ or distributors’ licensing requirements could impair our ability to provide our products and services, which could have a material adverse effect on our business, financial condition or results of operations. We rely on third-party suppliers of data, applications and services, including data from stock exchanges and other suppliers (collectively, “Vendor Products”), and depend on the accuracy and quality of Vendor Products and the ability and willingness of such suppliers to deliver, support, enhance and develop new products on a timely and cost-effective basis.", "qwen": "neutral"}, {"nummer": "6066", "name": "Microsoft Corporation", "gics": "Information Technology", "year": "2024", "trigger": "AI", "content": "Our focus on cloud-based and AI services presents execution and competitive risks. We are incurring significant costs to build and maintain infrastructure to support cloud computing and AI services. These costs will reduce the operating margins. Whether we succeed in cloud-based and AI services depends on our execution in several areas, including: • Continuing to bring to market compelling cloud-based and AI experiences and products that generate increasing traffic and market share. • Maintaining the utility, compatibility, and performance of our cloud-based and AI services on the growing array of computing devices, including PCs, smartphones, tablets, gaming consoles, and other devices. • Continuing to enhance the attractiveness of our cloud platforms to third-party developers. • Ensuring our cloud-based services meet the reliability expectations and specific requirements of our customers and maintain the security of their data as well as help them meet their own compliance needs.", "qwen": "neutral"}, {"nummer": "6202", "name": "ServiceNow, Inc.", "gics": "Information Technology", "year": "2024", "trigger": "AI", "content": "Retail Retail Operations and Retail Service Management leverages Now Assist and automated t lives, do our best work and fulfill our purpose together. To deliver on this promise, we follow a Global People Strategy that serves as the foundation for how we plan and deliver on employee programming and experiences: People Led Data Driven AI Powered Deliver on the People Pact through a product mindset that puts the user at the center of all program, process, and service delivery design Recruit and retain an inclusive and agile workforce through data use that accelerates growth and mitigates bias Make it easy to create and use AI to maximize talent impact and value 11 Table of Contents Culture and Inclusion Our culture is grounded in our values. We live our culture by regularly listening to our people and gathering feedback directly from our workforce to inform our programs and meet employee needs globally. Our Employee Voice Survey (“EVS”) measures and analyzes employee engagement, including inclusion and belonging, learning and development, recognition, compensation and wellbeing. EVS insights are used to create action plans at all levels of the organization and inform the assessment of our human capital management approach and its alignment with our purpose and business strategy.", "qwen": "neutral"}, {"nummer": "6225", "name": "ServiceNow, Inc.", "gics": "Information Technology", "year": "2024", "trigger": "AI", "content": "We have experienced, and may continue to experience, difficulties in new geographic markets, including hiring qualified sales management personnel, penetrating the target market, and managing local operations. Risks associated with making our products and services available in international markets include, for example: • compliance with multiple, conflicting and changing governmental laws and regulations; • requirements to have local partner(s), local entity ownership limitations or technology transfer or sharing requirements, or to comply with data residency and transfer laws and regulations, privacy and data protection laws and regula nificant resources and costs to modify and maintain business practices in order to comply with these new laws and regulations. Future acquisition or disposition activities could involve unknown risks and may have materially adverse effects and NRG may be subject to trailing liabilities from businesses that it disposes of or that are inactive. NRG may in the future acquire or dispose of businesses or assets, acquire or sell books of retail customers, or pursue other business activities, directly or indirectly, through subsidiaries that involve a number of risks.", "qwen": "neutral"}, {"nummer": "6305", "name": "NVIDIA Corporation", "gics": "Information Technology", "year": "2024", "trigger": "AI", "content": "We can optimize across the entire computing, networking and storage stack to deliver data center-scale computing solutions. While our approach starts with powerful chips, what makes it a full-stack computing platform is our large body of software, including the CUDA parallel programming model, the CUDA-X collection of acceleration libraries, APIs, SDKs, and domain-specific application frameworks. In addition to software delivered to customers as an integral part of our data center computing platform, we offer paid licenses to NVIDIA AI Enterprise, a comprehensive suite of enterprise-grade AI software and NVIDIA vGPU software for graphics-rich virtual desktops and workstations. In fiscal year 2024, we launched the NVIDIA DGX Cloud, an AI-training-as-a-service platform which includes cloud-based infrastructure and software for AI, customizable pretrained AI models, and access to NVIDIA experts. We have partnered with leading cloud service providers to host this service in their data centers. Gaming Gaming is the largest entertainment industry, with PC gaming as the predominant platform. Many factors propel its growth, including new high production value games and franchises, the continued rise of competitive gaming, or eSports, social connectivity and the increasing popularity of game streamers, modders, or gamers who remaster games, and creators.", "qwen": "prospective"}, {"nummer": "6483", "name": "Pfizer Inc.", "gics": "Health Care", "year": "2024", "trigger": "AI", "content": "In addition, we have been and may in the future be subject to claims and other actions related to our business activities, brought by governmental authorities, as well as consumers and private payors. In some instances, we have incurred significant expense, civil payments, fines and other adverse consequences as a result of these claims, actions and inquiries. Such claims, actions and inquiries may relate to alleged non-compliance with laws and regulations associated with the dissemination of product (approved and unapproved) information, potentially resulting in government enforcement action and reputational damage. These risks may be heightened by the use of AI in our operations as well as in our digital marketing, including social media, mobile applications and blogger outreach, as well as direct-to-consumer marketing and digital platform offerings. In connection with the resolution of a U.S. government investigation concerning independent copay assistance organizations that provide financial assistance to Medicare patients, in 2018, we entered into a Corporate Integrity Agreement with the Office of the Inspector General of the HHS (OIG), which expired in May 2023. Pfizer submitted its final annual report in October 2023 and the OIG officially closed the matter in January 2025. We and certain of our subsidiaries are also subject to numerous contingencies arising in the ordinary course of business relating to legal claims and proceedings, including environmental contingencies.", "qwen": "neutral"}, {"nummer": "6544", "name": "PPL Corporation", "gics": "Utilities", "year": "2024", "trigger": "AI", "content": "The TSA has determined that LG&E is critical, while RIE has not been notified of this distinction and is therefore not currently subject to have Level 2 (i.e., partial driving automation) or higher autonomy, compared to an estimated 20% of new light duty vehicles sold globally in 2024 (TechInsights, September 2024). IoT. Industry demand for IoT devices is expected to remain strong across consumer, edge networking and industrial applications, in part due to expanded use cases enabled by 5G and AI technologies, including generative AI. Consumer.", "qwen": "neutral"}, {"nummer": "6874", "name": "Visa Inc.", "gics": "Financials", "year": "2024", "trigger": "ChatGPT", "content": "As Visa strives to achieve our purpose and our growth objectives, we have focused on enhancing our employees’ expertise across our business. We offer unique career pathways for employees and provide them with tools and support to build on their leadership impact and develop their careers. Along with learning support from Visa University and our educational assistance program, employees are encouraged to broaden their knowledge and develop new skills through alternative career pathways and talent development programs including our global technology apprenticeship, military talent and mentorship programs. Visa’s commitment to fostering a culture of innovation and collaboration also is demonstrated through our employees’ adoption of generative AI tools for content generation, productivity and business automation, including an internal, secure version of ChatGPT and our Ask People Team Portal. We are committed to providing benefits that support our employees. As part of our inclusive “whole person” approach to benefits, Visa offers a robust package of curated tools, resources, and benefits for our employees. While some programs may vary by location, some of our financial benefits include our 401(k) match, employee stock purchase plan and financial wellbeing sessions and resources.", "qwen": "operative"}, {"nummer": "6913", "name": "W. R. Berkley Corporation", "gics": "Financials", "year": "2024", "trigger": "artificial intelligence", "content": "We cannot predict the impact, if any, that any current, proposed or future federal or state cybersecurity laws or regulations will have on our business, financial condition or results of operations. Innovation and Technology . As a result of increased innovation and use of technology in the insurance sector, the NAIC and insurance regulators have been focusing on the use of “big data” technologies, such as artificial intelligence, machine learning and automated decision-making. In December 2023, the NAIC adopted the Model Bulletin on the Use of Artificial Intelligence Systems by Insurers (the “AI Bulletin”). The AI Bulletin may be adopted and issued by state regulators to licensed insurers. In addition to affirming that the use of artificial intelligence must comply with existing state law, the AI Bulletin sets forth regulators’ expectations on how insurers will develop, acquire and use artificial intelligence technologies including around the use of third-party data and models. In 2024, the NAIC formed a new task force to develop and propose a regulatory framework for the oversight of insurers’ use of third-party data and predictive models, the drafting of which is expected to begin in 2025.", "qwen": "neutral"}, {"nummer": "6917", "name": "W. R. Berkley Corporation", "gics": "Financials", "year": "2024", "trigger": "artificial intelligence", "content": "For example, Colorado has enacted a law that prohibits insurers from using external consumer data and information sources (“ECDIS”), as well as algorithms or predictive models that use ECDIS, in a way that unfairly discriminates based on race, color, national or ethnic origin, religion, sex, sexual orientation, disability, gender identity or gender expression. The Colorado Division of Insurance adopted regulations requiring life insurers to adopt a governance and risk management framework for the use of artificial intelligence, machine learning and other technologies that utilize “external consumer data.” In December 2024, the Colorado Division of Insurance released a draft proposed amendment to bring passenger automobile and health benefit plan insurers within its scope. It is expected that Colorado will further adopt governance and testing regulations for other lines of insurance. Similarly, in July 2024, the NYDFS issued Insurance Circular Letter 7 on the Use of Artificial Intelligence and External Consumer Data and Information Sources in Insurance Underwriting and Pricing, which applies to our insurance subsidiaries licensed in New York. Circular Letter 7 sets forth fairness principles, transparency requirements, and governance and risk management responsibilities for insurers under NYDFS’ jurisdiction that develop and/or use ECDIS, artificial intelligence systems, and other predictive models in underwriting and pricing insurance policies and annuity contracts. We cannot predict whether states will adopt the AI Bulletin or a similar regulation, or what, if any, changes to laws or regulations may be enacted with regard to “big data” or artificial intelligence technologies. Risk-Based Capital Requirements .", "qwen": "neutral"}, {"nummer": "6925", "name": "Block, Inc.", "gics": "Information Technology", "year": "2024", "trigger": "artificial intelligence", "content": "• Local: Our go-to-market strategy is focused on verticals with a local approach, specifically restaurants and services-based businesses. Growing upmarket has shown us that even larger sellers want to feel authentic to their buyers. We can enable this type of robust offering through our technology and by improving the onboarding process through sales and account management. • Artificial Intelligence (AI): We are focused on enabling growth by leveraging AI to increase productivity and outcomes for our sales and marketing, customer service, and engineering efforts, in addition to building features that help sellers grow their businesses. 8 • Banking: Our robust banking offering primarily helps our sell
