<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f1419">
<title>Sentiment-Review · 150 Treffer</title>
<style>
  :root{
    --op:#2e9e5b; --pro:#e0a020; --neu:#57738c; --not:#b0451f;
    --card:#1b232c; --ink:#e8eef3; --muted:#8aa0b3;
    --safe-t:env(safe-area-inset-top); --safe-b:env(safe-area-inset-bottom);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
       background:linear-gradient(160deg,#0f1419,#16202b);color:var(--ink);
       display:flex;flex-direction:column;align-items:center;
       height:100vh;height:100dvh;overflow:hidden;
       padding:var(--safe-t) 0 var(--safe-b)}
  header{width:100%;max-width:760px;padding:12px 16px 4px;flex:0 0 auto}
  h1{font-size:15px;margin:0 0 8px;font-weight:600;letter-spacing:.2px}
  .bar{height:8px;background:#26323d;border-radius:99px;overflow:hidden}
  .bar > i{display:block;height:100%;width:0;
           background:linear-gradient(90deg,#2e9e5b,#46c1ff);transition:width .25s}
  .meta-line{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:5px}

  .stage{position:relative;width:100%;max-width:760px;flex:1 1 auto;min-height:0;
         padding:10px 16px 14px;display:flex;flex-direction:column}
  .card{position:relative;background:var(--card);border:1px solid #2a3742;border-radius:18px;
        padding:16px 18px;box-shadow:0 18px 40px rgba(0,0,0,.45);
        display:flex;flex-direction:column;min-height:0;flex:1 1 auto;
        touch-action:pan-y;will-change:transform}
  .swipe-tag{position:absolute;top:18px;padding:6px 12px;border-radius:10px;font-weight:800;
             font-size:15px;opacity:0;border:2px solid;pointer-events:none;transition:opacity .1s}
  .swipe-tag.r{right:18px;color:var(--op);border-color:var(--op);transform:rotate(12deg)}
  .swipe-tag.l{left:18px;color:var(--neu);border-color:var(--neu);transform:rotate(-12deg)}
  .tags{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:6px}
  .badge{font-size:11px;padding:3px 9px;border-radius:99px;background:#26323d;color:var(--muted)}
  .badge.trig{background:#243b4d;color:#7fd0ff;font-weight:600}
  .firm{font-size:18px;font-weight:700;margin:2px 0}
  .sub{font-size:11px;color:var(--muted);margin-bottom:10px}
  .content{overflow-y:auto;-webkit-overflow-scrolling:touch;font-size:15px;line-height:1.6;
           color:#d4dde5;padding-right:4px;flex:1 1 auto;min-height:0}
  .content mark{background:#3a5a2e;color:#cdffb0;padding:0 2px;border-radius:3px}

  .hint{font-size:11px;color:var(--muted);text-align:center;margin:8px 0 2px}
  .hint b{color:#7fd0ff}
  .btns{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px;flex:0 0 auto}
  button.lab{border:none;border-radius:14px;padding:13px 4px;font-size:14px;font-weight:700;
             color:#fff;cursor:pointer;display:flex;flex-direction:column;gap:2px;
             align-items:center;min-height:54px;justify-content:center;
             transition:transform .08s, filter .15s}
  button.lab small{font-weight:500;opacity:.85;font-size:10px}
  button.lab:active{transform:scale(.95)}
  .b-op{background:var(--op)} .b-pro{background:var(--pro);color:#1a1205}
  .b-neu{background:var(--neu)} .b-not{background:var(--not)}

  .toolbar{display:flex;flex-wrap:wrap;justify-content:center;gap:10px 16px;
           margin-top:10px;font-size:13px;flex:0 0 auto}
  .toolbar a{color:var(--muted);cursor:pointer;text-decoration:none;user-select:none;
             padding:4px 2px}
  .toolbar a:active{color:var(--ink)}
  .tip{margin-top:8px;text-align:center;font-size:12px;color:var(--muted);min-height:15px;flex:0 0 auto}
  .tip b{color:#7fd0ff}

  .summary{display:none;width:100%;max-width:760px;padding:20px 16px;overflow-y:auto}
  .summary.show{display:block}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:14px 0}
  .stat{background:var(--card);border:1px solid #2a3742;border-radius:14px;padding:12px 6px;text-align:center}
  .stat b{font-size:24px;display:block}
  .stat span{font-size:11px;color:var(--muted)}
  .dl{display:inline-block;background:#2e9e5b;color:#fff;padding:12px 20px;border-radius:12px;
      font-weight:700;cursor:pointer;border:none;font-size:15px;margin:6px 6px 0 0}
  .dl.sec{background:#26323d;color:var(--ink)}
  .kpi{font-size:14px;color:var(--muted);margin-top:12px;line-height:1.7}
  .kpi b{color:var(--ink)}

  @media (max-width:520px){
    .btns{grid-template-columns:repeat(2,1fr)}
    button.lab{font-size:15px;min-height:58px}
    .firm{font-size:17px}
    .content{font-size:15px}
    .grid{grid-template-columns:repeat(2,1fr)}
  }
</style>
</head>
<body>
<header>
  <h1>🗂️ Sentiment-Review — manuelles Qualifizieren</h1>
  <div class="bar"><i id="prog"></i></div>
  <div class="meta-line"><span id="counter">0 / 0</span><span id="leftinfo"></span></div>
</header>

<div class="stage" id="stage">
  <div class="card" id="card">
    <span class="swipe-tag r" id="tagR">operative</span>
    <span class="swipe-tag l" id="tagL">neutral</span>
    <div class="tags" id="tags"></div>
    <div class="firm" id="firm"></div>
    <div class="sub" id="sub"></div>
    <div class="content" id="content"></div>
  </div>
  <div class="hint">Wische <b>→ operative</b> · <b>← neutral</b> &nbsp;|&nbsp; oder tippe · Tasten <b>1–4</b></div>
  <div class="btns">
    <button class="lab b-op"  data-l="operative">operative<small>1 · in Nutzung</small></button>
    <button class="lab b-pro" data-l="prospective">prospective<small>2 · geplant</small></button>
    <button class="lab b-neu" data-l="neutral">neutral<small>3 · nur erwähnt</small></button>
    <button class="lab b-not" data-l="not_ai">not_ai<small>4 · kein AI</small></button>
  </div>
  <div class="toolbar">
    <a id="back">◀ Zurück</a>
    <a id="skip">Überspringen ▶</a>
    <a id="toggleTip">Modell-Tipp: aus</a>
    <a id="save">💾 CSV sichern</a>
    <a id="loadlink">⤴ Laden</a>
    <a id="reset">⟲ Reset</a>
  </div>
  <div class="tip" id="tip"></div>
  <input type="file" id="loadfile" accept=".csv,text/csv" style="display:none">
</div>

<div class="summary" id="summary">
  <h1>✅ Review abgeschlossen</h1>
  <div class="grid" id="sumgrid"></div>
  <div class="kpi" id="kpi"></div>
  <div style="margin-top:16px">
    <button class="dl" id="download">⬇ Ergebnisse als CSV</button>
    <button class="dl sec" id="reopen">Nochmal durchgehen</button>
  </div>
</div>

<script>
const DATA = [{"nummer": "107", "name": "American Express Company", "gics": "Financials", "year": "2021", "trigger": "artificial intelligence", "content": "Notwithstanding any attempts to diversify our reliance on third parties, we may not be able to effectively mitigate operational risks relating to the service providers of our third-party providers. If we are not able to invest successfully in, and compete at the leading edge of, technological developments across all our businesses, our revenue and profitability could be materially adversely affected. Our industry is subject to rapid and significant technological changes. In order to compete in our industry, we need to continue to invest in technology across all areas of our business, including in transaction processing, data management and analytics, machine learning and artificial intelligence, customer interactions and communications, open banking and alternative payment and financing mechanisms, authentication technologies and digital identification, tokenization, real-time settlement, and risk 28 Table of Contents management and compliance systems. Incorporating new technologies into our products and services, including developing the appropriate governance and controls consistent with regulatory expectations, requires substantial expenditures and takes considerable time, and ultimately may not be successful. We expect that new technologies in the payments industry will continue to emerge, and these new technologies may be superior to, or render obsolete, our existing technology. The process of developing new products and services, enhancing existing products and services and adapting to technological changes and evolving industry standards is complex, costly and uncertain, and any failure by us to anticipate customers’ changing needs and emerging technological trends accurately could significantly impede our ability to compete effectively.", "qwen": "prospective"}, {"nummer": "189", "name": "CrowdStrike Holdings, Inc.", "gics": "Information Technology", "year": "2021", "trigger": "AI", "content": "Our lightweight agent intelligently streams high fidelity endpoint data to the cloud where Threat Graph provides a simple, flexible, and scalable way to model highly interconnected data sets. Threat Graph processes, correlates, and analyzes over five trillion endpoint-related events per week in real time and maintains an index of these events for future use. Threat Graph continuously looks for malicious activity by applying graph analytics and AI algorithms to the data streamed from the endpoints. Our multi-tenant architecture allows us to collect a broad array of high fidelity data about both potential attacks and benign behavioral patterns across our entire customer base, continuously enhancing our AI algorithms. This significantly increases the efficacy of our solution to stop breaches while reducing false positives. 3 Table of Contents We founded our company on the principle that the future of security would be driven by AI and that a cloud-native architecture would enable the collection of high fidelity data and scalability necessary for an effective solution. From the beginning, our strategy was focused on collecting data at scale, centrally storing such data in a singular model, and training our algorithms on these vast amounts of high fidelity data, which we believe is a fundamental differentiator from our competitors.", "qwen": "operative"}, {"nummer": "410", "name": "Intel Corporation", "gics": "Information Technology", "year": "2021", "trigger": "AI", "content": "Key Developments \"The market continues to validate the strategic direction we began several years ago; for operational workloads, compute will move closer to where the data is created and AI inference will be the dominant technology driver.\" —Tom Lantzsch, IOTG General Manager ■ Revenue was up 33%, driven by increased demand for IOTG platform products due to recovery from the economic impacts of COVID-19 across all key market segments. Most notably, we saw strength in our retail, industrial, and healthcare market segments. ■ We announced enhanced product capabilities, which include the 11th Gen Intel Core processors and 3rd Gen Intel Xeon Scalable processors, both bring new AI and operational technology features to customers. These products are a response to needs across the verticals we serve to reduce edge complexity, add capabilities to developers, lower the cost of ownership, and support a range of environmental conditions. ■ We continue to update solutions to improve developers' digital strategies and to accelerate market adoption of AI applications at the edge. This includes advancing the OpenVINO toolkit for AI inference model deployment.", "qwen": "operative"}, {"nummer": "435", "name": "Intel Corporation", "gics": "Information Technology", "year": "2021", "trigger": "AI", "content": "Revenue was limited by ongoing industry component, substrate, and foundry capacity shortages. \"Intel FPGAs and Structured ASICs, unleashed with software, platform and workload innovations, are accelerating a smart and connected world.\" —Shannon Poulin, PSG General Manager ■ We are shipping our Intel ® Agilex™ FPGA family, featuring industry-leading FPGA fabric performance, power efficiency, and transceiver performance. We released our Intel ® eASIC™ N5X device family (Diamond Mesa) for low-latency 5G network acceleration, cloud acceleration, and storage, AI, and edge applications. ■ We announced Arrow Creek, an FPGA-based Acceleration Development Platform SmartNIC adapter for high-performance 100G networking acceleration, and RedHat support for our Intel Open FPGA Stack scalable, source-accessible FPGA hardware and software infrastructure. ■ We announced that Intel ® FPGA-based IPU platforms are currently deployed at multiple cloud service providers. We also announced Oak Springs Canyon, an IPU platform built with the Intel ® Xeon ® D processor and the Intel Agilex FPGA.", "qwen": "operative"}, {"nummer": "489", "name": "Intuitive Surgical, Inc.", "gics": "Health Care", "year": "2021", "trigger": "robotic-assisted", "content": "In February 2020, we received CE mark clearance for our da Vinci Handheld Camera. We broadly launched the da Vinci Handheld Camera in our European direct markets as well as in the U.S. in May 2020 and June 2020, respectively. Ion endoluminal system. In February 2019, we obtained FDA clearance for the Ion endoluminal system, our new flexible, robotic-assisted, catheter-based platform designed to navigate through very small lung airways to reach peripheral nodules for biopsies. The Ion system uses an ultra-thin articulating robotic catheter that can articulate 180 degrees in all directions. The outer diameter of the catheter is 3.5mm, which allows physicians to navigate through small and tortuous airways to reach nodules in most airway segments within the lung. The Ion system’s flexible biopsy needle can also pass through very tight bends via Ion’s catheter to collect tissue in the peripheral lung.", "qwen": "not_ai"}, {"nummer": "521", "name": "Lumentum Holdings Inc.", "gics": "Information Technology", "year": "2021", "trigger": "computer vision", "content": "Virtual meetings, video calls, and hybrid in-person and virtual environments for work and other aspects of life will continue to drive strong needs for bandwidth growth and present dynamic new technology challenges that our technology addresses. As manufacturers demand higher levels of precision, new materials, and factory and energy efficiency, suppliers of manufacturing tools globally are turning to laser-based approaches, including the types of lasers Lumentum supplies. Laser-based 3D sensing and LiDAR for security, industrial and automotive applications are rapidly developing markets. The technology enables computer vision applications that enhance security, safety, and new functionality in the electronic devices that people rely on every day. The use of LiDAR and in-cabin 3D sensing in automobile and delivery vehicles over time significantly adds to our long-term market opportunity. Frictionless and contactless biometric security and access control is of increasing focus globally given the world’s experience with the COVID-19 pandemic. Additionally, we expect 3D-enabled machine vision solutions to expand significantly in industrial applications in the coming years.", "qwen": "neutral"}, {"nummer": "526", "name": "Mastercard Incorporated", "gics": "Financials", "year": "2021", "trigger": "machine learning", "content": "The program is expected to launch in 2022. ◦ Our Click to Pay checkout experience is designed to provide consumers the same convenience and security in a digital environment that they have when paying in a store, make it easier for merchants to implement secure digital payments and provide issuers with improved fraud detection and prevention capability. This experience is based on the EMV Secure Remote Commerce industry standard that enables a faster, more secure checkout experience across web and mobile sites, mobile apps and connected devices ◦ Our Digital First Card program enables customers to offer their cardholders a fully digital payment experience with an optional physical card, meeting cardholder expectations of immediacy, safety and convenience during card application, authentication and instant card access, securing purchases (whether contactless, in-store, in-app or via the web) and managing alerts, controls and benefits ◦ Our Digital Doors program helps small businesses establish and protect an online presence, including accepting digital payments • Securing more transactions. We are leveraging tokenization, biometrics and machine learning technologies in our push to secure every transaction. These efforts include driving EMV-level security and benefits through all our payment channels. • Simplifying access to, and integration of, our digital assets. Our Mastercard Developer platform makes it easy for customers and partners to leverage our many digital assets and services.", "qwen": "prospective"}, {"nummer": "712", "name": "Palo Alto Networks, Inc.", "gics": "Information Technology", "year": "2021", "trigger": "machine learning", "content": "It delivers real-time detection and prevention of unknown, evasive, and targeted web-based threats such as phishing, malware, and command-and-control. While many vendors use machine learning to categorize web content or prevent malware downloads, Advanced URL Filtering is the first offering to protect patient zero from unknown fileless and file-based web attacks in real-time. • DNS Security. This cloud-based subscription uses machine learning to proactively block malicious domains and stops attacks in progress. Unlike other solutions, it does not require endpoint routing configurations to be maintained and therefore cannot be bypassed. It allows firewalls access to DNS signatures that are generated using advanced predictive analysis, machine learning, and malicious domain data from a growing threat intelligence sharing community of which we are a part. Expanded categorization of DNS traffic and comprehensive analytics allow deep insights into threats, empowering security personnel with the context to optimize their security posture.", "qwen": "operative"}, {"nummer": "751", "name": "Palantir Technologies Inc.", "gics": "Information Technology", "year": "2021", "trigger": "AI", "content": "Datasets may be insufficient, of poor quality, or contain biased information. Inappropriate or controversial data practices by, or practices reflecting inherent biases of, data scientists, engineers, and end-users of our systems could impair the acceptance of AI solutions. If the recommendations, forecasts, or analyses that AI applications assist in producing are deficient or inaccurate, we could be subjected to competitive harm, potential legal liability, and brand or reputational harm. Some AI scenarios present ethical issues. Though our technologies and business practices are designed to mitigate many of these risks, if we enable or offer AI solutions that are controversial because of their purported or real impact on human rights, privacy, employment, or other social issues, we may experience brand or reputational harm. We depend on computing infrastructure operated by Amazon Web Services (“AWS”), Microsoft, and other third parties to support some of our customers and any errors, disruption, performance problems, or failure in their or our operational infrastructure could adversely affect our business, financial condition, and results of operations. We rely on the technology, infrastructure, and software applications, including software-as-a-service offerings, of certain third parties, such as AWS and Microsoft Azure, in order to host or operate some or all of certain key technology platform features or functions of our business, including our cloud-based services (including Palantir Cloud), customer relationship management activities, billing and order management, and financial accounting services.", "qwen": "neutral"}, {"nummer": "772", "name": "Revvity, Inc.", "gics": "Health Care", "year": "2021", "trigger": "precision medicine", "content": "• PerkinElmer Signals Medical Review TM software, which empowers medical monitors to detect safety signals faster and reduce overall time to submission by combining innovative medical review workflow with advanced analytics. • PerkinElmer Signals Lead Discovery TM software, which enables researchers to quickly gain new insights into chemical and biomolecular research data, featuring guided search and analysis workflows and dynamic data visualizations for on-the-fly exploration. • PerkinElmer Signals TM electronic notebook, a scientific research data management solution, which allows researchers to record research data and experiments in digital notebooks, drag and drop, store, organize, share, find and filter data easily. • PerkinElmer Signals TM Translational data management, aggregation and analysis platform, which offers out-of-the-box support for the complete precision medicine workflow from data acquisition to biomarker discovery and validation. • ChemDraw ® 18, a chemical structure drawing and visualization application for scientists and researchers. • Lead Discovery Premium software, which allows scientists to import, filter by, analyze and interpret chemical structures and biosequences alongside other related data in a highly visual and interactive environment for faster insights and better decisions. 5 Table of Contents Applied Markets: • The Clarus ® series of gas chromatographs, gas chromatographs/mass spectrometers and the TurboMatrix™ family of sample-handling equipment, which are used to identify and quantify compounds in the environmental, forensics, food and beverage, hydrocarbon processing/biofuels, materials testing, pharmaceutical and semiconductor industries.", "qwen": "neutral"}, {"nummer": "917", "name": "Advanced Micro Devices, Inc.", "gics": "Information Technology", "year": "2022", "trigger": "machine learning", "content": "Our AMD Radeon Software expands remote gaming functionality and enables new features and customization capabilities. In addition, we also offer tools for game developers such as our AMD FidelityFX™ open-source image quality software toolkit that helps deliver improved visual quality with minimal performance overhead. FidelityFX Super Resolution (FSR) uses upscaling technologies to help boost frame rates in games. Our FSR 2.0 technology uses temporal data and optimized anti-aliasing to boost frame rates in supported games while delivering similar or better image quality than native resolution without requirement dedicated machine learning hardware. Our AMD Radeon RX 7900 XTX and Radeon RX 7900 XT graphics cards are built on high-performance, energy-efficient AMD RDNA 3 architecture. AMD Radeon RX 7900 series chiplet design combines 5 nm and 6 nm process nodes, each optimized for specific chips in the GPU. We continue to offer AMD Radeon RX 6000 series discrete graphics, based on our RDNA2 architecture, for high-performance gaming desktops and notebooks.", "qwen": "neutral"}, {"nummer": "1041", "name": "The Cigna Group", "gics": "Health Care", "year": "2022", "trigger": "AI", "content": "The FTC has also been active with respect to companies' use of big data and artificial intelligence (\"AI\"), specifically ensuring fair and equitable use of these tools, and the FTC has named AI as an area of enforcement focus. State legislatures and regulators are similarly interested in the use of AI, particularly as it is used in modeling, and a handful of states have either passed legislation or issued regulatory guidance concerning AI. Additionally, 26 the National Association of Insurance Commissioners (\"NAIC\"), an organization of state insurance regulators, recently established the Innovation, Cybersecurity and Technology Committee to provide a forum for regulators to learn, monitor and confer on emerging technology issues, including, among others, cybersecurity and AI. State Departments of Insurance (\"DOI\") and other state government agencies and legislatures are increasingly aware and active in providing guidance in the AI space. The SEC has proposed additional cybersecurity disclosure obligations on reporting companies, with final rulemaking expected in 2023. The Cybersecurity Information Sharing Act of 2015 (\"CISA\") encouraged organizations to share cyber threat indicators with the federal government and, among other things, directed HHS to develop a set of voluntary cybersecurity best practices for organizations in the health care industry. States have also begun to issue regulations specifically related to cybersecurity, which may differ or conflict from state to state.", "qwen": "neutral"}, {"nummer": "1085", "name": "CrowdStrike Holdings, Inc.", "gics": "Information Technology", "year": "2022", "trigger": "artificial intelligence", "content": "George Kurtz - President, Chief Executive Officer, and Director Mr. Kurtz is one of our co-founders and has served as our President, Chief Executive Officer, and a member of our board of directors since November 2011. From October 2004 to October 2011, Mr. Kurtz served in executive roles at McAfee, Inc., a security technology company, including as Executive Vice President and Worldwide Chief Technology Officer from October 2009 to October 2011. In October 1999, Mr. Kurtz founded Foundstone, Inc., a security technology company, where he served as its Chief Executive Officer until it was acquired by McAfee, Inc. in October 2004. Since November 2017, he has also served as Chairman as a board member, and as President for the CrowdStrike Foundation, a nonprofit established to support the next generation of talent and research in cybersecurity and artificial intelligence through scholarships, grants, and other activities. He has also served on the board of directors of Hewlett Packard Enterprise, an enterprise information technology company, since June 2019. Mr. Kurtz holds a B.S. in Accounting from Seton Hall University.", "qwen": "neutral"}, {"nummer": "1140", "name": "DexCom, Inc.", "gics": "Health Care", "year": "2022", "trigger": "machine learning", "content": "To complement our direct sales efforts, we have entered into distribution arrangements in North America and several international markets that allow distributors to sell our products. Future Developments Product Development: We plan to develop future generations of technologies that are focused on improved performance and convenience and that will enable intelligent insulin administration. Over the longer term, we plan to continue to develop and improve networked platforms with open architecture, connectivity and transmitters capable of communicating with other devices. We also intend to expand our efforts to accumulate CGM patient data and metrics and apply predictive modeling and machine learning to generate interactive CGM insights that can inform patient behavior. Partnerships: We also continue to pursue and support development partnerships with insulin pump companies and companies or institutions developing insulin delivery systems, including automated insulin delivery systems. New Opportunities: We are also exploring how to extend our offerings to other opportunities, including for people with Type 2 diabetes that are non-insulin using, people with pre-diabetes, people who are obese, people who are pregnant, and people in the hospital setting. Eventually, we may apply our technological expertise to products beyond glucose monitoring.", "qwen": "prospective"}, {"nummer": "1170", "name": "F5, Inc.", "gics": "Information Technology", "year": "2022", "trigger": "artificial intelligence", "content": "Over the past several years, F5 has transformed its business and significantly expanded its software and cloud offerings to deliver a broad portfolio of solutions to help customers address the complexity and risk in today’s hybrid IT environments. Through BIG-IP, F5 NGINX, and F5 Distributed Cloud Services, F5 offers a range of integrated, machine learning-driven solutions that protect legacy and modern applications and APIs across data center, cloud, and edge locations. Our multi-cloud application security and delivery solutions reduce our customers’ operational complexity and costs, enabling our customers to scale, secure, and optimize both legacy and modern applications, across any infrastructure and create extraordinary digital experiences for their end users. We are leveraging near real-time collection of live application telemetry, machine learning and artificial intelligence, and toolchain automation to create adaptive applications capable of rapidly responding to changes in performance, availability, and security threats with little to no human interaction. Key components of our strategy include: Bringing our adaptive application vision to life F5 is uniquely positioned to deliver adaptive applications. Through our organic innovation and inorganic investments, we have created the broadest portfolio of multi-cloud application security and delivery technologies in the market. We are able to support our customers’ modern and legacy application security and delivery needs across any environment, with the flexibility of multiple deployment models including hardware, software, and SaaS offerings.", "qwen": "operative"}, {"nummer": "1292", "name": "International Business Machines Corporation", "gics": "Information Technology", "year": "2022", "trigger": "artificial intelligence", "content": "Cyber threats are continually evolving, making it difficult to defend against such threats and vulnerabilities that can persist undetected over extended periods of time. The company’s products, services, systems and networks, including cloud-based systems and systems and technologies that the company maintains on behalf of its customers, are used in critical company, customer or third-party operations, and involve the storage, processing and transmission of sensitive data, including valuable intellectual property, other proprietary or confidential data, regulated data, and personal information of employees, customers and others. These products, services, systems and networks are also used by customers in heavily regulated industries, including those in the financial services, healthcare, critical infrastructure and government sectors. Successful cybersecurity attacks or other security incidents could result in, for example, one or more of the following: unauthorized access to, disclosure, modification, misuse, loss, or destruction of company, customer, or other third party data or systems; theft or import or export of sensitive, regulated, or confidential data including personal information and intellectual property, including key innovations in artificial intelligence, quantum, or other disruptive technologies; the loss of access to critical data or systems through ransomware, crypto mining, destructive attacks or other means; and business delays, service or system disruptions or denials of service. In the event of such actions, the company, its customers and other third parties could be exposed to liability, litigation, and regulatory or other government action, including debarment, as well as the loss of existing or potential customers, damage to brand and reputation, damage to our competitive position, and other financial loss. In addition, the cost and operational consequences of responding to cybersecurity incidents and implementing remediation measures could be significant. In the company’s industry, security vulnerabilities are increasingly discovered, publicized and exploited across a broad range of hardware, software or other infrastructure, elevating the risk of attacks and the potential cost of response and remediation for the company and its customers.", "qwen": "neutral"}, {"nummer": "1308", "name": "Intel Corporation", "gics": "Information Technology", "year": "2022", "trigger": "AI", "content": "The Intel ® DevCloud, currently in public beta release, will host global users spanning AI, data science, high-performance computing, media and graphics, and other accelerated computing workloads. ▪ We believe AI will be ubiquitous, and with our tools and the broad open software ecosystem, we are well-positioned to scale AI. We optimize for the most widely used AI frameworks and libraries, including TensorFlow, Pytorch, Scikit-learn, NumPy, XGBoost, and Spark, with certain optimizations delivering up to 100 times performance improvements to support end-to-end AI. We also develop innovative Intel software to accelerate developer productivity, such as OpenVINO™, Intel ® Neural Compressor, BigDL, and AI software reference kits. ▪ We seek to continually improve our system and foundational-level software in support of our client, data center, networking, and graphics products, delivering AI-optimized software across the stack, including BIOS, firmware, simulation, operating systems, and virtualization. IP Rights We own and develop significant IP and related IP rights around the world that support our products, services, R&D, and other activities and assets. Our IP portfolio includes patents, copyrights, trade secrets, trademarks, mask works, and other rights.", "qwen": "prospective"}, {"nummer": "1425", "name": "KeyCorp", "gics": "Financials", "year": "2022", "trigger": "model risk", "content": "If our models fail to produce reliable results on an ongoing basis, we may not make appropriate risk management, capital planning, or other business or financial decisions. Furthermore, strategies that we employ to manage and govern the risks associated with our use of models may not be effective or fully reliable, and as a result, we may realize losses or other lapses. We have an enterprise-wide model risk management program designed to accurately identify, measure, report, monitor, and manage model risk. The management of model risk includes independent validation and model governance, establishing and monitoring model control standards and model risk metrics, and completeness and accuracy of the inventory of models . Banking regulators continue to focus on the models used by banks and bank holding companies in their businesses. The failure or inadequacy of a model may result in increased regulatory scrutiny on us or may result in an enforcement action or proceeding against us by one of our regulators. 43 Page(s) Discussion of dividends in the section captioned “Capital — Dividends” 68 Discussion of our common shares, shareholder information, and repurchase activities in the section captioned “Capital — Common Shares outstanding” 68 The following graph compares the price performance of our Common Shares (based on an initial investment of $100 on December 31, 2017, and assuming reinvestment of dividends) with that of the S&P 500 Index and a group of other banks that constitute our peer group.", "qwen": "neutral"}, {"nummer": "1490", "name": "Microsoft Corporation", "gics": "Information Technology", "year": "2022", "trigger": "intelligent edge", "content": "Our cloud business benefits from three economies of scale: datacenters that deploy computational resources at significantly lower cost per unit than smaller ones; datacenters that coordinate and aggregate diverse customer, geographic, and application demand patterns, improving the utilization of computing, storage, and network resources; and multi-tenancy locations that lower application maintenance labor costs. The Microsoft Cloud is the most comprehensive and trusted cloud, providing the best integration across the technology stack while offering openness, improving time to value, reducing costs, and increasing agility. Being a global-scale cloud, Azure uniquely offers hybrid consistency, developer productivity, AI capabilities, and trusted security and compliance. We see more emerging use cases and needs for compute and security at the edge and are accelerating our innovation across the spectrum of intelligent edge devices, from Internet of Things (“IoT”) sensors to gateway devices and edge hardware to build, manage, and secure edge workloads. With Azure Stack, organizations can extend Azure into their own datacenters to create a consistent stack across the public cloud and the intelligent edge. 4 PART I Item 1 Our hybrid infrastructure consistency spans security, compliance, identity, and management, helping to support the real-world needs and evolving regulatory requirements of commercial customers and enterprises. Our industry clouds bring together capabilities across the entire Microsoft Cloud, along with industry-specific customizations, to improve time to value, increase agility, and lower costs.", "qwen": "prospective"}, {"nummer": "1520", "name": "Motorola Solutions, Inc.", "gics": "Information Technology", "year": "2022", "trigger": "AI", "content": "Examples include application services such as GPS location to better protect lone workers, job dispatch to share detailed information and over-the-air programming to optimize device uptime. Our view is that complementary data applications such as these enable government, public safety and enterprise 29 customers to work more efficiently and safely, while maintaining their mission-critical voice communications to remain connected and working in collaboration with others. The LMR technology within the Products and Systems Integration segment represent ed 82% of the net sales of the total segment in 2022. Video Our Video technology includes video management infrastructure, AI-video powered security cameras including fixed and certain mobile video equipment as well as on-premise and cloud-based access control solutions. Since 2018, we have developed our video security and access control business through investments in research and development and acquisitions, directly contributing to our growth strategy to serve as a leader in end-to-end video security solutions and supporting the expansion of our portfolio. We deploy video security and access control solutions to thousands of government and commercial customers around the world including school campuses, transportation systems, healthcare centers, public venues, utilities, prisons, factories, casinos, airports, financial institutions, government facilities, state and local law enforcement agencies and retailers. Organizations such as these utilize video security and access control to verify critical events or incidents in real-time and to provide data to investigate an event or incident after it happens.", "qwen": "prospective"}, {"nummer": "1536", "name": "Northrop Grumman Corporation", "gics": "Industrials", "year": "2022", "trigger": "artificial intelligence", "content": "Form 10-K Summary 103 Signatures 104 ii NORTHROP GRUMMAN CORPORATION PART I Item 1. Business HISTORY AND ORGANIZATION History Northrop Grumman Corporation (herein referred to as “Northrop Grumman,” the “company,” “we,” “us,” or “our”) is a leading global aerospace and defense technology company. We deliver a broad range of products, services and solutions to U.S. and international customers, and principally to the U.S. Department of Defense (DoD) and intelligence community. Our broad portfolio is aligned to support national security priorities and our solutions equip our customers with capabilities they need to connect, protect and advance humanity. The company is a leading provider of space systems, advanced aircraft, missile defense, advanced weapons and long-range fires capabilities, mission systems, networking and communications, strategic deterrence systems, and breakthrough technologies, such as artificial intelligence, advanced computing and cyber. We are focused on competing and winning programs that enable continued growth, performing on our commitments and affordably delivering capability our customers need. With the investments we've made in advanced technologies, combined with our talented workforce and digital transformation capabilities, Northrop Grumman is well positioned to meet our customers' needs today and in the future. For a discussion of risks associated with our operations, see “ Risk Factors.", "qwen": "neutral"}, {"nummer": "1585", "name": "NVIDIA Corporation", "gics": "Information Technology", "year": "2022", "trigger": "AI", "content": "We also offer the NVIDIA GPU Cloud registry, or NGC, a comprehensive catalog of easy-to-use, optimized software stacks across a range of domains including scientific computing, deep learning, and machine learning. With NGC, AI developers, researchers and data scientists can get started with the development of AI and HPC applications and deploy them on DGX systems, NVIDIA-Certified systems from our partners, or with NVIDIA’s cloud partners. In addition to software that is delivered to customers as an integral part of our data center computing platform, we offer enterprise software products on a standalone basis as a perpetual license or subscription. Our enterprise software offerings include NVIDIA AI Enterprise, a comprehensive suite of enterprise-grade AI software; NVIDIA Fleet Command software-as-a-service for securely deploying and managing AI applications across distributed edge infrastructure; NVIDIA Base Command software-as-a-service for managing large-scale, multi-user and multi-team AI development workflows; and NVIDIA vGPU software products that enable powerful GPU performance for workloads ranging from graphics-rich virtual desktops and workstations to data science and AI. Professional Visualization We serve the Professional Visualization market by working closely with independent software vendors, or ISVs, to optimize their offerings for NVIDIA GPUs. Our GPU computing solutions enhance productivity and introduce new capabilities for critical workflows in many fields, such as design and manufacturing and digital content creation. Design and manufacturing encompass computer-aided design, architectural design, consumer-products manufacturing, medical instrumentation, and aerospace.", "qwen": "neutral"}, {"nummer": "1655", "name": "Palo Alto Networks, Inc.", "gics": "Information Technology", "year": "2022", "trigger": "ML-powered", "content": "• SaaS Security Inline. SaaS Security Inline is a recent cloud-delivered security service on our ML-Powered Next Generation Firewalls that adds an inline service to automatically gain visibility and control over the tens of thousands of known and new sanctioned, unsanctioned and tolerated SaaS applications in use within organizations today. It provides enterprise data protection and compliance across all SaaS applications and prevents cloud threats in real time with best-in-class security. The solution is easy to deploy being natively integrated on our range of ML-Powered Next-Generation Firewalls, eliminating the architectural complexity of traditional CASB products, while offering low total cost of ownership. It can be combined with SaaS Security API as a complete integrated CASB. • GlobalProtect . This appliance-based subscription provides protection for users of both traditional laptop and mobile devices.", "qwen": "operative"}, {"nummer": "1675", "name": "Palantir Technologies Inc.", "gics": "Information Technology", "year": "2022", "trigger": "machine learning", "content": "We worked with the customer to implement technical measures requiring analysts to provide reviewable justifications for access. Those controls were further supported by auditing capabilities to ensure that data processing satisfied legitimate purposes under the relevant regulations. • A multinational insurer sought to build and apply machine-learning models to surface fraudulent insurance claims, while ensuring that processing was sufficiently transparent, interpretable, and accountable to decision makers and oversight authorities. We helped to configure and implement a number of supporting privacy-enhancing features, including pseudonymization processes to minimize data exposure, rigorous documentation of machine learning model features and parameters, and auditing tools for users and regulators. Our Team We employ a team of engineers, lawyers, and social scientists to ensure that our company remains a leader in the field when it comes to privacy practices and software development. The Privacy and Civil Liberties Engineering team is responsible for ensuring a culture of responsibility around the development and use of our technology by leading the development of privacy-enhancing technologies, publishing research, consulting with policymakers, helping our customers implement data governance best practices, and facilitating company-wide dialogue on ethical issues. The team is supported by the Palantir Council of Advisors on Privacy and Civil Liberties, a group of independent experts in privacy law, policy, and ethics who help us to understand and address the implications of our work.", "qwen": "prospective"}, {"nummer": "1680", "name": "QUALCOMM Incorporated", "gics": "Information Technology", "year": "2022", "trigger": "automated driving", "content": "Our inventions have helped power the growth in smartphones and other cellular enabled devices. As a connected processor company, we are scaling our innovations using our one technology roadmap to enable the connected intelligent edge (the next generation of smart devices) across industries and applications beyond handsets, including automotive and the internet of things (IoT). In IoT, our inventions have helped power growth in industries and applications such as consumer (including computing, voice and music and XR), edge networking (including mobile broadband and wireless access points) and industrial (including handhelds, retail, transportation and logistics and utilities). In automotive, our connectivity, digital cockpit and advanced driver assistance and automated driving (ADAS/AD) platforms are helping to connect the car to its environment and the cloud, create unique in-cabin experiences and enable a comprehensive assisted and automated driving solution. We derive revenues principally from sales of integrated circuit products, including our Snapdragon® family of highly-integrated, system-based solutions, and licensing of our intellectual property, including patents and other rights. The foundational technologies we invent help power the modern mobile experience, impacting how the world connects, computes and communicates. We share these inventions broadly through our licensing programs enabling wide ecosystem access to technologies at the core of mobile innovation, and through the sale of our wireless integrated circuit platforms (also known as integrated circuit products, chips, chipsets or modules) and other products.", "qwen": "neutral"}, {"nummer": "1797", "name": "Verizon Communications Inc.", "gics": "Communication Services", "year": "2022", "trigger": "intelligent edge", "content": "Debt or equity financing may be needed to fund additional investments or development activities, or to maintain an appropriate capital structure to ensure our financial flexibility. Our external financing arrangements include credit facilities and other bank lines of credit, an active commercial paper program, vendor financing arrangements, issuances of registered debt or equity securities, U.S. retail medium-term notes and other securities that are privately-placed or offered overseas. In addition, we monetize certain receivables through asset-backed debt transactions. Capital Expenditures Our 2023 capital program includes capital to fund advanced networks and services, including expanding our core networks, adding capacity and density to our 5G network in order to stay ahead of our customers’ increasing data demands and deploying C-Band, transforming our structure to deploy the Intelligent Edge Network while reducing the cost to deliver services to our customers, and pursuing other opportunities to drive operating efficiencies. We expect that our network architecture will simplify operations by eliminating legacy network elements, improve our 4G LTE coverage, speed the deployment of 5G technology, and create new enterprise opportunities in the business market. We anticipate cash requirements for our 2023 capital program to be between $18.25 billion and $19.25 billion, inclusive of the final $1.75 billion of the incremental $10 billion related to our accelerated C-Band deployment program. Contractual Obligations and Commitments We have various contractual obligations and commitments.", "qwen": "operative"}, {"nummer": "1825", "name": "Zebra Technologies Corporation", "gics": "Information Technology", "year": "2022", "trigger": "intelligent automation", "content": "Our global channel partner network is vital to helping us achieve these goals. As such, we will ensure that we provide the necessary value and support for our partners to be successful. Advance our Enterprise Asset Intelligence vision Our EAI vision is for every asset and front-line worker to be connected, visible, and fully optimized. We believe that secular technology trends, particularly in IoT, cloud computing, intelligent automation, and mobility, advance our vision and are transforming our customers’ businesses and our industry, providing us with significant new opportunities to create value for our customers and for the Company. We expect to capitalize on these trends, and in particular the proliferation of smart connected sensors and devices in our core market segments, by providing end-to-end solutions that integrate these sensors and devices with cloud-based workflows and analytics applications. We plan to continue investing in the development of technologies that will enable intelligent automation solutions, providing increased visibility into the enterprise, real-time, actionable information, and improved customer experiences. Our solutions will also increasingly include advanced features, functions, and user experiences to drive additional competitive differentiation and elevate our role as a solutions provider.", "qwen": "prospective"}, {"nummer": "1877", "name": "Arthur J. Gallagher & Co.", "gics": "Financials", "year": "2023", "trigger": "AI", "content": "Regulation Many of our activities throughout the world are subject to supervision and regulations promulgated by regulatory or self-regulatory bodies such as the SEC, the NYSE, the U.S. Department of Justice (DOJ), the IRS, the Office of Foreign Assets Control, the Federal Trade Commission (FTC) the Financial Industry Regulatory Authority (FINRA) and the Financial Crimes Enforcement Network in the U.S., the Financial Conduct Authority in the U.K., the Australian Securities and Investments Commission in Australia and insurance regulators in nearly every jurisdiction in which we operate. Our retirement-related consulting and investment services are subject to pension law and financial regulation in many countries. Our activities are also subject to a variety of other laws, rules and regulations addressing, among others, licensing, data privacy, wage-and-hour standards, employment and labor relations, anti-trust, anti-corruption, currency exchange, cash reserves and local investment. As we continue to implement new technology and AI initiatives across our business we also expect to be subject to additional regulations related to the use of such new technologies. The global nature of our operations increases the complexity and cost of compliance with laws and regulations, including increased staffing needs, the development of new policies, procedures and internal controls and providing training to employees in multiple locations, adding to our cost of doing business. Many of these laws and regulations may have differing or conflicting legal standards across jurisdictions, increasing further the complexity and cost of compliance. In emerging markets and other jurisdictions with less developed legal systems, local laws and regulations may not be established with sufficiently clear and reliable guidance to provide us with adequate assurance that we are aware of all necessary licenses to operate our business, that we are operating our business in a compliant manner, or that our rights are otherwise protected.", "qwen": "neutral"}, {"nummer": "2046", "name": "Aptiv PLC", "gics": "Consumer Discretionary", "year": "2023", "trigger": "autonomous driving", "content": "Motional began testing fully driverless systems in 2020 and began testing a production-ready autonomous driving platform available for robotaxi providers, meal delivery providers, fleet operators and automotive manufacturers at prototype scale in 2022, with initial production deployments in the fourth quarter of 2023 and commercial launch planned in the first half of 2024. In addition, Motional is involved in collaborative arrangements with mobility providers and with smart cities such as Boston, Las Vegas, Los Angeles and Singapore as solutions are developed for the evolving nature of the mobility industry. There are many risks associated with these evolving areas, including the high development costs of active safety and autonomous driving technologies, the uncertain timing of customer and consumer adoption of these technologies, increased competition from entrants outside the traditional automotive industry and evolving regulations, such as the guidance for automated driving systems published by the U.S. Department of Transportation. While we believe we are well-positioned in these markets, the high development cost of active safety and autonomous driving technologies may result in a higher risk of exposure to the success of new or disruptive technologies different than those being developed by us or our partners and ultimately there can be no assurance that we will be successful in our efforts to develop these technologies. Leveraging our engineering and technological capabilities . We seek to leverage our strong product portfolio tied to the industry’s key mega-trends with our global footprint to increase our revenues, as well as committing to substantial annual investment in research and development to maintain and enhance our leadership in new mobility solutions across each of our product lines. Targeting the right business with the right customers .", "qwen": "operative"}, {"nummer": "2267", "name": "Cisco Systems, Inc.", "gics": "Information Technology", "year": "2023", "trigger": "AI", "content": "• End-to-End Security — Build simple, integrated, and high efficacy end-to-end security solutions, delivered on-premise or in the cloud. • Capabilities at the Edge — Develop new capabilities for a distributed world while enhancing the developer experience and extending enterprise and carrier networks. We are continuing to incorporate Artificial Intelligence (AI) and Machine Learning (ML) across our portfolio to enable further innovation and to empower our customers to drive increased productivity and better user experiences. We are investing in new opportunities in AI, launching new technologies across our product portfolios designed to boost productivity, enhance policy management and simplify tasks. Our AI-scale infrastructure will allow our customers to process AI workloads more efficiently. We are also accelerating our efforts to enable the delivery of network functionality as a service as our customers increasingly want to consume technologies in flexible ways. We made the initial step with our as-a-service portfolio, Cisco Plus, and our first offer, Cisco Plus hybrid cloud, which combines our data center compute, networking and storage portfolio.", "qwen": "prospective"}, {"nummer": "2287", "name": "Cognizant Technology Solutions Corporation", "gics": "Information Technology", "year": "2023", "trigger": "AI", "content": "The development, adoption, and use of AI technologies are still in their early stages and ineffective or inadequate AI development or deployment practices by us, our clients, or third parties with whom we do business could result in unintended Cognizant 17 December 31, 2023 Form 10-K Table of Contents consequences. Such consequences may include, for example, employees making decisions based on biased or inaccurate information; disclosure of sensitive information; deliberate misuse; or infringement of third-party intellectual property rights. In turn, these consequences may cause decreased demand for our services or harm to our business, results of operations, or reputation. AI technology and services are part of a highly competitive and rapidly evolving market. We plan to incur significant development and operational costs to build and support our AI capabilities to meet the needs of our clients. We face significant competition from our traditional competitors as well as other third parties, including those that are new to the market, and our clients may develop their own AI-related capabilities. In addition, as these technologies evolve, we expect that some services that we currently perform for our clients will be replaced by AI or forms of automation.", "qwen": "prospective"}, {"nummer": "2288", "name": "Cognizant Technology Solutions Corporation", "gics": "Information Technology", "year": "2023", "trigger": "AI", "content": "Such consequences may include, for example, employees making decisions based on biased or inaccurate information; disclosure of sensitive information; deliberate misuse; or infringement of third-party intellectual property rights. In turn, these consequences may cause decreased demand for our services or harm to our business, results of operations, or reputation. AI technology and services are part of a highly competitive and rapidly evolving market. We plan to incur significant development and operational costs to build and support our AI capabilities to meet the needs of our clients. We face significant competition from our traditional competitors as well as other third parties, including those that are new to the market, and our clients may develop their own AI-related capabilities. In addition, as these technologies evolve, we expect that some services that we currently perform for our clients will be replaced by AI or forms of automation. Each of the foregoing may lead to reduced demand for our services or harm our ability to obtain favorable pricing or other terms for our services, which could have a material adverse effect on our business, results of operations and financial condition.", "qwen": "prospective"}, {"nummer": "2341", "name": "Dell Technologies Inc.", "gics": "Information Technology", "year": "2023", "trigger": "artificial intelligence", "content": "Our comprehensive storage portfolio includes traditional as well as next-generation storage solutions, including all-flash arrays, scale-out file, object platforms, hyper-converged infrastructure, and software-defined storage. We have simplified our storage portfolio and continue to make enhancements to our storage offerings that we expect will drive long-term improvements in the business. Our server portfolio includes high-performance rack, blade, and tower servers. Our servers are designed with the capability to run high value workloads across customers’ IT environments, including artificial intelligence, machine learning, and edge workloads. Our networking portfolio helps our business customers transform and modernize their infrastructure, mobilize and enrich end-user experiences, and accelerate business applications and processes. Our strengths in server, storage, and virtualization software solutions allow us to offer leading converged and hyper-converged solutions, enabling our customers to accelerate their IT transformation with scalable integrated solutions instead of building and assembling their own IT platforms. ISG also offers software, peripherals and services, including configuration, and support and deployment.", "qwen": "neutral"}, {"nummer": "2505", "name": "GE HealthCare Technologies Inc.", "gics": "Health Care", "year": "2023", "trigger": "medical imaging", "content": "OUR SEGMENTS We develop, manufacture, and market a broad portfolio of products, services, and complementary digital solutions used in the diagnosis, treatment, and monitoring of patients. We have a large, global installed base of medical imaging, ultrasound, and patient monitoring systems. Our business is comprised of four segments: IMAGING. GE HealthCare is a global leader in medical imaging with a comprehensive portfolio of scanning devices, clinical applications, service capabilities, and digital solutions. Our Imaging portfolio spans the care continuum and provides critical tools for physicians, from initial screening and diagnosis, through therapeutic decision-making and monitoring of patient progression. Our products support providers in the delivery of care for a broad spectrum of clinical specialties, including oncology, cardiology, neurology, nuclear medicine, orthopedics, women’s health, pediatrics, and surgery. Our Imaging portfolio is comprised of six product lines and associated service capabilities: Molecular Imaging, Computed Tomography, Magnetic Resonance, Image-Guided Therapies, Women’s Health, and X-ray.", "qwen": "neutral"}, {"nummer": "2548", "name": "Alphabet Inc.", "gics": "Communication Services", "year": "2023", "trigger": "AI", "content": "Enable Organizations and Developers to Innovate on Google Cloud AI is not only a powerful enabler, it is also a major platform shift. Globally, businesses from startups to large enterprises, and the public sector are thinking about how to drive transformation. That is why we are focused on making it easy and scalable for others to innovate, and grow, with AI. That means providing the most advanced computing infrastructure and expanding access to Google’s latest AI models that have been rigorously tested in our own products. Our Vertex AI platform gives developers the ability to train, tune, augment, and deploy applications using generative AI models and services such as Enterprise Search and Conversations. Duet AI for Google Cloud provides pre-packaged AI agents that assist developers to write, test, document, and operate software. Improve Knowledge, Learning, Creativity, and Productivity Things that we now consider routine – like spell check, mobile check deposit, or Google Search, Google Translate, and Google Maps – all use AI.", "qwen": "operative"}, {"nummer": "2616", "name": "Alphabet Inc.", "gics": "Communication Services", "year": "2023", "trigger": "AI", "content": "While we have been integrating AI into our products for years, we are now embedding the power of generative AI to continue helping our users express themselves and get things done. For example, Duet AI in Google Workspace helps users write, organize, visualize, accelerate workflows, and have richer meetings. Bard allows users to collaborate with experimental AI with new features that include image capabilities, coding support, and app integration. Dream Screen, a new experimental feature in YouTube, allows for the creation of AI-generated video or image backgrounds to Shorts by typing an idea into a prompt. 5. Table of Contents Alphabet Inc. We also know businesses of all sizes around the world rely on Google Ads to find customers and grow their businesses — and we make that even easier with AI. With Performance Max, advertisers simply tell us their campaign goals and share their creative assets, and AI will automatically produce and run a highly effective ad campaign across all of Google’s properties, to meet their budget.", "qwen": "operative"}, {"nummer": "2622", "name": "Alphabet Inc.", "gics": "Communication Services", "year": "2023", "trigger": "AI", "content": "Product Studio brings the benefits of AI to businesses of all sizes, helping them easily create uniquely-tailored imagery featuring their products — for free. Additionally, we are experimenting with Search and Shopping ads that are directly integrated into the AI-powered snapshot and conversational mode in Search Generative Experience. Build the Most Helpful Personal Computing Platforms and Devices Over the years, our Pixel phones have incorporated AI compute directly into the device and built experiences on top of it. Our latest Pixel devices were built around AI, bringing the best AI-assistive experiences to our users, such as Best Take, Magic Editor, and Audio Magic Eraser. As we look ahead, we are designing our Android and Chrome operating systems with new AI-forward user experiences. Moonshots Many companies get comfortable doing what they have always done, making only incremental changes. This incrementalism leads to irrelevance over time, especially in technology, where change tends to be revolutionary, not evolutionary.", "qwen": "operative"}, {"nummer": "2665", "name": "The Goldman Sachs Group, Inc.", "gics": "Financials", "year": "2023", "trigger": "AI", "content": "In addition, the increased use by our clients of low-cost electronic trading systems and direct electronic access to trading markets has caused and could continue to cause a reduction in commissions and spreads. As our clients increasingly use our systems to trade directly in the markets, we may incur liabilities as a result of their use of our order routing and execution infrastructure. We have invested significant resources into the development of electronic trading systems and expect to continue to do so, but there is no assurance that the revenues generated by these systems will yield an adequate return, particularly given the generally lower commissions arising from electronic trades. In addition, the emergence, adoption and evolution of new technologies, including distributed ledgers, such as digital assets and blockchain, and AI, have required us to invest resources to adapt our existing products and services, and we expect to continue to make such investments, which could be material. The adoption and evolution of such new technologies may also increase our compliance and regulatory costs. Further, technologies, such as those based on distributed ledgers, that do not require intermediation could also significantly disrupt payments processing and other financial services. Regulatory limitations on our involvement in products and platforms involving digital assets and distributed ledger technologies may not apply equally or in some cases at all to certain of our competitors.", "qwen": "prospective"}, {"nummer": "2678", "name": "Honeywell International Inc.", "gics": "Industrials", "year": "2023", "trigger": "process automation", "content": "• Honeywell Building Technologies —Operating results may be adversely impacted by downturns in the level of global commercial construction activity (including retrofits and upgrades), lower capital spending and operating expenditures on building projects, changes in the competitive landscape, including new market entrants and new technologies, and fluctuations in inventory levels in distribution channels. • Performance Materials and Technologies —Operating results may be adversely impacted by downturns in capacity utilization for chemical, industrial, refining, petrochemical, and semiconductor plants, our customers’ availability of capital for refinery construction and expansion, raw material demand and supply, product commoditization, continued illegal imports of hydrofluorocarbons into Europe, and our ability to maximize our facilities’ production capacity and minimize downtime. Periods of increased volatility in oil and natural gas prices may result in less investment by our customers and therefore, lower demand for our products and services. • Safety and Productivity Solutions —Operating results may be adversely impacted by reduced investments in process automation, safety monitoring, and plant capacity utilization initiatives, fluctuations in retail markets, a slowdown in demand for safety products, changes in the competitive landscape, including new market entrants and new technologies that may lead to product commoditization, and adverse industry economic conditions, all of which could result in lower market share, reduced selling prices, and lower margins. A significant percentage of our sales and operations is in non-U.S. jurisdictions and is subject to the economic, political, regulatory, foreign exchange, and other risks of international operations. Our international operations, including U.S. exports, represent more than half of the Company’s sales. Risks related to international operations include exchange control regulations, wage and price controls, fluctuations in foreign currency exchange rates, antitrust regulations, employment regulations, foreign investment laws, import, export, and other trade restrictions (such as sanctions and embargoes), differing levels of protection of intellectual property, acts of industrial espionage, violations by our employees of anti-corruption laws (despite our efforts to mitigate such risk), changes in regulations regarding transactions with state-owned enterprises, nationalization of private enterprises, acts of terrorism, acts of war, civil strife, and our ability to hire and maintain qualified staff and maintain the safety of our employees in these regions.", "qwen": "neutral"}, {"nummer": "2804", "name": "Intel Corporation", "gics": "Information Technology", "year": "2023", "trigger": "GenAI", "content": "We are leveraging our core strengths in compute, connectivity, software, and manufacturing at scale to grow traditional markets and to accelerate entry into emerging ones. Key Business Developments ■ We launched the 4th Gen Intel Xeon processor with Intel vRAN Boost, and announced the Intel Xeon D-1800 series and the Intel Xeon D-2800 series processors optimized for cloud, edge, and 5G networks. ■ We continue to update solutions to improve developers' digital strategies and to accelerate market adoption of edge and AI applications. We announced 13th Gen Intel Core processors for Internet of Things edge and OpenVINO toolkit version 2023.1 with enhanced features for GenAI and edge computing. ■ We continue to work with our ecosystem partners like Ericsson, Nokia, Cisco, Dell Technologies, HPE, Lenovo, Amazon, Google, and Microsoft to drive the software-defined transformation of the world's network and edge infrastructure and accelerate AI-driven automation of physical operations. MD&A 28 Market and Business Overview Market Trends and Strategy The Internet is undergoing a shift toward a cloud-to-edge infrastructure, combining unrivaled scale and capacity in the cloud with faster response times at nearby edges. As AI is transforming and automating every industry—from factories to smart cities to hospitals—the demand for high-performance computing at the edge has expanded exponentially.", "qwen": "prospective"}, {"nummer": "3151", "name": "MSCI Inc.", "gics": "Financials", "year": "2023", "trigger": "AI", "content": "If we do not have sufficient rights to use the data or other material or content that the AI solutions utilize or generate, we may incur liability through the violation of applicable laws and regulations, third-party intellectual property, privacy or other rights, or contracts to which we are a party. In addition, intellectual property ownership rights, including copyright, of generative and other AI output, have not been fully interpreted by courts or regulations. The use of AI applications may also result in cyber-attacks or other security incidents or a failure to protect confidential information (e.g., propriety, third-party, employee or client information). Laws and regulations applicable to AI, including intellectual property, data privacy and security, consumer protection, competition, and equal opportunity laws, continue to develop and may be inconsistent from jurisdiction to jurisdiction. Because AI technology itself is highly complex and rapidly developing, it is not possible to predict all of the legal, operational or technological risks that may arise relating to the use of AI. Any of these issues could materially adversely affect our business, financial condition or results of operations. Strategy and Growth Risks Our business may be affected by changes in economic conditions and the global capital markets, including resulting from geopolitical events, adverse equity market conditions, volatility in the financial markets and evolving investment trends.", "qwen": "neutral"}, {"nummer": "3258", "name": "Micron Technology, Inc.", "gics": "Information Technology", "year": "2023", "trigger": "AI", "content": "Enterprise and Cloud SSDs: SBU sales to the enterprise and cloud SSD markets in 2023 consisted primarily of our 5300, 7450, 5400, 9400, and 6500 series SSDs. In data center SSDs, our entire portfolio is now on 176-layer or 232-layer NAND, demonstrating our product and technology leadership. We are in a strong position to serve AI demand for fast storage as these data-intensive applications proliferate. In 2023, we launched our first 200+ layer NAND data center SSD, and qualification has completed at some customers and is in progress at other customers largely to support AI cluster installations. The enterprise and cloud storage markets are driven by the growth of applications that store, access, and analyze data in the cloud. Applications such as machine learning servers require fast access to data with low latency, predictable performance, and high storage capacities. Client SSDs: SBU sales to the client SSD market in 2023 consisted primarily of our 2450, 2400, and 3400 series client SSDs.", "qwen": "neutral"}, {"nummer": "3433", "name": "Palo Alto Networks, Inc.", "gics": "Information Technology", "year": "2023", "trigger": "ML-powered", "content": "Our product revenue grew to $1.6 billion or 22.9% of total revenue for fiscal 2023, representing year-over-year growth of 15.8%. Product revenue is derived from sales of our appliances, primarily our ML-Powered Next-Generation Firewall. Product revenue also includes revenue derived from software licenses of Panorama, SD-WAN, and the VM-Series. Our ML-Powered Next-Generation Firewall incorporates our PAN-OS operating system, which provides a consistent set of capabilities across our entire network security product line. Our appliances and software licenses include a broad set of built-in networking and security features and functionalities. Our products are designed for different performance requirements throughout an organization, ranging from our PA-410, which is designed for small organizations and remote or branch offices, to our top-of-the-line PA-7080, which is designed for large-scale data centers and service provider use. The same firewall functionality that is delivered in our physical appliances is also available in our VM-Series virtual firewalls, which secure virtualized and cloud-based computing environments, and in our CN-Series container firewalls, which secure container environments and traffic.", "qwen": "operative"}, {"nummer": "3457", "name": "Palantir Technologies Inc.", "gics": "Information Technology", "year": "2023", "trigger": "AIP", "content": "Our software platforms provide the critical infrastructure needed to integrate our customers’ data and operations and run their software in virtually any environment. The vertically integrated nature of these platforms allows users of varying technical abilities to collaborate effectively in our platforms. Data engineers can integrate new data sources, analysts can clean and transform data, data scientists can write models, business users can conduct daily workflows, and senior leaders can make critical decisions. With AIP, trusted data from relevant sources can be integrated into business logic, machine-language models, optimizers, and other computations spread across varying environments to power enterprise processes and help drive critical decisions. Customers may bundle these platforms together as a single ecosystem. Data, analyses, decisions, and the metadata around each are secured with fine-grained access controls that propagate from source data to shared analyses. Each platform is comprised of user-facing applications that may be targeted to the specific industries and sectors in which they are used.", "qwen": "neutral"}, {"nummer": "3484", "name": "Insulet Corporation", "gics": "Health Care", "year": "2023", "trigger": "artificial intelligence", "content": "The General Data Protection Regulation (“GDPR”) is a comprehensive update to the data protection regime in the European Economic Area that imposes requirements relating to, among other things, consent to process personal data of individuals, the information provided to individuals regarding the processing of their personal data, the security and confidentiality of personal data, notifications in the event of data breaches, and use of third-party processors. If we fail to comply with these standards, we could be subject to criminal penalties and civil sanctions, including fines and penalties for noncompliance. 12 Table of Contents The European Union has laid out a multi-year plan for additional privacy and data regulation, building upon the GDPR, and has begun to execute on that plan. For example, the Cybersecurity Directive and the Artificial Intelligence Act have been finalized and will impose additional obligations on businesses generally, including those in the medical device industry. Human Capital Resources Employees Our people are our most valuable asset and are the source of our innovation and our success. We strive to attract and retain the best talent with competitive compensation and benefits, opportunities for growth and development, and a culture that emphasizes fair and equitable treatment. As of December 31, 2023, we had approximately 3,000 full-time employees, representing an 18% increase over the prior year.", "qwen": "neutral"}, {"nummer": "3528", "name": "Regency Centers Corporation", "gics": "Real Estate", "year": "2023", "trigger": "AI", "content": "For example, on October 30, 2023, the Biden administration issued an Executive Order to, among other things, establish extensive new standards for AI safety and security. Other jurisdictions may decide to adopt similar or more restrictive legislation that may render the use of such technologies challenging. These obligations may prevent or limit our ability to use AI in our business, lead to regulatory fines or penalties, or require us to change our business practices. If we cannot use AI, or that use is restricted, our business may be less efficient, or we may be at a competitive disadvantage. Any of these factors could adversely affect our business, financial condition, and results of operations. Risk Factors Related to the Market Price for Our Securities Changes in economic and market conditions may adversely affect the market price of o
