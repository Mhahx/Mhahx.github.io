t Diagnostics Incorporated", "gics": "Health Care", "year": "2023", "trigger": "AI", "content": "<content>We also believe that AI can help improve our operating efficiency.<\/content> <target>In 2023, we created an initiative to deploy generative AI to improve several areas of our business, including software engineering, customer service, claims analysis, scheduling optimization, specimen processing and marketing.<\/target> <content>We expect to further develop these projects in 2024.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "prospective", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "2664", "name": "Intuit Inc.", "gics": "Information Technology", "year": "2023", "trigger": "AI", "content": "<content>We listen to and observe our customers, understand their challenges, and then use advanced technology, including AI, to develop innovative solutions to help consumers and small businesses prosper.<\/content> <target>Five years ago, we declared our strategy to become a global AI-driven expert platform and five strategic priorities, or “big bets,” as the primary areas of focus to drive durable growth.<\/target> <content>We are investing heavily in our data and AI capabilities to deliver accelerated innovation where we and others can solve our customers’ most important problems.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "operative", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "2638", "name": "Intel Corporation", "gics": "Information Technology", "year": "2023", "trigger": "AI", "content": "<content>We incurred R&D expenses of $16.0 billion in 2023, $17.5 billion in 2022, and $15.2 billion in 2021.<\/content> <target>We are focusing our R&D efforts across several key areas, including process and packaging technology, our xPU products and features, AI, and software.<\/target> <content>These include ambitious initiatives, such as our efforts to introduce five new manufacturing process technologies, or nodes, in four years and our unified oneAPI portfolio of developer tools.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "neutral", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "2289", "name": "GoDaddy Inc.", "gics": "Information Technology", "year": "2023", "trigger": "AI", "content": "<content>• Microsoft Teams Integration: Partnered with Microsoft to introduce payment acceptance capabilities for businesses within the Microsoft Teams meeting platform.<\/content> <target>• Other AI Tools and Resources: Released GoDaddy.AI, a free online resource for customers, which provides tips and current news on all things generative AI for small businesses, as well as the Small Business Generative AI Prompt Library, a growing catalog of ready-made prompts for small businesses to have the tools to start benefiting from generative AI.<\/target> <content>We also launched AI-powered conversational onboarding, delivering an easier method to set up a new WordPress site.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "neutral", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "3455", "name": "Workday, Inc.", "gics": "Information Technology", "year": "2023", "trigger": "AI", "content": "<content>Workday’s suite of HCM applications allows organizations to manage the entire employee lifecycle – from recruitment to retirement – enabling HR teams to hire, onboard, pay, develop and reskill, and provide meaningful employee experiences that are personalized and helpful, based on listening to the diverse needs of today’s workforce.<\/content> <target>For example, our skills technology, built on an AI and ML foundation, helps organizations make the important shift to a skills-first approach, helping them prepare today for the jobs of tomorrow.<\/target> <content>Planning: Solutions for the Offices of the CFO and CHRO In today’s dynamic business environment, businesses are continuously planning to model various scenarios and preparing to quickly respond to change.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "neutral", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "2619", "name": "Intel Corporation", "gics": "Information Technology", "year": "2023", "trigger": "AI", "content": "<content>Software and Platforms: Our customers' need for flexibility, programmability, and versatility drives workloads toward software and away from fixed-function hardware.<\/content> <target>As networking in the cloud, core network, 5G, and private networks move to software, and as our edge customers increasingly deploy AI applications, we aim to simplify innovation on Intel hardware.<\/target> <content>We support our customers' software strategy at the edge with an edge-native software platform with modular building blocks, premium service, and support offerings.<\/content>", "qwen": "neutral", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "1872", "name": "Ares Management Corporation", "gics": "Financials", "year": "2023", "trigger": "artificial intelligence", "content": "<content>If certain proposed acquisitions or dispositions of portfolio companies by our managed investment funds are delayed or rejected by antitrust enforcers, or if previously closed transactions are investigated, it could have an adverse impact on our ability to generate future performance revenues and to fully invest the available capital in our funds, as well as reduce opportunities to exit and realize value from our fund investments.<\/content> <target>In August 2023, the President issued an executive order establishing an outbound investment screening regime that is intended to regulate or prohibit certain investments by U.S. persons in advanced technology sectors in China and other jurisdictions that may be designated as a “country of concern.” While the U.S. Department of the Treasury proposed rules in August 2023 contemplating the imposition of notification requirements for, and the potential prohibition of, outbound investment involving semiconductors and microelectronics, quantum information technologies and artificial intelligence by U.S. persons into certain entities with a nexus to China, the exact scope and application of the outbound investment program has yet to be determined.<\/target> <content>Moreover, there is a high likelihood that the number of targeted sectors will expand over the life of our funds.<\/content>", "qwen": "not_ai", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "2222", "name": "Equinix, Inc.", "gics": "Real Estate", "year": "2023", "trigger": "artificial intelligence", "content": "<content>Each of these data center solutions providers can bundle various colocation, interconnection and network offerings, outsourced IT infrastructure solutions and managed services.<\/content> <target>We believe that this outsourcing trend has accelerated and is likely to continue to accelerate in the coming years, especially in light of the movement to digital business, the use of multiple cloud service providers, and the adoption of artificial intelligence.<\/target> <content>Equinix is differentiated in this market by being able to offer customers a global platform that reaches over 30 countries and contains the industry’s largest and most active ecosystem of partners in our sites, including access to a leading share of cloud on-ramps, and an increasingly diverse ecosystem of networks and cloud and IT service providers.<\/content>", "qwen": "neutral", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "2533", "name": "Henry Schein, Inc.", "gics": "Health Care", "year": "2023", "trigger": "clinical decision support", "content": "<content>Concurrently, FDA issued a draft guidance describing FDA’s approach to clinical decision support software.<\/content> <target>On September 28, 2022, FDA issued final guidance that made several changes to the draft guidance and that provided a more restrictive interpretation of exempt clinical decision support software.<\/target> <content>Certain of our businesses involve the development and sale of software and related products to support physician and dental practice management, and it is possible that the FDA or foreign government authorities could determine that one or more of our products is a medical device, which could subject us or one or more of our businesses to substantial additional requirements with respect to these products.<\/content>", "qwen": "not_ai", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "2197", "name": "Dow Inc.", "gics": "Materials", "year": "2023", "trigger": "artificial intelligence", "content": "<content>As a result, cyberattacks, internal and external security breaches, and attacks and security breaches of third-party systems could disrupt the Company's operations, compromise Dow’s proprietary and confidential, business critical information, jeopardize the Company's ability to safeguard and maintain accurate data, including personal data, and harm the Company's reputation which could result in litigation, enforcement actions, including fines, penalties and disruption of the Company's right to operate in certain jurisdictions, and significant remediation costs.<\/content> <target>Additionally, the Company’s use of artificial intelligence software may create additional risks related to the unintentional disclosure of proprietary, confidential, personal or otherwise sensitive information.<\/target> <content>While the Company has a comprehensive cybersecurity program that is continuously reviewed, maintained and upgraded, cyberattacks by nation-state organizations, crime organizations and other hackers have become increasingly sophisticated, and it is possible for such attacks to remain undetected for an extended period of time.<\/content>", "qwen": "neutral", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "3290", "name": "Rockwell Automation, Inc.", "gics": "Industrials", "year": "2023", "trigger": "digital twin", "content": "<content>The Intelligent Devices segment includes drives, motion, advanced material handling, safety, sensing, industrial components, and configured-to-order products.<\/content> <target>The Software & Control segment includes control and visualization software and hardware, digital twin, simulation and information software, and network and security infrastructure.<\/target> <content>The Lifecycle Services segment includes digital consulting, professional services including engineered-to-order solutions, recurring services including cybersecurity, safety, remote monitoring, and asset management, and the Sensia joint venture.<\/content>", "qwen": "not_ai", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "2995", "name": "Mettler-Toledo International Inc.", "gics": "Health Care", "year": "2023", "trigger": "artificial intelligence", "content": "<content>In addition, there has been an increase in state-sponsored cyberattacks which are often conducted by capable, well-funded groups.<\/content> <target>The rapid evolution and increased adoption of artificial intelligence technologies amplify these concerns.<\/target> <content>While we attempt to mitigate cybersecurity risks by employing a number of proactive measures, including mandatory quarterly ongoing employee training and awareness, technical security controls, enhanced data protection, and maintenance of backup and protective systems, our systems remain potentially vulnerable to cybersecurity threats, any of which could have a material adverse effect on our business.<\/content>", "qwen": "neutral", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "2625", "name": "Intel Corporation", "gics": "Information Technology", "year": "2023", "trigger": "autonomous driving", "content": "<content>We pioneered ADAS technology more than 20 years ago, and have continued to expand the scope of our ADAS offerings while playing a leading role in the evolution of autonomous driving solutions.<\/content> <target>Our portfolio of solutions is built upon a comprehensive suite of purpose-built software and hardware technologies designed to provide the capabilities needed to make the future of ADAS and autonomous driving a reality.<\/target> <content>These technologies can be harnessed to deliver mission-critical capabilities at the edge and in the cloud, advancing the safety of road users, and revolutionizing the driving experience and the movement of people and goods globally.<\/content>", "qwen": "not_ai", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "2465", "name": "The Goldman Sachs Group, Inc.", "gics": "Financials", "year": "2023", "trigger": "AI", "content": "<content>The development and use of AI present a number of risks and challenges to our business.<\/content> <target>The legal and regulatory environment relating to AI is uncertain and rapidly evolving, both in the U.S. and internationally, and includes regulation targeted specifically at AI as well as provisions in intellectual property, privacy, consumer protection, employment and other laws applicable to the use of AI.<\/target> <content>These evolving laws and regulations could require changes in our implementation of AI technology and increase our compliance costs and the risk of non-compliance.<\/content>", "qwen": "neutral", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "2789", "name": "Lumentum Holdings Inc.", "gics": "Information Technology", "year": "2023", "trigger": "autonomous vehicles", "content": "<content>Applications include biometric identification, computational photography, virtual and augmented reality, and natural user interfaces.<\/content> <target>Emerging applications for our lasers include automotive safety systems, LiDAR for advanced driver assistance systems in automobiles and autonomous vehicles, self-navigating robotics and drones in industrial applications, and 3D capture of objects coupled with 3D imaging or printing.<\/target> <content>In the industrial end-market, our diode lasers are used primarily as pump sources for pulsed and kilowatt class fiber lasers.<\/content>", "qwen": "not_ai", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "3819", "name": "AppLovin Corporation", "gics": "Communication Services", "year": "2024", "trigger": "AI", "content": "<content>• TVBits: is an AI-powered interactive, personalized, short-form CTV application that allows viewers to discover content and content companies and streamers the ability to increase viewership, engagement, and revenue.<\/content> <target>• BrandDiscovery: is an AI-powered CTV advertising tool that identifies contextual segments based on genre, brand safety, and the emotion of each scene to help advertisers deliver the right ad at the right time.<\/target> <content>• ContentDiscovery: is an AI-powered advertising solution that grows audiences, increases engagement, and reduces churn for streaming platforms and apps.<\/content>", "qwen": "operative", "mistral": "operative", "llama": "operative", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "4702", "name": "GE HealthCare Technologies Inc.", "gics": "Health Care", "year": "2024", "trigger": "machine learning", "content": "<content>Dr. Taha Kass-Hout, MD, MS, has served as GE HealthCare’s Global Chief Science and Technology Officer since January 2023.<\/content> <target>Merging his background in interventional cardiology with AI and machine learning, he is driving advancements in AI-based medical imaging, diagnostics, and health system operational efficiency.<\/target> <content>Prior to his role at GE HealthCare, Dr. Kass-Hout served as Vice President of Machine Learning, Distinguished Engineer, and Chief Medical Officer at Amazon from May 2017 to January 2023, where he led the company’s health AI strategy, technologies and solutions, including Amazon Comprehend Medical, AWS HealthLake, and Amazon Pharmacy.<\/content>", "qwen": "not_ai", "mistral": "prospective", "llama": "neutral", "majority_vote": "operative", "tiebreaker": "claude-haiku"}, {"nummer": "3678", "name": "Advanced Micro Devices, Inc.", "gics": "Information Technology", "year": "2024", "trigger": "AI", "content": "<content>One of our priorities in 2024 was to accelerate growth in our Data Center segment.<\/content> <target>The demand for our data center AI accelerator products was very strong as large hyperscaler customers, OEMs and ODMs deployed our AMD Instinct™ MI300X GPUs.<\/target> <content>During the year, we announced that we have accelerated our AMD AI accelerator roadmap to deliver an annual cadence of leadership AMD Instinct solutions.<\/content>", "qwen": "not_ai", "mistral": "neutral", "llama": "operative", "majority_vote": "operative", "tiebreaker": "claude-haiku"}, {"nummer": "5036", "name": "HP Inc.", "gics": "Information Technology", "year": "2024", "trigger": "artificial intelligence", "content": "<content>Operating in more than 170 countries, HP delivers innovative and sustainable devices, services and subscriptions for personal computing, printing, 3D printing, hybrid work, gaming and other related technologies.<\/content> <target>We believe artificial intelligence (“AI”) is playing a critical role in the transformation of how people live and work, and customers are beginning to recognize the benefits in security, speed and cost.<\/target> <content>Our high-performing product portfolio includes HP’s new line of AI PCs and workstations built with the computing power to enable local AI processing for enhanced performance and features as well as intelligent print features incorporated into our home, office and graphics solutions.<\/content>", "qwen": "operative", "mistral": "prospective", "llama": "neutral", "majority_vote": "operative", "tiebreaker": "claude-haiku"}, {"nummer": "5667", "name": "Microsoft Corporation", "gics": "Information Technology", "year": "2024", "trigger": "AI", "content": "<content>We strive to create local opportunity, growth, and impact in every country around the world.<\/content> <target>We have entered a new age of AI that will fundamentally transform productivity for every individual, organization, and industry on earth, while helping us address some of our most pressing challenges.<\/target> <content>Microsoft's AI offerings, including Copilot and our Copilot stack, are already orchestrating a new era of AI transformation, driving better business outcomes across every role and industry.<\/content>", "qwen": "operative", "mistral": "operative", "llama": "neutral", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "4793", "name": "Alphabet Inc.", "gics": "Communication Services", "year": "2024", "trigger": "Gemini", "content": "<content>In 2024, we launched Gemini 2.0, our most capable model yet.<\/content> <target>Gemini can generalize and seamlessly understand, operate across, and combine different types of information including text, code, audio, image, and video.<\/target> <content>Gemini is powering AI features across our products and services that are helping people everyday.<\/content>", "qwen": "operative", "mistral": "operative", "llama": "operative", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "3979", "name": "Brown & Brown, Inc.", "gics": "Financials", "year": "2024", "trigger": "artificial intelligence", "content": "<content>If we do not effectively and efficiently manage and upgrade our technology portfolio regularly, or if the costs of doing so are higher than we expect, our ability to provide competitive services to new and existing customers in a cost-effective manner and our ability to implement our strategic initiatives could be adversely impacted.<\/content> <target>Additionally, we use artificial intelligence (“AI”) and robotic processing automation (“RPA”) in our business, including with respect to services provided to our customers.<\/target> <content>We have internal policies governing the use of AI and RPA by our employees designed to protect us from breaches of data privacy, errors and omissions liability and regulatory enforcement risk; however, our employees could violate these policies and expose us to such risks.<\/content>", "qwen": "operative", "mistral": "operative", "llama": "operative", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "4636", "name": "GoDaddy Inc.", "gics": "Information Technology", "year": "2024", "trigger": "AI", "content": "<content>We offer a range of solutions that help our customers publish their ideas online, including Websites + Marketing and Managed WordPress.<\/content> <target>These solutions combine mobile-optimized website builders with an integrated set of marketing and e-commerce tools, all of which is enhanced with AI.<\/target> <content>We continue to invest in Websites + Marketing and other tools, templates and technology to make building, maintaining and updating a professional looking mobile or desktop presence simple and easy.<\/content>", "qwen": "prospective", "mistral": "operative", "llama": "neutral", "majority_vote": "operative", "tiebreaker": "claude-haiku"}, {"nummer": "6299", "name": "SLB N.V.", "gics": "Energy", "year": "2024", "trigger": "artificial intelligence", "content": "<content>The primary offerings comprising this Division are: • Digital Solutions: Includes products, services, and solutions that span the energy value chain from subsurface characterization through field development and hydrocarbon production to carbon management and the integration of adjacent energy systems.<\/content> <target>Offerings are founded upon proprietary and open-source data platform technologies, industry-leading simulators, and workflow tools, and include domain-specific application of innovative digital capabilities, such as artificial intelligence (\"AI\") and machine learning.<\/target> <content>Solutions are deployable on traditional on-premise IT infrastructures, the cloud, and the edge, allowing for full market coverage irrespective of customer constraints.<\/content>", "qwen": "operative", "mistral": "prospective", "llama": "neutral", "majority_vote": "operative", "tiebreaker": "claude-haiku"}, {"nummer": "4993", "name": "Hewlett Packard Enterprise Company", "gics": "Information Technology", "year": "2024", "trigger": "AI", "content": "<content>We believe the proliferation of AI, especially as it relates to our products and solutions that enable AI workloads, will have a significant impact on customer preferences and market dynamics in our industry, and our ability to effectively compete in this space will be critical to our financial performance.<\/content> <target>We currently incorporate AI capabilities into certain offerings and manufacture hardware designed to support AI capabilities, and our research into and continued development of such capabilities and manufacturing processes remain ongoing.<\/target> <content>We have invested, and expect to continue to invest, significant resources to build and support the development of these capabilities and manufacturing processes, and if our AI-related offerings fail to operate as anticipated or as well as competing offerings or otherwise do not meet customer needs or if we are unable to bring AI-related offerings to market as effectively as our competitors, we may fail to recoup our investments in AI, our competitive position may be harmed, and our business and reputation may be adversely impacted.<\/content>", "qwen": "prospective", "mistral": "operative", "llama": "operative", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "4847", "name": "Alphabet Inc.", "gics": "Communication Services", "year": "2024", "trigger": "AI", "content": "<content>During the years ended December 31, 2023 and 2024, we spent $32.3 billion and $52.5 billion on capital expenditures, respectively.<\/content> <target>We expect to increase, relative to 2024, our i nvestment in our technical infrastructure, including servers, network equipment, and data centers, to support the growth of our business and our long-term initiatives, in particular in support of AI products and services.<\/target> <content>Depreciation of our property and equipment commences when the deployment of such assets are completed and are ready for our intended use.<\/content>", "qwen": "prospective", "mistral": "neutral", "llama": "prospective", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "6491", "name": "Vertiv Holdings Co", "gics": "Industrials", "year": "2024", "trigger": "artificial intelligence", "content": "<content>18 Table of contents If we fail to anticipate technology shifts, market needs and opportunities, and fail to develop appropriate products, product enhancements and services in a timely manner to meet those changes, we may not be able to compete effectively against our global competitors and, as a result, our ability to generate revenues will suffer.<\/content> <target>We believe that our future success will depend in part upon our ability to anticipate technology shifts, such as the growth in artificial intelligence, and to enhance and develop new products and services that meet or anticipate such technology changes.<\/target> <content>Any such developments will require continued investment in engineering, capital equipment, marketing, customer service and technical support.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "neutral", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "5889", "name": "ServiceNow, Inc.", "gics": "Information Technology", "year": "2024", "trigger": "AI", "content": "<content>If we are unable to manage these risks, our business will be adversely affected.<\/content> <target>Incorporating AI technology into our offerings may result in operational, legal, regulatory, ethical and other challenges.<\/target> <content>We are increasingly innovating and expanding offerings on our platform by integrating AI technology.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "prospective", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "6310", "name": "Super Micro Computer, Inc.", "gics": "Information Technology", "year": "2024", "trigger": "artificial intelligence", "content": "<content>This also impacts our research and development expenditures as we continue to invest more in our current and future product development efforts.<\/content> <target>Artificial Intelligence and Data Centers The increased use of AI, which has required increased datacenter capabilities, has substantially increased demand for our products in the recent past.<\/target> <content>We expect that the AI market, and thus the need for additional datacenter capabilities and liquid cooling, will continue to strengthen, and we will continue to enhance our product capabilities and breadth of our service offerings to meet the demand of the AI market and datacenters.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "neutral", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "4380", "name": "Chevron Corporation", "gics": "Energy", "year": "2024", "trigger": "AI", "content": "<content>The company is building high-impact use cases leveraging its extensive data and insights and collaborating with others to access AI solutions to help unlock value.<\/content> <target>In an effort to ensure its AI systems are reliable and effective, the company is employing processes to assess its capabilities, limitations and readiness.<\/target> <content>Chevron is a member of the Responsible AI institute, a consortium focused on integrating AI responsibly while safeguarding human values.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "neutral", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "5137", "name": "Intel Corporation", "gics": "Information Technology", "year": "2024", "trigger": "large language models", "content": "<content>As part of our strategy, we seek to develop and offer leading products across each of these architectural categories.<\/content> <target>We also seek to address every phase of the AI continuum, from the largest, most challenging GenAI and large language models to emerging usages like AI PCs and AI at the edge.<\/target> <content>We believe AI represents a generational shift in computing by expanding human abilities and solving the most challenging problems.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "neutral", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "4367", "name": "Cognizant Technology Solutions Corporation", "gics": "Information Technology", "year": "2024", "trigger": "AI", "content": "<content>We plan to make significant investments in our AI capabilities to meet the needs of our clients and harness AI's value in a flexible, secure, scalable and responsible way.<\/content> <target>As AI-based technologies or other forms of automation evolve, we expect that demand for some services that we currently perform for our clients may be reduced and our ability to obtain favorable pricing or other terms for our services may be diminished.<\/target> <content>Potential tax law and other regulatory changes, including possible U.S. corporate income tax reform and the Code on Social Security, 2020 in India, among other items, may impact our future results.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "prospective", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "5049", "name": "HP Inc.", "gics": "Information Technology", "year": "2024", "trigger": "AI", "content": "<content>As with many innovations, AI presents risks, challenges, and unintended consequences that could affect its rate and success of adoption, and therefore our business, and there is no guarantee that our use of AI or incorporation of AI capabilities into our products and solutions will benefit our business operations or result in products and solutions that are preferred by our customers.<\/content> <target>We have invested, and expect to continue to invest, significant resources to build and support our AI products.<\/target> <content>If our AI products fail to operate as anticipated or as well as competing products or otherwise do not meet customer needs or if we are unable to bring AI-enabled products and solutions to market as effectively, or with the same speed or in the same volumes, as our competitors, we may fail to recoup our investments in AI or improve our financial performance, our competitive position may be harmed, and our business and reputation may be adversely impacted.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "prospective", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "5127", "name": "IDEX Corporation", "gics": "Industrials", "year": "2024", "trigger": "AI", "content": "<content>We are in the initial stages of incorporating artificial intelligence (“AI”) into our business activities and our product and service offerings.<\/content> <target>As with many innovations, AI presents risks and challenges that could adversely impact our business.<\/target> <content>The development, adoption, and use of AI technologies are still in their early stages and ineffective or inadequate AI development or deployment practices could result in unintended consequences.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "prospective", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "6122", "name": "Palo Alto Networks, Inc.", "gics": "Information Technology", "year": "2024", "trigger": "AI", "content": "<content>For example, in December 2023, we acquired Dig, which we expect will enhance our Prisma Cloud capabilities with a DSPM solution that is intended to provide customers with visibility into, and secure data stored across, their multi-cloud environments; and we acquired Talon, which will support Prisma SASE’s approach to provide secure access to business applications for unmanaged and personal devices with an enterprise browser.<\/content> <target>In May 2024, we announced an expanded partnership with International Business Machines Corporation (“IBM”) to deliver AI-powered security outcomes for customers, as part of which we agreed to acquire IBM's QRadar SaaS assets, including QRadar intellectual property rights, customer relationships and customer contracts.<\/target> <content>On August 31, 2024, we completed the acquisition of IBM’s QRadar SaaS assets and we expect the acquisition will help accelerate the growth of our Cortex XSIAM business.<\/content>", "qwen": "prospective", "mistral": "operative", "llama": "neutral", "majority_vote": "prospective", "tiebreaker": "claude-haiku"}, {"nummer": "6432", "name": "Tesla, Inc.", "gics": "Consumer Discretionary", "year": "2024", "trigger": "AI", "content": "<content>We also offer maintenance, installation, operation, charging, insurance, financial and other services related to our products.<\/content> <target>Additionally, we are increasingly focused on products and services based on AI, robotics and automation.<\/target> <content>In 2024, we produced approximately 1,773,000 consumer vehicles and delivered approximately 1,789,000 consumer vehicles.<\/content>", "qwen": "neutral", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "5397", "name": "KKR & Co. Inc.", "gics": "Financials", "year": "2024", "trigger": "artificial intelligence", "content": "<content>The fine threshold for non-compliance is expected to be 35 million euros or 7% of total annual worldwide turnover, whichever is higher, and regulators are expected to have powers to remove non-compliant products from the EU market.<\/content> <target>Other jurisdictions, such as Canada with its Artificial Intelligence and Data Act and Brazil with its AI Legal Framework, have either implemented or are also considering similar legal frameworks.<\/target> <content>63 Table of Contents Once effective, regulations relating to artificial intelligence may expand our compliance obligations and impact our business or the business of our portfolio companies.<\/content>", "qwen": "neutral", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "4834", "name": "Alphabet Inc.", "gics": "Communication Services", "year": "2024", "trigger": "machine learning", "content": "<content>Table of Contents Alphabet Inc. • Data and Analytics: provides a variety of different types of databases — relational, key-value, and in-memory — to store and manage data for different types of applications and deliver data to AI agents.<\/content> <target>Our data platform also unifies data lakes, data warehouses, data governance, and advanced machine learning into a single platform that helps users analyze data using AI models across any cloud.<\/target> <content>• Applications: offers a broad applications portfolio, including Gemini for Google Cloud and Gemini for Google Workspace, as well as purpose-built agents for Search and our Customer Engagement Suite.<\/content>", "qwen": "operative", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "4661", "name": "GoDaddy Inc.", "gics": "Information Technology", "year": "2024", "trigger": "AI", "content": "<content>The costs of complying with such laws, rules or regulations could be significant and would increase our operating expenses, which could adversely affect our business, financial condition and results of operations.<\/content> <target>In addition, many existing laws, rules and regulations apply to certain aspects of AI, such as automated decision making affecting fundamental data subject rights.<\/target> <content>Similarly, the intellectual property ownership and license rights, including as related to copyright, surrounding AI technologies has not been fully addressed by international and U.S. courts or the laws, rules or regulations of the U.S., including U.S. states, and foreign jurisdictions.<\/content>", "qwen": "neutral", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "4148", "name": "Centene Corporation", "gics": "Health Care", "year": "2024", "trigger": "artificial intelligence", "content": "<content>Except as may be otherwise required by law, we undertake no obligation to update or revise the forward-looking statements included in this filing, whether as a result of new information, future events, or otherwise, after the date of this filing.<\/content> <target>You should not place undue reliance on any forward-looking statements, as actual results may differ materially from projections, estimates, or other forward-looking statements due to a variety of important factors, variables and events including, but not limited to: • our ability to design and price products that are competitive and/or actuarially sound including but not limited to any impacts resulting from Medicaid redeterminations; • our ability to maintain or achieve improvement in the Centers for Medicare and Medicaid Services (CMS) Star ratings and maintain or achieve improvement in other quality scores in each case that could impact revenue and future growth; • our ability to accurately predict and effectively manage health benefits and other operating expenses and reserves, including fluctuations in medical utilization rates; • competition, including for providers, broker distribution networks, contract reprocurements and organic growth; • our ability to adequately anticipate demand and timely provide for operational resources to maintain service level requirements in compliance with the terms of our contracts and state and federal regulations; • our ability to manage our information systems effectively; • disruption, unexpected costs, or similar risks from business transactions, including acquisitions, divestitures, and changes in our relationships with third-party vendors; • impairments to real estate, investments, goodwill, and intangible assets; • changes in senior management, loss of one or more key personnel or an inability to attract, hire, integrate and retain skilled personnel; • membership and revenue declines or unexpected trends; • rate cuts, insufficient rate changes or other payment reductions or delays by governmental payors and other risks and uncertainties affecting our government businesses; • changes in healthcare practices, new technologies, and advances in medicine; • our ability to effectively and ethically use artificial intelligence and machine learning in compliance with applicable laws; • increased healthcare costs; • inflation and interest rates; • the effect of social, economic, and political conditions and geopolitical events, including as a result of changes in U.S. presidential administrations or Congress; • changes in market conditions; Table of Contents • changes in federal or state laws or regulations, including changes with respect to income tax reform or government healthcare programs as well as changes with respect to the Patient Protection and Affordable Care Act and the Health Care and Education Affordability Reconciliation Act (collectively referred to as the ACA) and any regulations enacted thereunder, including the timing and terms of renewal or modification of the enhanced advance premium tax credits or program integrity initiatives that could have the effect of reducing membership or profitability of our products; • uncertainty concerning government shutdowns, debt ceilings or funding; • tax matters; • disasters, climate-related incidents, acts of war or aggression or major epidemics; • changes in expected contract start dates and terms; • changes in provider, broker, vendor, state, federal and other contracts and delays in the timing of regulatory approval of contracts, including due to protests and our ability to timely comply with any such changes to our contractual requirements or manage any unexpected delays in regulatory approval of contracts; • the expiration, suspension, or termination of our contracts with federal or state governments (including, but not limited to, Medicaid, Medicare or other customers); • the difficulty of predicting the timing or outcome of legal or regulatory audits, investigations, proceedings or matters, including, but not limited to, our ability to resolve claims and/or allegations made by states with regard to past practices on acceptable terms, or at all, or whether additional claims, reviews or investigations will be brought by states, the federal government or shareholder litigants, or government investigations; • challenges to our contract awards; • cyber-attacks or other data security incidents or our failure to comply with applicable privacy, data or security laws and regulations; • the exertion of management's time and our resources, and other expenses incurred and business changes required in connection with complying with the terms of our contracts and the undertakings in connection with any regulatory, governmental, or third party consents or approvals for acquisitions or dispositions; • any changes in expected closing dates, estimated purchase price, or accretion for acquisitions or dispositions; • losses in our investment portfolio; • restrictions and limitations in connection with our indebtedness; • a downgrade of our corporate family rating, issuer rating or credit rating of our indebtedness; and • the availability of debt and equity financing on terms that are favorable to us.<\/target> <content>This list of important factors is not intended to be exhaustive.<\/content>", "qwen": "neutral", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "3908", "name": "Baxter International Inc.", "gics": "Health Care", "year": "2024", "trigger": "AI", "content": "<content>See “Risks Relating to Our Operations – Incorporating artificial intelligence, machine learning and other emerging technologies into our products, services and operations may result in legal and regulatory risks, reputational harm or have other adverse consequences to our business, financial condition or 20 results of operations”.<\/content> <target>The continuing evolution of technology we use, including cloud-based computing and data hosting as well as AI, and reliance on third parties and Software as a Service solutions, whom may also use cloud-based computing and data hosting or AI tools, create additional opportunities for the unintentional, intentional, unauthorized or unlawful disclosure, exposure, dissemination, loss, alteration, access or destruction of Protected Information stored or processed in our devices, systems, servers, infrastructure and products (collectively, Technology).<\/target> <content>Security threats, including cyber and other attacks, have become very sophisticated, frequent and adaptive.<\/content>", "qwen": "neutral", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "5179", "name": "Intel Corporation", "gics": "Information Technology", "year": "2024", "trigger": "AI", "content": "<content>These decreases were substantially offset by higher cost of sales due to higher unit cost from an increased mix of Intel 4 and Intel 7 products and higher notebook volume sold in 2024.<\/content> <target>▪ DCAI cost of sales increased $372 million from 2023, primarily driven by higher period charges due to $922 million in Gaudi AI accelerator inventory-related charges recognized in 2024, and higher server unit cost primarily driven by an increased mix of Intel 7 products sold in 2024.<\/target> <content>These cost of sales increases were partially offset by lower period charges driven by the sell-through of previously reserved inventory and lower non-accelerator inventory reserves taken in 2024.<\/content>", "qwen": "prospective", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "5110", "name": "Intercontinental Exchange, Inc.", "gics": "Financials", "year": "2024", "trigger": "artificial intelligence", "content": "<content>The use of artificial intelligence may also give rise to ethical concerns or negative public perceptions, which may cause brand or reputational harm.<\/content> <target>Additionally, our existing competitors or new entrants may be developing their own artificial intelligence products and technologies, which may be superior in features 35 or functionality, or cost, to our offerings, or could negatively impact our business by causing our clients to rely less on our products and services.<\/target> <content>Any of these factors could adversely affect our business, reputation or operating results.<\/content>", "qwen": "neutral", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "3784", "name": "Arista Networks, Inc.", "gics": "Information Technology", "year": "2024", "trigger": "AI", "content": "<content>AGNI integrates with Arista NDR and other third-party XDR and EDR solutions for post-admission control functionality.<\/content> <target>Arista's AI-driven Network Detection and Response (NDR) - An AI-driven Security Platform, powered by AVA TM , Arista NDR analyzes billions of network communications to autonomously discover, profile and classify every device, user, and application across perimeter, core, IoT, and cloud networks.<\/target> <content>Based on this deep understanding of the attack surface, the platform then detects threats to and from these entities, while providing the context necessary to respond rapidly.<\/content>", "qwen": "neutral", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "5956", "name": "NVIDIA Corporation", "gics": "Information Technology", "year": "2024", "trigger": "AI", "content": "<content>The world’s leading cloud service providers, or CSPs, and consumer internet companies use our data center-scale accelerated computing platforms to enable, accelerate or enrich the services they deliver to billions of end users, including AI solutions and assistants, search, recommendations, social networking, online shopping, live video, and translation.<\/content> <target>Enterprises and startups across a broad range of industries use our accelerated computing platforms to build new generative AI-enabled products and services, or to dramatically accelerate and reduce the costs of their workloads and workflows.<\/target> <content>The enterprise software industry uses them for new AI assistants and chatbots; the transportation industry for autonomous driving; the healthcare industry for accelerated and computer-aided drug discovery; and the financial services industry for customer support and fraud detection.<\/content>", "qwen": "neutral", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "6858", "name": "Advanced Micro Devices, Inc.", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "<content>In addition to these reportable segments, we have an All Other category, which is not a reportable segment.<\/content> <target>Data Center Segment Data Center Market The Data Center segment primarily includes server-class CPUs, GPUs, AI accelerators, DPUs, AI NICs, FPGAs, and adaptive SoC products.<\/target> <content>We leverage our technology to address the computational, visual data processing and AI workload acceleration needs in the data center market.<\/content>", "qwen": "operative", "mistral": "neutral", "llama": "operative", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "7388", "name": "C.H. Robinson Worldwide, Inc.", "gics": "Industrials", "year": "2025", "trigger": "multimodal", "content": "<content>Transactions are performed in seconds, giving customers greater efficiency, speed-to-market, and cost savings while improving employee productivity, as measured by shipments per person per day.<\/content> <target>Our fleet of more than 30 AI agents is integrated with Navisphere, our global, multimodal transportation management system.<\/target> <content>Navisphere is essential for serving our customers and contract carriers and for managing our business.<\/content>", "qwen": "operative", "mistral": "operative", "llama": "operative", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "7598", "name": "CrowdStrike Holdings, Inc.", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "<content>By applying powerful graph analytics and AI algorithms to cybersecurity, we enrich the data collected with our proprietary and third-party threat intelligence, such as adversary capabilities, motivations, attributions, and threat indicators.<\/content> <target>The graph data model allows our AI algorithms to identify relationships between events that are not directly related but which could indicate an attack that would otherwise remain undetected.<\/target> <content>We believe that our AI algorithms are advantaged by the rich proprietary dataset that we use to train them.<\/content>", "qwen": "operative", "mistral": "operative", "llama": "operative", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "10058", "name": "Palo Alto Networks, Inc.", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "<content>We deliver the next generation of security operations capabilities that unifies standalone Security Information and Event Management (“SIEM”) tools, endpoint security, security automation, cloud detection and response (“CDR”), as well as attack surface management (“ASM”) capabilities on our Cortex ® platform.<\/content> <target>These include Cortex XSIAM ® , for AI-powered security operations replacing traditional SIEM tools, Cortex XDR ® , for the prevention, detection, and response to complex cybersecurity attacks, Cortex XSOAR ® , for security orchestration, automation, and response (“SOAR”), and Cortex Xpanse ® , for ASM.<\/target> <content>• Cloud Security.<\/content>", "qwen": "operative", "mistral": "neutral", "llama": "operative", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "7611", "name": "CrowdStrike Holdings, Inc.", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "<content>We incorporate novel uses of AI technologies, including generative AI, into our products and operations, such as our Falcon platform.<\/content> <target>AI is complex and rapidly evolving, and we face significant competition from other companies who may incorporate AI into their products more quickly or more successfully than us, as well as an evolving regulatory landscape.<\/target> <content>The introduction of AI, and particularly generative AI, a relatively new and emerging technology in the early stages of commercial use, into new or existing products, and our operations, may result in new or enhanced governmental or regulatory scrutiny, litigation, confidentiality, ethical concerns, or other complications that could adversely affect our business, reputation, or financial results.<\/content>", "qwen": "operative", "mistral": "operative", "llama": "operative", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "10227", "name": "Insulet Corporation", "gics": "Health Care", "year": "2025", "trigger": "AI", "content": "<content>In the United States, California, Colorado, and Texas have introduced AI laws although they are not effective yet.<\/content> <target>Other countries have also regulated the use of AI.<\/target> <content>AI systems are currently deployed in our business operations and any additional AI systems to the extent developed or deployed in our business operations or in our products, we will be subject to AI regulations governing AI systems.<\/content>", "qwen": "operative", "mistral": "operative", "llama": "operative", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "9009", "name": "IQVIA Holdings Inc.", "gics": "Health Care", "year": "2025", "trigger": "natural language processing", "content": "<content>IQVIA has a rich history of developing Healthcare-grade AI ® .<\/content> <target>We have steadily expanded our capabilities over the years in connection with machine learning, natural language processing and generative and agentic AI as technology evolves.<\/target> <content>For example, AI can be used to generate new insights and recommendations, helping to increase clinical trials efficiency at all stages from trial design to data submission.<\/content>", "qwen": "neutral", "mistral": "prospective", "llama": "operative", "majority_vote": "operative", "tiebreaker": "claude-haiku"}, {"nummer": "9890", "name": "NVIDIA Corporation", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "<content>Our AI technology leadership is reinforced by our large and expanding ecosystem in a virtuous cycle.<\/content> <target>Our computing platforms are available from virtually every major server maker and CSP, as well as on our own AI supercomputers.<\/target> <content>There are over 5.9 million developers worldwide using CUDA and our other software tools to help deploy our technology in our target markets.<\/content>", "qwen": "operative", "mistral": "neutral", "llama": "operative", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "7044", "name": "Alexandria Real Estate Equities, Inc.", "gics": "Real Estate", "year": "2025", "trigger": "automated decision-making", "content": "<content>46 Our employees and personnel use generative artificial intelligence (“AI”) and/or automated decision-making technologies to perform their work, and the disclosure and use of personal information in AI technologies is subject to various privacy laws and other privacy obligations.<\/content> <target>Governments have passed and are likely to pass additional laws and regulations regulating AI and/or automated decision-making technologies.<\/target> <content>Our use of this technology could result in additional compliance costs, regulatory investigations and actions, and lawsuits.<\/content>", "qwen": "operative", "mistral": "operative", "llama": "neutral", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "8629", "name": "Hewlett Packard Enterprise Company", "gics": "Information Technology", "year": "2025", "trigger": "natural language processing", "content": "<content>Our R&D efforts in the realm of AI are particularly robust, with new server solutions designed for AI inference engines and integrated into HPE Private Cloud AI for inferencing, retrieval augmented generation, and model fine-tuning.<\/content> <target>Large-scale model training and tuning, including natural language processing, large language models, and multi-modal training for models with trillions of parameters are supported by our leading AI solutions.<\/target> <content>These efforts are bolstered by the development of high-performance computing tools, cloud-native and scalable cluster management software, and transaction processing software, which have been instrumental in achieving our milestone of delivering the world's first exascale supercomputer.<\/content>", "qwen": "operative", "mistral": "operative", "llama": "operative", "majority_vote": "operative", "tiebreaker": ""}, {"nummer": "8775", "name": "Interactive Brokers Group, Inc.", "gics": "Financials", "year": "2025", "trigger": "AI", "content": "<content>We also provided new tools to showcase potential career pathways and job mobility opportunities.<\/content> <target>Additionally, we launched comprehensive AI training and learning resources to equip employees with the skills to confidently and creatively leverage AI tools in their work.<\/target> <content>We expanded our financial literacy initiatives, providing employees with access to live events, educational materials, and specialized courses to support their personal financial well-being.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "neutral", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "10083", "name": "Palo Alto Networks, Inc.", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "<content>Cortex Cloud, the next generation of Prisma Cloud, merges CNAPP with CDR for real-time cloud security.<\/content> <target>The solution allows you to harness the power of AI and automation to prioritize cloud risks with runtime context, enable remediation at scale, and stop attacks as they happen.<\/target> <content>Cortex Cloud consolidates multiple code and cloud security technologies such as Cloud Detection and Response, Software Composition Analysis, Infrastructure as Code security, CI/CD security, secrets scanning, Cloud Security Posture Management, Cloud Identity and Entitlements Management, API security, Vulnerability Management, Cloud Workload Protection, Web Application and API Security, Cloud Network Security, and Cloud Attack Surface Management into a single unified offering.<\/content>", "qwen": "not_ai", "mistral": "prospective", "llama": "operative", "majority_vote": "prospective", "tiebreaker": "claude-haiku"}, {"nummer": "9224", "name": "Lockheed Martin Corporation", "gics": "Industrials", "year": "2025", "trigger": "artificial intelligence", "content": "<content>Recent regional conflicts have demonstrated the integral role Lockheed Martin products play in protecting people, and we are rapidly transforming our business to meet increased demand.<\/content> <target>We are expanding production capacity to continue delivering at scale, and we are harnessing leading-edge technologies like artificial intelligence and autonomy, open-architecture systems, and advanced networking to make defense forces more agile, adaptive and unpredictable.<\/target> <content>Our goal is to deliver overwhelming capability and value – quickly, at the needed quantities and with the greatest effectiveness – to enable overmatch and strengthen deterrence today and into the future.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "neutral", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "9543", "name": "Microsoft Corporation", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "<content>• We are investing in artificial intelligence (“AI”) across the entire company and infusing generative AI capabilities into our consumer and commercial offerings.<\/content> <target>AI technology and services are a highly competitive and rapidly evolving market, and new competitors continue to enter the market.<\/target> <content>We will bear significant development and operational costs to build and support the AI models, services, platforms, and infrastructure necessary to meet the needs of our customers.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "prospective", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "8051", "name": "FactSet Research Systems Inc.", "gics": "Financials", "year": "2025", "trigger": "machine learning", "content": "<content>Workforce Strategy and Talent Development FactSet invests strategically in attracting, developing, and retaining top talent to support growth and innovation.<\/content> <target>Key initiatives include: • Strategic Hiring: Recruitment in critical roles, including data solutions, AI, machine learning, product management, and client-facing positions.<\/target> <content>• Future-Ready Skills: In fiscal 2025, 94% of employees participated in learning programs, completing 339,000 hours globally.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "neutral", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "9723", "name": "ServiceNow, Inc.", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "<content>LCO products can also automate responses to frequently asked questions and provide dashboards and reporting to help anticipate demand and allocate resources.<\/content> <target>Now Assist and AI agents for LCO can detect non-standard contract language, recommend pre-approved clauses from a library of acceptable terms, glean contract termination and renewal data to support timely management of contract deadlines, and generate summaries of requests and matters.<\/target> <content>These tools are intended to improve accuracy, reduce risk and simplify tracking of legal work.<\/content>", "qwen": "prospective", "mistral": "operative", "llama": "neutral", "majority_vote": "prospective", "tiebreaker": "claude-haiku"}, {"nummer": "6680", "name": "Automatic Data Processing, Inc.", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "<content>Our goal is to deliver AI agents that continue to automate tedious, time heavy tasks and deliver value to these individuals to do more strategic activities.<\/content> <target>Similarly, we intend to deliver AI role-based agents to our internal associates such as sales, software engineering, testing, product management, service, and implementation.<\/target> <content>To advance these efforts, we continue to roll out ADP Assist, our award-winning cross-platform solution powered by generative AI that transforms data into credible and actionable insights.<\/content>", "qwen": "prospective", "mistral": "operative", "llama": "prospective", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "10639", "name": "Tractor Supply Company", "gics": "Consumer Discretionary", "year": "2025", "trigger": "artificial intelligence", "content": "<content>Our integrated use of these technology systems is intended to support more personalized customer experiences and improve forecasting, sourcing, inventory planning, labor planning, and fulfillment for seasonal and weather-sensitive demand.<\/content> <target>We are investing, and expect to continue to invest, in expanding our artificial intelligence capabilities and to consider the adoption of other emerging technologies.<\/target> <content>There can be no assurance, however, that our development or use of these technologies will achieve their intended benefits, operate as expected, be cost-effective, or not result in unintended consequences.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "prospective", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "10801", "name": "Vertex Pharmaceuticals Incorporated", "gics": "Health Care", "year": "2025", "trigger": "artificial intelligence", "content": "<content>Ethical and legal challenges may arise, including biases or discrimination in generated outcomes, non-compliance with data protection regulations and laws specifically governing the use of artificial intelligence systems and tools, and lack of transparency.<\/content> <target>Furthermore, the deployment of artificial intelligence systems could expose us to increased cybersecurity threats, such as data breaches and unauthorized access.<\/target> <content>We also face competitive risks if we do not implement artificial intelligence or other machine learning technologies in a timely fashion.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "neutral", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "7282", "name": "CBRE Group, Inc.", "gics": "Real Estate", "year": "2025", "trigger": "artificial intelligence", "content": "<content>If we are unable to effectively execute or maintain our information technology strategies or adopt new technologies and processes relevant to our service platform, our ability to deliver high-quality services may be materially impaired.<\/content> <target>In addition, we make significant investments in new systems and tools to achieve competitive advantages and efficiencies, including the adoption and integration of artificial intelligence (AI) and machine learning technologies.<\/target> <content>Implementation of such investments in information technology, including generative and agentic AI tools, could be complicated, heavily dependent on the quality, accuracy and relevance of data inputs and methodologies, require sophisticated infrastructure and skilled talent, have ethical and societal implications, and could exceed estimated budgets.<\/content>", "qwen": "prospective", "mistral": "prospective", "llama": "neutral", "majority_vote": "prospective", "tiebreaker": ""}, {"nummer": "10921", "name": "W. R. Berkley Corporation", "gics": "Financials", "year": "2025", "trigger": "artificial intelligence", "content": "<content>For example, Colorado has enacted a law that prohibits insurers from using external consumer data and information sources (“ECDIS”), as well as algorithms or predictive models that use ECDIS, in a way that unfairly discriminates based on race, color, national or ethnic origin, religion, sex, sexual orientation, disability, gender identity or gender expression.<\/content> <target>The Colorado Division of Insurance adopted regulations applicable to insurers writing life, private passenger auto or health benefit plans that require the adoption of a governance and risk management framework related to the use of artificial intelligence, machine learning and other technologies that utilize ECDIS, which applies to our insurance subsidiaries licensed in Colorado.<\/target> <content>The Colorado Division of Insurance has indicated its intent to extend these regulations to other lines of insurance.<\/content>", "qwen": "neutral", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "10043", "name": "Realty Income Corporation", "gics": "Real Estate", "year": "2025", "trigger": "predictive analytics", "content": "<content>The active management of our portfolio is a core component of our long‑term strategy to maintain high occupancy, enhance diversification, and support consistent, durable cash flow growth.<\/content> <target>Predictive Analytics & AI‑Enabled Decisioning We view operational scale, proprietary data, and proprietary technology as core competitive advantages that strengthen our ability to source, underwrite, and manage a large and diversified net lease portfolio.<\/target> <content>Since 2019, we have meaningfully expanded our investment in people, systems, and automation to enhance our decision-making, efficiency, and risk management across the full investment lifecycle.<\/content>", "qwen": "prospective", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "8319", "name": "GoDaddy Inc.", "gics": "Information Technology", "year": "2025", "trigger": "AI", "content": "<content>In addition, we and our competitors continue to invest in AI and integrate AI capabilities into products, services and internal operations.<\/content> <target>AI technology and services are highly competitive, rapidly evolving and may at times require significant investment, including with respect to development and operational costs, to meet the changing needs and expectations of our existing and potential customers and our own operations.<\/target> <content>Other companies may develop AI products and technologies that are similar or superior to our technologies or more cost-effective to deploy.<\/content>", "qwen": "neutral", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "10674", "name": "Tesla, Inc.", "gics": "Consumer ility to achieve the anticipated benefits and synergies and may result in unintended consequences; ◦ difficulty in attracting and retaining talented and qualified personnel, including key employees, such as executives, managers and employees with strong technological, analytical and other specialized skills; ◦ the Company’s ability to protect its intellectual property and defend against claims of infringement; • Regulatory and Legal Risks: ◦ the cost and other potential effects of increased federal, state and international regulatory and legislative developments, including those that could adversely impact the demand for the Company’s products, operating costs and required capital levels; ◦ unfavorable judicial or legislative developments; ◦ the impact of changes in federal, state or foreign tax laws; ◦ regulatory requirements that could delay, deter or prevent a takeover attempt that stockholders might consider in their best interests; and ◦ the impact of potential changes in accounting principles and related financial reporting requirements.<\/target> <content>Any forward-looking statement made by the Company in this document speaks only as of the date of the filing of this Form 10-K. Factors or events that could cause the Company’s actual results to differ may emerge from time to time, and it is not possible for the Company to predict all of them.<\/content>", "qwen": "neutral", "mistral": "neutral", "llama": "neutral", "majority_vote": "neutral", "tiebreaker": ""}, {"nummer": "9355", "name": "Moody's Corporation", "gics": "Financials", "year": "2025", "trigger": "generative artificial intelligence", "content": "<content>This LOB utilizes components from the Data & Information and Research & Insights LOBs to provide risk assessment solutions Dodd-Frank Act Dodd-Frank Wall Street Reform and Consumer Protection Act DORA The European Union Digital Operational Resilience Act EBITDA Earnings before interest, taxes, depreciation and amortization EMEA Represents countri const LABELS = ["operative","prospective","neutral","not_ai"];
const KEY    = "sentiment_review_v2";
const TINT   = {operative:"rgba(45,184,101,",neutral:"rgba(74,109,134,",
                prospective:"rgba(212,150,26,",not_ai:"rgba(176,69,31,"};
const EXIT   = {operative:"translateX(130%) rotate(22deg)",
                neutral:"translateX(-130%) rotate(-22deg)",
                prospective:"translateY(-130%) rotate(-6deg)",
                not_ai:"translateY(130%) rotate(6deg)"};
const $=id=>document.getElementById(id);

let results=JSON.parse(localStorage.getItem(KEY)||"{}");
let showTip=false, idx=0;

function save(){localStorage.setItem(KEY,JSON.stringify(results));}
function firstUnreviewed(){
  for(let i=0;i<DATA.length;i++) if(!results[DATA[i].nummer]) return i;
  return DATA.length;
}
function esc(s){return(""+s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
function highlight(text,trig){
  let t=esc(text);
  if(trig){const s=trig.replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
    try{t=t.replace(new RegExp("("+s+")","gi"),"<mark>$1</mark>");}catch(_){}}
  return t;
}

function render(){
  const done=Object.keys(results).length;
  $("prog").style.width=(done/DATA.length*100)+"%";
  $("counter").textContent=done+" / "+DATA.length;
  if(idx>=DATA.length){showSummary();return;}
  $("stage").style.display="flex";
  $("summary").classList.remove("on");

  const card=$("card");
  card.style.transition=""; card.style.transform=""; card.style.opacity="";
  ["lblOp","lblNeu","lblPro","lblNot"].forEach(id=>$(id).style.opacity=0);
  const tint=$("tint"); tint.style.opacity=0; tint.style.background="";

  const d=DATA[idx];
  $("chips").innerHTML=
    '<span class="chip">#'+d.nummer+'</span>'+
    '<span class="chip">'+esc(d.year)+'</span>'+
    '<span class="chip">'+esc(d.gics)+'</span>'+
    '<span class="chip trig">'+esc(d.trigger)+'</span>'+
    (d.tiebreaker?'<span class="chip haiku">haiku ⚡</span>':'');
  $("firm").textContent=d.name;
  $("meta").textContent=d.gics+" · "+d.year;
  $("content").innerHTML=highlight(d.content,d.trigger);
  $("content").scrollTop=0;

  $("hQ").textContent=d.qwen||"—"; $("hM").textContent=d.mistral||"—";
  $("hL").textContent=d.llama||"—"; $("hE").textContent=d.majority_vote||"—";
  $("hints").classList.toggle("on",showTip);

  const prev=results[d.nummer];
  $("prev").innerHTML=prev?'Deine Wahl: <b>'+prev+'</b>':"";
}

function flyOut(label){
  if(idx>=DATA.length) return;
  results[DATA[idx].nummer]=label; save();
  const card=$("card");
  card.style.transition="transform .3s cubic-bezier(.4,0,.6,1),opacity .3s ease";
  card.style.transform=EXIT[label]; card.style.opacity="0";
  setTimeout(()=>{idx++;render();},280);
}

function showSummary(){
  $("stage").style.display="none";
  $("summary").classList.add("on");
  const counts={},agree={},totE={};
  LABELS.forEach(l=>{counts[l]=0;agree[l]=0;totE[l]=0;});
  let agreeAll=0;
  DATA.forEach(d=>{
    const r=results[d.nummer],mv=d.majority_vote;
    if(r){counts[r]++;
      if(mv&&LABELS.includes(mv)){totE[mv]++;if(r===mv){agree[mv]++;agreeAll++;}}}
  });
  const rated=Object.keys(results).length;
  $("sgrid").innerHTML=LABELS.map(l=>
    '<div class="scell"><b>'+counts[l]+'</b><span>'+l+'</span></div>').join("");
  let kpi="Bewertet: <b>"+rated+" / "+DATA.length+"</b>";
  if(rated) kpi+="<br>Übereinstimmung Ensemble: <b>"+agreeAll+" / "+rated+" ("+(agreeAll/rated*100).toFixed(1)+"%)</b>";
  $("kpi").innerHTML=kpi;
  $("agrid").innerHTML=LABELS.map(l=>{
    const pct=totE[l]?(agree[l]/totE[l]*100).toFixed(0)+"%":"—";
    return'<div class="acell"><b>'+pct+'</b>'+l+'</div>';}).join("");
}

function buildCSV(){
  const h=["Nummer","Name","GICS","Year","Trigger_word","Sentiment_human",
           "qwen_label","mistral_label","llama_label","majority_vote","tiebreaker"];
  const rows=[h];
  DATA.forEach(d=>{if(!results[d.nummer])return;
    rows.push([d.nummer,d.name,d.gics,d.year,d.trigger,results[d.nummer],
               d.qwen,d.mistral,d.llama,d.majority_vote,d.tiebreaker]);});
  return rows.map(r=>r.map(c=>{c=""+c;
    return/[;"\n]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c;}).join(";")).join("\n");
}
function downloadCSV(){
  const b=new Blob(["﻿"+buildCSV()],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(b);
  a.download="review_v2_human.csv";a.click();
}
function parseCSV(text){
  const rows=[];let row=[],cur="",q=false;
  for(let i=0;i<text.length;i++){const c=text[i];
    if(q){if(c==='"'){if(text[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=c;}
    else{if(c==='"')q=true;else if(c===';'){row.push(cur);cur="";}
         else if(c==='\n'){row.push(cur);rows.push(row);row=[];cur="";}
         else if(c!=='\r')cur+=c;}}
  if(cur||row.length){row.push(cur);rows.push(row);}
  return rows;
}
function importCSV(text){
  const rows=parseCSV(text);if(!rows.length)return;
  const h=rows[0].map(x=>x.trim().toLowerCase());
  const iN=h.indexOf("nummer");
  let iL=h.indexOf("sentiment_human");if(iL<0)iL=h.indexOf("sentiment");
  if(iN<0||iL<0){alert("Spalten 'Nummer' und 'Sentiment_human' nicht gefunden.");return;}
  let n=0;
  for(let i=1;i<rows.length;i++){const r=rows[i];if(!r[iN])continue;
    const lab=(r[iL]||"").trim().toLowerCase();
    if(LABELS.includes(lab)){results[r[iN].trim()]=lab;n++;}}
  save();idx=firstUnreviewed();render();alert(n+" Bewertungen geladen.");
}

/* button events */
document.querySelectorAll(".act").forEach(b=>b.addEventListener("click",()=>flyOut(b.dataset.l)));
$("back").addEventListener("click",()=>{if(idx>0){idx--;render();}});
$("skip").addEventListener("click",()=>{if(idx<DATA.length){idx++;render();}});
$("tipBtn").addEventListener("click",()=>{showTip=!showTip;
  $("tipBtn").textContent="hints: "+(showTip?"an":"aus");render();});
$("saveBtn").addEventListener("click",downloadCSV);
$("loadLink").addEventListener("click",()=>$("loadFile").click());
$("loadFile").addEventListener("change",e=>{const f=e.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=()=>importCSV(r.result);r.readAsText(f);});
$("resetBtn").addEventListener("click",()=>{
  if(confirm("Alle eigenen Bewertungen löschen?")){results={};localStorage.removeItem(KEY);idx=0;render();}});
$("dlBtn").addEventListener("click",downloadCSV);
$("reopenBtn").addEventListener("click",()=>{idx=0;render();});

document.addEventListener("keydown",e=>{
  if(e.key==="1")flyOut("operative");
  else if(e.key==="2")flyOut("prospective");
  else if(e.key==="3")flyOut("neutral");
  else if(e.key==="4")flyOut("not_ai");
  else if(e.key==="ArrowLeft"&&!e.shiftKey){if(idx>0){idx--;render();}}
  else if(e.key==="ArrowRight"&&!e.shiftKey){if(idx<DATA.length){idx++;render();}}
});

/* ── Swipe gesture (all 4 directions) ── */
(function(){
  const card=$("card"),tint=$("tint"),TH=90;
  let sx=0,sy=0,dragging=false,axis=null;

  card.addEventListener("pointerdown",e=>{
    if(idx>=DATA.length)return;
    sx=e.clientX;sy=e.clientY;dragging=true;axis=null;card.style.transition="";
  });
  card.addEventListener("pointermove",e=>{
    if(!dragging)return;
    const dx=e.clientX-sx,dy=e.clientY-sy;
    if(!axis){
      if(Math.abs(dx)>9&&Math.abs(dx)>Math.abs(dy)*.8){
        axis="x";try{card.setPointerCapture(e.pointerId);}catch(_){}
      }else if(Math.abs(dy)>9&&Math.abs(dy)>Math.abs(dx)*.8){
        axis="y";try{card.setPointerCapture(e.pointerId);}catch(_){}
      }
    }
    if(axis==="x"){
      const p=Math.min(1,Math.abs(dx)/TH);
      const key=dx>0?"operative":"neutral";
      $("lblOp").style.opacity=dx>0?p:0; $("lblNeu").style.opacity=dx<0?p:0;
      $("lblPro").style.opacity=0; $("lblNot").style.opacity=0;
      tint.style.background=TINT[key]+(p*.4)+")"; tint.style.opacity=1;
      card.style.transform="translateX("+dx+"px) rotate("+(dx/18)+"deg)";
    }else if(axis==="y"){
      const p=Math.min(1,Math.abs(dy)/TH);
      const key=dy<0?"prospective":"not_ai";
      $("lblPro").style.opacity=dy<0?p:0; $("lblNot").style.opacity=dy>0?p:0;
      $("lblOp").style.opacity=0; $("lblNeu").style.opacity=0;
      tint.style.background=TINT[key]+(p*.4)+")"; tint.style.opacity=1;
      card.style.transform="translateY("+dy+"px) rotate("+(dx/30)+"deg)";
    }
  });
  function onEnd(e){
    if(!dragging)return; dragging=false;
    const dx=e.clientX-sx,dy=e.clientY-sy;
    if(axis==="x"&&Math.abs(dx)>=TH){flyOut(dx>0?"operative":"neutral");}
    else if(axis==="y"&&Math.abs(dy)>=TH){flyOut(dy<0?"prospective":"not_ai");}
    else{
      ["lblOp","lblNeu","lblPro","lblNot"].forEach(id=>$(id).style.opacity=0);
      tint.style.opacity=0;
      card.style.transition="transform .22s cubic-bezier(.2,0,.4,1)";
      card.style.transform="";
      setTimeout(()=>card.style.transition="",220);
    }
    axis=null;
  }
  card.addEventListener("pointerup",onEnd);
  card.addEventListener("pointercancel",onEnd);
})();

idx=firstUnreviewed();
render();
</script>
</body>
</html>
